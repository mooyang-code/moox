# MooX local platform storage defaults.
# This file describes the default single-node storage topology for local
# development and demo environments. Import it once before importing
# space-specific metadata seeds.

primary_store_nodes:
  - node_id: local
    name: local-primary
    endpoint: local
    weight: 100
    status: active

devices:
  - device_id: pebble-local
    node_id: local
    name: local-pebble-primary
    engine: pebble
    endpoint: ./var/storage/pebble
    status: active
  - device_id: duckdb-local
    node_id: local
    name: local-duckdb-view
    engine: duckdb
    endpoint: ./var/storage/duckdb/views.duckdb
    status: active
  - device_id: bleve-local
    node_id: local
    name: local-bleve-search
    engine: bleve
    endpoint: ./var/storage/bleve
    status: active
  - device_id: parquet-local
    node_id: local
    name: local-parquet-archive
    engine: parquet_archive
    endpoint: ./var/storage/archive
    status: active
