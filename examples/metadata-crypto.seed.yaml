# MooX storage metadata seed sample.
# This file is domain-oriented and should be imported through MetadataService,
# not by writing metadata tables directly.

spaces:
  - space_id: crypto
    name: Crypto Market Data
    description: Binance/OKX style crypto market data workspace
    owner: default
    status: active

data_sources:
  - space_id: crypto
    data_source_id: binance
    name: Binance
    kind: exchange
    market: crypto
    timezone: UTC
    status: active

subjects:
  - space_id: crypto
    subject_id: APT-USDT
    subject_type: crypto_pair
    name: APT-USDT
    market: crypto
    currency: USDT
    timezone: UTC
    status: active
  - space_id: crypto
    subject_id: AR-USDT
    subject_type: crypto_pair
    name: AR-USDT
    market: crypto
    currency: USDT
    timezone: UTC
    status: active

subject_symbols:
  - space_id: crypto
    subject_id: APT-USDT
    data_source_id: binance
    external_symbol: APTUSDT
    status: active
  - space_id: crypto
    subject_id: AR-USDT
    data_source_id: binance
    external_symbol: ARUSDT
    status: active

datasets:
  - space_id: crypto
    dataset_id: binance_spot_kline
    data_source_id: binance
    name: Binance Spot Kline
    description: Binance spot OHLCV kline facts
    data_kind: time_series
    freqs: ["1m", "1h", "1d"]
    status: active
  - space_id: crypto
    dataset_id: binance_spot_symbols
    data_source_id: binance
    name: Binance Spot Symbols
    description: Binance spot symbol profile facts
    data_kind: record
    freqs: []
    status: active
  - space_id: crypto
    dataset_id: spot_symbol_profiles
    data_source_id: binance
    name: Spot Symbol Profiles
    description: Exchange-independent symbol profile and narrative facts
    data_kind: record
    freqs: []
    status: active

dataset_subjects:
  - space_id: crypto
    dataset_id: binance_spot_kline
    subject_id: APT-USDT
    subject_role: normal
    status: active
  - space_id: crypto
    dataset_id: binance_spot_kline
    subject_id: AR-USDT
    subject_role: normal
    status: active
  - space_id: crypto
    dataset_id: binance_spot_symbols
    subject_id: APT-USDT
    subject_role: normal
    status: active
  - space_id: crypto
    dataset_id: binance_spot_symbols
    subject_id: AR-USDT
    subject_role: normal
    status: active
  - space_id: crypto
    dataset_id: spot_symbol_profiles
    subject_id: APT-USDT
    subject_role: normal
    status: active
  - space_id: crypto
    dataset_id: spot_symbol_profiles
    subject_id: AR-USDT
    subject_role: normal
    status: active

fields:
  - space_id: crypto
    field_id: open
    name: Open Price
    value_type: double
    unit: USDT
    write_example: "7.1200"
    status: active
  - space_id: crypto
    field_id: high
    name: High Price
    value_type: double
    unit: USDT
    write_example: "7.1800"
    status: active
  - space_id: crypto
    field_id: low
    name: Low Price
    value_type: double
    unit: USDT
    write_example: "7.0900"
    status: active
  - space_id: crypto
    field_id: close
    name: Close Price
    value_type: double
    unit: USDT
    write_example: "7.1500"
    status: active
  - space_id: crypto
    field_id: volume
    name: Base Asset Volume
    value_type: double
    unit: base_asset
    write_example: "1250.5"
    status: active
  - space_id: crypto
    field_id: quote_volume
    name: Quote Asset Volume
    value_type: double
    unit: USDT
    write_example: "8941.075"
    status: active
  - space_id: crypto
    field_id: trade_num
    name: Trade Count
    value_type: int
    write_example: "123"
    status: active
  - space_id: crypto
    field_id: symbol
    name: Exchange Symbol
    value_type: string
    write_example: APTUSDT
    status: active
  - space_id: crypto
    field_id: status
    name: Trading Status
    value_type: string
    write_example: TRADING
    status: active
  - space_id: crypto
    field_id: note
    name: Text Note
    value_type: string
    write_example: actively traded pair
    status: active
  - space_id: crypto
    field_id: sector
    name: Sector
    value_type: string
    write_example: layer1
    status: active
  - space_id: crypto
    field_id: description
    name: Description
    value_type: string
    write_example: Layer 1 blockchain token
    status: active
  - space_id: crypto
    field_id: launch_year
    name: Launch Year
    value_type: int
    write_example: "2021"
    status: active

factors:
  - space_id: crypto
    factor_id: ma20_close
    name: 20 Period Moving Average
    description: 20-period moving average of close price for spot klines
    algorithm: moving_average
    params_json: '{"window":20,"input":"close"}'
    value_type: double
    status: active
  - space_id: crypto
    factor_id: volume_ratio_5
    name: 5 Period Volume Ratio
    description: Current volume divided by the 5-period average volume
    algorithm: volume_ratio
    params_json: '{"window":5,"input":"volume"}'
    value_type: double
    status: active

dataset_columns:
  - space_id: crypto
    dataset_id: binance_spot_kline
    column_name: open
    origin_type: field
    origin_id: open
    value_type: double
    required: true
    status: active
  - space_id: crypto
    dataset_id: binance_spot_kline
    column_name: high
    origin_type: field
    origin_id: high
    value_type: double
    required: true
    status: active
  - space_id: crypto
    dataset_id: binance_spot_kline
    column_name: low
    origin_type: field
    origin_id: low
    value_type: double
    required: true
    status: active
  - space_id: crypto
    dataset_id: binance_spot_kline
    column_name: close
    origin_type: field
    origin_id: close
    value_type: double
    required: true
    status: active
  - space_id: crypto
    dataset_id: binance_spot_kline
    column_name: volume
    origin_type: field
    origin_id: volume
    value_type: double
    status: active
  - space_id: crypto
    dataset_id: binance_spot_kline
    column_name: quote_volume
    origin_type: field
    origin_id: quote_volume
    value_type: double
    status: active
  - space_id: crypto
    dataset_id: binance_spot_kline
    column_name: trade_num
    origin_type: field
    origin_id: trade_num
    value_type: int
    status: active
  - space_id: crypto
    dataset_id: binance_spot_kline
    column_name: ma20_close
    origin_type: factor
    origin_id: ma20_close
    value_type: double
    status: active
  - space_id: crypto
    dataset_id: binance_spot_kline
    column_name: volume_ratio_5
    origin_type: factor
    origin_id: volume_ratio_5
    value_type: double
    status: active
  - space_id: crypto
    dataset_id: binance_spot_symbols
    column_name: symbol
    origin_type: field
    origin_id: symbol
    value_type: string
    required: true
    status: active
  - space_id: crypto
    dataset_id: binance_spot_symbols
    column_name: status
    origin_type: field
    origin_id: status
    value_type: string
    status: active
  - space_id: crypto
    dataset_id: binance_spot_symbols
    column_name: note
    origin_type: field
    origin_id: note
    value_type: string
    status: active
  - space_id: crypto
    dataset_id: spot_symbol_profiles
    column_name: sector
    origin_type: field
    origin_id: sector
    value_type: string
    required: true
    status: active
  - space_id: crypto
    dataset_id: spot_symbol_profiles
    column_name: description
    origin_type: field
    origin_id: description
    value_type: string
    status: active
  - space_id: crypto
    dataset_id: spot_symbol_profiles
    column_name: launch_year
    origin_type: field
    origin_id: launch_year
    value_type: int
    status: active

views:
  - space_id: crypto
    view_id: spot_symbol_profile_view
    name: Spot Symbol Profile View
    description: Aggregate spot symbol status with symbol profile text for Bleve search
    primary_dataset_id: binance_spot_symbols
    dataset_ids: ["binance_spot_symbols", "spot_symbol_profiles"]
    grain_keys: ["record_id", "version"]
    engine: bleve
    build_status: pending
    status: active

view_columns:
  - space_id: crypto
    view_id: spot_symbol_profile_view
    column_name: binance_spot_symbols.symbol
    origin_type: dataset_column
    origin_id: binance_spot_symbols.symbol
    value_type: string
    status: active
  - space_id: crypto
    view_id: spot_symbol_profile_view
    column_name: binance_spot_symbols.status
    origin_type: dataset_column
    origin_id: binance_spot_symbols.status
    value_type: string
    status: active
  - space_id: crypto
    view_id: spot_symbol_profile_view
    column_name: binance_spot_symbols.note
    origin_type: dataset_column
    origin_id: binance_spot_symbols.note
    value_type: string
    status: active
  - space_id: crypto
    view_id: spot_symbol_profile_view
    column_name: spot_symbol_profiles.sector
    origin_type: dataset_column
    origin_id: spot_symbol_profiles.sector
    value_type: string
    status: active
  - space_id: crypto
    view_id: spot_symbol_profile_view
    column_name: spot_symbol_profiles.description
    origin_type: dataset_column
    origin_id: spot_symbol_profiles.description
    value_type: string
    status: active
  - space_id: crypto
    view_id: spot_symbol_profile_view
    column_name: spot_symbol_profiles.launch_year
    origin_type: dataset_column
    origin_id: spot_symbol_profiles.launch_year
    value_type: int
    status: active

primary_store_routes:
  - space_id: crypto
    route_id: route-binance-spot-kline
    dataset_id: binance_spot_kline
    subject_pattern: "*"
    hash_rule: subject_id
    node_id: local
    priority: 100
    status: active
  - space_id: crypto
    route_id: route-binance-spot-symbols
    dataset_id: binance_spot_symbols
    subject_pattern: "*"
    hash_rule: subject_id
    node_id: local
    priority: 100
    status: active
  - space_id: crypto
    route_id: route-spot-symbol-profiles
    dataset_id: spot_symbol_profiles
    subject_pattern: "*"
    hash_rule: subject_id
    node_id: local
    priority: 100
    status: active
