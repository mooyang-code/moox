    value_type: double
    write_example: "0.01"
    status: active
  - space_id: crypto
    field_id: lot_size
    name: 数量步长
    value_type: double
    write_example: "0.001"
    status: active
  - space_id: crypto
    field_id: filters_json
    name: 过滤规则
    value_type: json
    write_example: '{"PRICE_FILTER":{"tickSize":"0.01"}}'
    status: active
  - space_id: crypto
    field_id: note
    name: 备注
    value_type: string
    write_example: actively traded pair
    status: active
  - space_id: crypto
    field_id: sector
    name: 板块
    value_type: string
    write_example: layer1
    status: active
  - space_id: crypto
    field_id: description
    name: 简介
