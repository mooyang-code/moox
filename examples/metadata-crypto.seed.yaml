    value_type: string
    write_example: APT
    status: active
  - space_id: crypto
    field_id: quote_asset
    name: 计价资产
    value_type: string
    write_example: USDT
    status: active
  - space_id: crypto
    field_id: status
    name: 交易状态
    value_type: string
    write_example: TRADING
    status: active
  - space_id: crypto
    field_id: min_qty
    name: 最小数量
    value_type: double
    write_example: "0.001"
    status: active
  - space_id: crypto
    field_id: max_qty
    name: 最大数量
    value_type: double
    write_example: "100000"
    status: active
