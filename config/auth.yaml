# 认证服务配置文件
# 使用说明:
# 1. 默认使用SQLite数据库（开箱即用）
# 2. 设置JWT密钥和过期时间
# 3. 调整安全参数
# 4. 配置缓存数据目录

# 数据库配置（默认SQLite）
database:
  host: ""                    # SQLite不需要host
  port: 0                     # SQLite不需要port
  user: ""                    # SQLite不需要用户名
  password: ""                # SQLite不需要密码
  dbname: "../data/moox.db"    # SQLite数据库文件路径

# 缓存配置（BadgerDB）
cache:
  data_dir: "../data/badger"   # BadgerDB数据存储目录
  db: 0                       # 数据库编号（预留字段）

# JWT配置
jwt:
  secret_key: "kJ8#3Lz!b1A6xQwP2dR9vM4nS7eT0uYpG5hZcV8jF2mB6sXlD3rWqN0tH9uK1oE4"  # JWT密钥，生产环境请务必修改
  access_expired: "24h"       # 访问令牌过期时间
  refresh_expired: "168h"     # 刷新令牌过期时间（7天）

# 安全配置
security:
  salt_expired: "5m"          # 登录盐值过期时间
  max_login_attempt: 5        # 最大登录尝试次数
  lock_duration: "30m"        # 账户锁定时间

# 配置说明:
# 时间格式支持: ns, us, ms, s, m, h
# 例如: "30s" (30秒), "5m" (5分钟), "2h" (2小时), "24h" (24小时)
#
# 数据库支持:
# 默认使用SQLite（无需额外安装数据库服务）
# 如需PostgreSQL/MySQL，请参考 auth-production.yaml 配置
#
# 缓存目录:
# 确保应用有权限在指定目录创建和写入文件
# 数据库文件和缓存目录会自动创建
#
# 安全建议:
# 1. JWT密钥请使用强随机字符串，至少32字符
# 2. 生产环境建议缩短访问令牌过期时间
# 3. 根据业务需求调整登录尝试次数和锁定时间
#
# 快速开始:
# 1. 复制此文件并重命名
# 2. 修改JWT密钥
# 3. 确保 ./data 目录有写入权限
# 4. 启动服务即可使用 