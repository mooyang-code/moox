storage:
  root: ./var/e2e
  roles:
    - access
    - primary
    - deriver
  metadata:
    path: ./var/e2e/metadata/metadata.db
  devices:
    pebble_path: ./var/e2e/pebble
    duckdb_path: ./var/e2e/duckdb/views.duckdb
    bleve_path: ./var/e2e/bleve
    parquet_path: ./var/e2e/archive
  primary:
    service_name: ""
  eventbus:
    type: memory
    stream_name: MOOX_STORAGE_E2E
  deriver:
    access_service_name: ""
    batch_size: 100
    batch_wait_ms: 50
    max_workers: 1
