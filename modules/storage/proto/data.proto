syntax = "proto3";

package trpc.storage.data;

option go_package = "github.com/mooyang-code/moox/modules/storage/proto/gen;storagepb";

import "common.proto";

// DataScope 表示一次事实读写的逻辑数据范围。
message DataScope {
  // space_id 是使用空间 ID；DataSet、Subject、Field 和 Factor 的唯一性均限定在该 Space 内。
  string space_id = 1;
  // dataset_id 是事实数据集 ID，所有用户写入都以数据集为入口。
  string dataset_id = 2;
  // subject_id 是数据对象 ID，例如交易标的、榜单、新闻源或账户。
  string subject_id = 3;
  // freq 是时序频率，例如 1m、1h、1d；非时序数据可为空。
  string freq = 4;
  // dimensions 是参与逻辑定位的低基数业务维度，不是普通过滤条件。
  // 只有当某个值决定“是否为同一条事实序列或事实切片”时才放在这里。
  map<string, string> dimensions = 5;
}

// DataKey 表示一条事实数据行的逻辑主键。
message DataKey {
  // scope 是本行所属的事实数据范围。
  DataScope scope = 1;
  // data_time 是本行代表的业务时间；时序数据通常必填。
  string data_time = 2;
  // row_id 是内部低阶事实键字段；时序数据通常等于 data_time，对象数据通常等于 object_id。
  // 新接入方优先使用 TimeSeriesKey/ObjectKey，不直接拼接内部 DataKey。
  string row_id = 3;
}

// ColumnValue 表示一列数据值。
message ColumnValue {
  // column_name 是 DataSetColumn 中登记的列名。
  string column_name = 1;
  // value_type 是列值的逻辑类型。
  common.FieldValueType value_type = 2;
  // value 是列实际取值。
  common.TypedValue value = 3;
}

// DataRow 表示一行事实数据。
message DataRow {
  // key 是本行的逻辑主键，表示向哪一行写入列值。
  DataKey key = 1;
  // columns 是本次写入携带的列值，列名必须先登记到元数据。
  // 再次写入同一 DataKey 时，只更新本次携带的列；未携带的旧列保留。
  repeated ColumnValue columns = 2;
  // attributes 是不参与列契约的附加信息，默认不进入索引；更新时按 key 覆盖。
  map<string, string> attributes = 3;
}

// TimeSeriesKey 表示时序数据行的业务主键。
// 时序数据必须是固定 subject_id + 固定 freq 下，按 data_time 连续演进的数据。
// 服务端内部将其归一为 data_key=subject_id|freq|dimhash, version=data_time。
message TimeSeriesKey {
  // space_id 是使用空间 ID。
  string space_id = 1;
  // dataset_id 是事实数据集 ID。
  string dataset_id = 2;
  // subject_id 是固定数据对象 ID，例如交易标的。
  string subject_id = 3;
  // freq 是固定时序频率，例如 1m、1h、1d。
  string freq = 4;
  // dimensions 是参与同一事实序列定位的低基数业务维度。
  map<string, string> dimensions = 5;
  // data_time 是本行版本时间，必须为 RFC3339/RFC3339Nano。
  string data_time = 6;
}

// TimeSeriesRow 表示一行时序事实数据。
message TimeSeriesRow {
  // key 是时序业务主键。
  TimeSeriesKey key = 1;
  // columns 是本次写入携带的列值。
  repeated ColumnValue columns = 2;
  // attributes 是附加属性，更新时按 key 覆盖。
  map<string, string> attributes = 3;
}

// ObjectKey 表示对象数据行的业务主键。
// 非固定 subject + freq 的数据都归为对象数据，即使其具备时间线，也通过 version 表达。
// 服务端内部将其归一为 data_key=object_id, version=version。
message ObjectKey {
  // space_id 是使用空间 ID。
  string space_id = 1;
  // dataset_id 是事实数据集 ID。
  string dataset_id = 2;
  // object_id 是对象唯一 ID，例如 news_id、profile_id、ranking_id。
  string object_id = 3;
  // version 是该 object_id 下的版本；为空时服务端归一为默认版本。
  string version = 4;
}

// ObjectRow 表示一行对象事实数据。
message ObjectRow {
  // key 是对象业务主键。
  ObjectKey key = 1;
  // columns 是本次写入携带的列值。
  repeated ColumnValue columns = 2;
  // attributes 是附加属性，更新时按 key 覆盖。
  map<string, string> attributes = 3;
}

// ReadMode 表示读取方式。
enum ReadMode {
  // READ_MODE_UNSPECIFIED 表示由服务端使用默认读取方式。
  READ_MODE_UNSPECIFIED = 0;
  // READ_MODE_RANGE 表示按时间区间读取。
  READ_MODE_RANGE = 1;
  // READ_MODE_LATEST_BEFORE 表示读取指定截面时间之前的最新行。
  READ_MODE_LATEST_BEFORE = 3;
}

// WriteRowsReq 表示写入事实数据行的请求。
message WriteRowsReq {
  // auth_info 是调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // write_mode 表示本次写入如何处理相同 DataKey 的已有数据。
  // 当前服务只承诺列级更新，不提供删除整行或清空 scope 的能力。
  common.WriteMode write_mode = 2;
  // rows 是待写入的数据行。
  repeated DataRow rows = 3;
}

// WriteRowsRsp 表示事实数据行写入结果。
message WriteRowsRsp {
  // ret_info 是接口返回状态。
  common.RetInfo ret_info = 1;
}

// ReadRowsReq 表示读取事实数据行的请求。
message ReadRowsReq {
  // auth_info 是调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // scope 是要读取的事实数据范围。
  DataScope scope = 2;
  // read_mode 是读取方式。
  ReadMode read_mode = 3;
  // time_range 是时间区间条件，适用于区间读取。
  common.TimeRange time_range = 4;
  // snapshot_time 是截面时间，适用于读取截面时间之前最新行。
  string snapshot_time = 5;
  // object_id 是低阶对象过滤条件；新接入方优先使用 ReadObjectRows。
  string object_id = 6;
  // column_names 是要返回的列名；为空时返回整行。
  repeated string column_names = 7;
  // page 是分页参数。
  common.Page page = 8;
}

// ReadRowsRsp 表示事实数据行读取结果。
message ReadRowsRsp {
  // ret_info 是接口返回状态。
  common.RetInfo ret_info = 1;
  // rows 是读取到的数据行。
  repeated DataRow rows = 2;
  // page_result 是分页结果。
  common.PageResult page_result = 3;
}

// WriteTimeSeriesRowsReq 表示写入时序事实数据行。
message WriteTimeSeriesRowsReq {
  // auth_info 是调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // write_mode 表示本次写入如何处理相同 key 的已有数据。
  common.WriteMode write_mode = 2;
  // rows 是待写入的时序数据行。
  repeated TimeSeriesRow rows = 3;
}

// WriteTimeSeriesRowsRsp 表示时序事实数据写入结果。
message WriteTimeSeriesRowsRsp {
  // ret_info 是接口返回状态。
  common.RetInfo ret_info = 1;
}

// ReadTimeSeriesRowsReq 表示读取时序事实数据。
message ReadTimeSeriesRowsReq {
  // auth_info 是调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // keys 是查询模板；读取时 key.data_time 可为空，实际时间范围由 time_range 表达。
  repeated TimeSeriesKey keys = 2;
  // time_range 是闭区间时间范围；精确读时 start_time=end_time。
  common.TimeRange time_range = 3;
  // order 表示按 data_time 返回的顺序，默认升序。
  common.SortOrder order = 4;
  // column_names 是要返回的列名；为空时返回整行。
  repeated string column_names = 5;
  // page 是分页参数。
  common.Page page = 6;
}

// ReadTimeSeriesRowsRsp 表示时序事实数据读取结果。
message ReadTimeSeriesRowsRsp {
  // ret_info 是接口返回状态。
  common.RetInfo ret_info = 1;
  // rows 是读取到的时序数据行。
  repeated TimeSeriesRow rows = 2;
  // page_result 是分页结果。
  common.PageResult page_result = 3;
}

// WriteObjectRowsReq 表示写入对象事实数据行。
message WriteObjectRowsReq {
  // auth_info 是调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // write_mode 表示本次写入如何处理相同 key 的已有数据。
  common.WriteMode write_mode = 2;
  // rows 是待写入的对象数据行。
  repeated ObjectRow rows = 3;
}

// WriteObjectRowsRsp 表示对象事实数据写入结果。
message WriteObjectRowsRsp {
  // ret_info 是接口返回状态。
  common.RetInfo ret_info = 1;
}

// ReadObjectRowsReq 表示读取对象事实数据。
message ReadObjectRowsReq {
  // auth_info 是调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // keys 是查询模板；读取时 key.version 可为空，实际版本范围由 version_range 表达。
  repeated ObjectKey keys = 2;
  // version_range 是闭区间版本范围；精确读时 start_version=end_version。
  common.VersionRange version_range = 3;
  // order 表示按 version 返回的顺序，默认升序。
  common.SortOrder order = 4;
  // column_names 是要返回的列名；为空时返回整行。
  repeated string column_names = 5;
  // page 是分页参数。
  common.Page page = 6;
}

// ReadObjectRowsRsp 表示对象事实数据读取结果。
message ReadObjectRowsRsp {
  // ret_info 是接口返回状态。
  common.RetInfo ret_info = 1;
  // rows 是读取到的对象数据行。
  repeated ObjectRow rows = 2;
  // page_result 是分页结果。
  common.PageResult page_result = 3;
}

// DataService 是用户侧事实数据读写服务。
service DataService {
  // WriteRows 写入事实数据行，例如 K 线、公司资料、榜单、文档摘要或因子结果。
  rpc WriteRows(WriteRowsReq) returns (WriteRowsRsp);
  // ReadRows 按数据集、数据对象、频率、时间和列名读取事实数据行。
  rpc ReadRows(ReadRowsReq) returns (ReadRowsRsp);
  // WriteTimeSeriesRows 写入固定 subject + freq 下按 data_time 演进的时序事实数据。
  rpc WriteTimeSeriesRows(WriteTimeSeriesRowsReq) returns (WriteTimeSeriesRowsRsp);
  // ReadTimeSeriesRows 按时序业务 key 与闭区间时间范围读取事实数据。
  rpc ReadTimeSeriesRows(ReadTimeSeriesRowsReq) returns (ReadTimeSeriesRowsRsp);
  // WriteObjectRows 写入对象事实数据；非固定 subject+freq 的数据均使用对象接口。
  rpc WriteObjectRows(WriteObjectRowsReq) returns (WriteObjectRowsRsp);
  // ReadObjectRows 按对象 ID 与闭区间版本范围读取事实数据。
  rpc ReadObjectRows(ReadObjectRowsReq) returns (ReadObjectRowsRsp);
}
