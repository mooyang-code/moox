syntax = "proto3";

package trpc.storage.v2.query;

option go_package = "github.com/mooyang-code/moox/modules/storage/proto/genv2;storagepb";

import "v2_common.proto";
import "v2_data.proto";

// 分析查询的时间条件。
message QueryTime {
  // 区间查询使用的时间范围。
  common.TimeRange time_range = 1;
  // 截面查询使用的时间点。
  string snapshot_time = 2;
}

// 组合查询请求或返回中的一列。
message QueryFrameColumn {
  // 数据视图中的列 ID。
  string column_id = 1;
  // 返回给调用方的列名。
  string output_name = 2;
  // 列来源，例如字段、因子实例、表达式或系统列。
  common.ColumnOrigin column_origin = 3;
  // 数据集 ID。
  string dataset_id = 4;
  // 字段 ID。
  string field_id = 5;
  // 因子实例 ID，表示带参数的因子结果。
  string factor_instance_id = 6;
  // 服务端支持的表达式文本。
  string expression = 7;
  // 值的逻辑类型。
  common.FieldValueType value_type = 8;
}

// 组合查询返回的一行。
message QueryFrameRow {
  // 内部标准化标的 ID；非标的数据可为空。
  string instrument_id = 1;
  // 时序结果中的行时间，或截面结果中的截面时间。
  string time = 2;
  // 与返回列顺序对齐的字段值。
  repeated common.FieldValue values = 3;
}

// 组合查询请求，可查询字段、因子、表达式和系统列。
message QueryFrameReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 工作空间 ID，用于隔离用户、策略和元数据。
  string workspace_id = 2;
  // 已配置的数据视图 ID；为空时可由 columns 描述临时查询。
  string data_view_id = 3;
  // 调用方指定的标的 ID 列表；标的池由上层应用处理。
  repeated string instrument_ids = 4;
  // 查询时间条件，可表示区间查询或截面查询。
  QueryTime query_time = 5;
  // 查询输出列；为空时使用数据视图激活版本的默认列。
  repeated QueryFrameColumn columns = 6;
  // 过滤条件列表。
  repeated common.FilterExpr filters = 7;
  // 排序条件列表。
  repeated common.SortSpec sorts = 8;
  // 分页参数。
  common.Page page = 9;
}

// 组合查询返回的表格结果。
message QueryFrameRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // 返回列或请求列列表。
  repeated QueryFrameColumn columns = 2;
  // 返回行列表。
  repeated QueryFrameRow rows = 3;
  // 分页结果。
  common.PageResult page_result = 4;
}

// 全文检索请求，用于文档型或已建立文本索引的数据集。
message TextSearchReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 工作空间 ID，用于隔离用户、策略和元数据。
  string workspace_id = 2;
  // 数据集 ID。
  string dataset_id = 3;
  // 用户输入的检索文本。
  string query = 4;
  // 调用方指定的标的 ID 列表；标的池由上层应用处理。
  repeated string instrument_ids = 5;
  // time_range 参数。
  common.TimeRange time_range = 6;
  // 分页参数。
  common.Page page = 7;
}

// 全文检索返回结果。
message TextSearchRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // records 参数。
  repeated data.Record records = 2;
  // 分页结果。
  common.PageResult page_result = 3;
}

// 查询执行计划中的一步。
message QueryPlanStep {
  // 执行计划步骤 ID。
  string step_id = 1;
  // 执行引擎名称，例如 Pebble、DuckDB、CSV 或 Bleve。
  string engine = 2;
  // 执行操作，例如扫描、过滤、连接或读取物化视图。
  string operation = 3;
  // 面向诊断的执行细节。
  string detail = 4;
}

// 解释组合查询执行计划的请求。
message ExplainQueryReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 需要解释执行计划的组合查询请求。
  QueryFrameReq query = 2;
}

// 查询执行计划说明。
message ExplainQueryRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // steps 参数。
  repeated QueryPlanStep steps = 2;
}

// 分析查询服务，负责组合查询、文本检索和执行计划解释。
service QueryService {
  // 返回可组合基础字段、因子实例、表达式和系统列的表格结果。
  rpc QueryFrame(QueryFrameReq) returns (QueryFrameRsp);
  // 检索文本索引记录。
  rpc TextSearch(TextSearchReq) returns (TextSearchRsp);
  // 解释服务端路由和执行策略，不让调用方控制物理细节。
  rpc ExplainQuery(ExplainQueryReq) returns (ExplainQueryRsp);
}
