syntax = "proto3";

package trpc.storage.metadata;

option go_package = "github.com/mooyang-code/moox/modules/storage/proto/gen;storagepb";

import "common.proto";

// 工作空间，是用户、策略、权限、元数据和数据的隔离边界。
message Workspace {
  // 工作空间 ID，用于隔离用户、策略和元数据。
  string workspace_id = 1;
  // 机器可读名称。
  string name = 2;
  // 展示名称。
  string display_name = 3;
  // 说明文本。
  string description = 4;
  // 所有者用户或团队。
  string owner = 5;
  // 状态，例如启用、停用、构建中或归档。
  string status = 6;
  // 创建时间。
  string created_at = 7;
  // 最后更新时间。
  string updated_at = 8;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 9;
}

// 市场信息，例如美股、港股或数字货币市场。
message MarketInfo {
  // 市场代码。
  string market = 1;
  // 展示名称。
  string display_name = 2;
  // 时区。
  string timezone = 3;
  // 币种或结算货币。
  string currency = 4;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 5;
}

// 交易场所或行情数据场所。
message Exchange {
  // 交易场所或数据场所 ID。
  string exchange_id = 1;
  // 短代码。
  string code = 2;
  // 机器可读名称。
  string name = 3;
  // 市场代码。
  string market = 4;
  // 时区。
  string timezone = 5;
  // 币种或结算货币。
  string currency = 6;
  // 交易日历标识。
  string trading_calendar = 7;
  // 状态，例如启用、停用、构建中或归档。
  string status = 8;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 9;
}

// 系统内部标准化的金融交易标的。
message Instrument {
  // 内部标准化标的 ID；非标的数据可为空。
  string instrument_id = 1;
  // 系统内部标准化代码。
  string internal_symbol = 2;
  // 展示给用户的代码。
  string display_symbol = 3;
  // 交易场所或数据场所 ID。
  string exchange_id = 4;
  // 市场代码。
  string market = 5;
  // 标的类型，例如现货、股票、期货、期权或 ETF。
  string instrument_type = 6;
  // 交易对或衍生品的基础资产。
  string base_asset = 7;
  // 交易对或衍生品的计价资产。
  string quote_asset = 8;
  // 币种或结算货币。
  string currency = 9;
  // 时区。
  string timezone = 10;
  // 状态，例如启用、停用、构建中或归档。
  string status = 11;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 12;
}

// 外部数据源代码到内部标的的映射。
message InstrumentAlias {
  // 内部标准化标的 ID；非标的数据可为空。
  string instrument_id = 1;
  // 外部数据源标识。
  string data_source = 2;
  // 交易场所或数据场所 ID。
  string exchange_id = 3;
  // 外部数据源使用的代码。
  string external_symbol = 4;
  // 状态，例如启用、停用、构建中或归档。
  string status = 5;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 6;
}

// 数据集允许使用的一个业务维度定义。
message DimensionDef {
  // 机器可读名称。
  string name = 1;
  // 展示名称。
  string display_name = 2;
  // 说明文本。
  string description = 3;
  // 是否必填。
  bool required = 4;
  // 允许的取值列表；为空表示不限制枚举值。
  repeated string allowed_values = 5;
}

// 一组可读写的逻辑数据集合。
message DataSet {
  // 数据集 ID。
  string dataset_id = 1;
  // 工作空间 ID，用于隔离用户、策略和元数据。
  string workspace_id = 2;
  // 机器可读名称。
  string name = 3;
  // 展示名称。
  string display_name = 4;
  // 数据集的结构形态。
  common.DataKind data_kind = 5;
  // category 是可选业务分类，第一版不参与核心路由。
  string category = 6;
  // 数据集覆盖的市场范围。
  repeated string market_scope = 7;
  // 数据集覆盖的交易场所范围。
  repeated string exchange_scope = 8;
  // 数据集覆盖的标的范围。
  repeated string instrument_scope = 9;
  // 默认或支持的数据频率列表。
  repeated string default_freqs = 10;
  // 逻辑结构版本号。
  uint32 schema_version = 11;
  // 数据集允许使用的业务维度定义。
  repeated DimensionDef dimensions = 12;
  // 保留策略，例如热存、冷存或备份策略。
  string retention_policy = 13;
  // 状态，例如启用、停用、构建中或归档。
  string status = 14;
  // 创建时间。
  string created_at = 15;
  // 最后更新时间。
  string updated_at = 16;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 17;
}

// 数据集中的一个逻辑字段定义。
message Field {
  // 字段 ID。
  string field_id = 1;
  // 工作空间 ID，用于隔离用户、策略和元数据。
  string workspace_id = 2;
  // 数据集 ID。
  string dataset_id = 3;
  // 接口层稳定字段名，例如 open、close 或 volume。
  string interface_name = 4;
  // 展示名称。
  string display_name = 5;
  // 说明文本。
  string description = 6;
  // 值的逻辑类型。
  common.FieldValueType value_type = 7;
  // 是否必填。
  bool required = 8;
  // 是否参与唯一性约束。
  bool unique = 9;
  // 计量单位，例如 USD、股或百分比。
  string unit = 10;
  // 状态，例如启用、停用、构建中或归档。
  string status = 11;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 12;
}

// DataSetColumn 表示数据集下允许写入和读取的一列。
message DataSetColumn {
  // dataset_id 是数据集 ID。
  string dataset_id = 1;
  // column_name 是数据集内稳定列名。
  string column_name = 2;
  // source_type 表示列来源。
  common.ColumnSourceType source_type = 3;
  // source_id 是字段 ID、因子 ID 或系统列名。
  string source_id = 4;
  // value_type 是列值的逻辑类型。
  common.FieldValueType value_type = 5;
  // required 表示写入时是否必填。
  bool required = 6;
  // unique 表示该列是否参与数据集内唯一性约束。
  bool unique = 7;
  // aliases 是外部来源字段名别名。
  repeated string aliases = 8;
  // text_indexed 表示该列是否同步到 Bleve 文本索引。
  bool text_indexed = 9;
  // status 表示启用、停用、构建中或归档等状态。
  string status = 10;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 11;
}

// 不含参数取值的因子算法定义。
message FactorDef {
  // 因子定义 ID。
  string factor_def_id = 1;
  // 工作空间 ID，用于隔离用户、策略和元数据。
  string workspace_id = 2;
  // 机器可读名称。
  string name = 3;
  // 展示名称。
  string display_name = 4;
  // 说明文本。
  string description = 5;
  // 因子算法或公式族标识。
  string algorithm = 6;
  // 版本号。
  string version = 7;
  // 状态，例如启用、停用、构建中或归档。
  string status = 8;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 9;
}

// 带参数的因子实例，例如 MA20 或 RSI14。
message FactorInstance {
  // 因子实例 ID，表示带参数的因子结果。
  string factor_instance_id = 1;
  // 工作空间 ID，用于隔离用户、策略和元数据。
  string workspace_id = 2;
  // 因子定义 ID。
  string factor_def_id = 3;
  // 数据集 ID。
  string dataset_id = 4;
  // 机器可读名称。
  string name = 5;
  // 展示名称。
  string display_name = 6;
  // 数据频率，例如 1m、1d 或 tick。
  string freq = 7;
  // 参数键值对，例如 window=20。
  map<string, string> params = 8;
  // 值的逻辑类型。
  common.FieldValueType value_type = 9;
  // 状态，例如启用、停用、构建中或归档。
  string status = 10;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 11;
}

// 数据视图的服务端查询和物化策略。
message DataViewQueryConfig {
  // 数据视图的主数据集 ID。
  string primary_dataset_id = 1;
  // 数据视图需要关联的辅助数据集 ID 列表。
  repeated string join_dataset_ids = 2;
  // 调用方指定的标的 ID 列表；标的池由上层应用处理。
  repeated string instrument_ids = 3;
  // 过滤条件列表。
  repeated common.FilterExpr filters = 4;
  // 排序条件列表。
  repeated common.SortSpec sorts = 5;
  // 服务端物化策略，例如延迟、立即或关闭物化。
  string materialize_policy = 6;
}

// 数据视图某个版本的一列输出定义。
message DataViewColumn {
  // 数据视图中的列 ID。
  string column_id = 1;
  // 返回给调用方的列名。
  string output_name = 2;
  // 列来源，例如字段、因子、表达式或系统列。
  common.ColumnSourceType source_type = 3;
  // 数据集 ID。
  string dataset_id = 4;
  // 字段 ID。
  string field_id = 5;
  // 因子结果 ID。
  string factor_instance_id = 6;
  // 服务端支持的表达式文本。
  string expression = 7;
  // 值的逻辑类型。
  common.FieldValueType value_type = 8;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 9;
}

// 数据视图的一个不可变结构版本。
message DataViewVersion {
  // 版本 ID。
  string version_id = 1;
  // 版本号。
  uint32 version = 2;
  // 返回列或请求列列表。
  repeated DataViewColumn columns = 3;
  // 创建时间。
  string created_at = 4;
  // 状态，例如启用、停用、构建中或归档。
  string status = 5;
}

// 面向查询的数据视图，可组合字段、因子、表达式和系统列。
message DataView {
  // 数据视图 ID。
  string data_view_id = 1;
  // 工作空间 ID，用于隔离用户、策略和元数据。
  string workspace_id = 2;
  // 机器可读名称。
  string name = 3;
  // 展示名称。
  string display_name = 4;
  // 说明文本。
  string description = 5;
  // query_config 参数。
  DataViewQueryConfig query_config = 6;
  // 数据视图的结构版本列表；新增动态因子列时应创建新版本。
  repeated DataViewVersion versions = 7;
  // 默认查询使用的激活版本 ID。
  string active_version_id = 8;
  // 状态，例如启用、停用、构建中或归档。
  string status = 9;
  // 创建时间。
  string created_at = 10;
  // 最后更新时间。
  string updated_at = 11;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 12;
}

// 物理存储后端，例如 Pebble、DuckDB、CSV 或 Bleve。
message StorageDevice {
  // 存储设备 ID。
  string device_id = 1;
  // 机器可读名称。
  string name = 2;
  // 执行引擎名称，例如 Pebble、DuckDB、CSV 或 Bleve。
  string engine = 3;
  // 连接地址、文件路径或 URI。
  string endpoint = 4;
  // 存储引擎专用配置，使用 JSON 文本。
  string config_json = 5;
  // 状态，例如启用、停用、构建中或归档。
  string status = 6;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 7;
}

// 逻辑数据到物理存储设备的路由规则。
message StorageRoute {
  // 路由规则 ID。
  string route_id = 1;
  // 工作空间 ID，用于隔离用户、策略和元数据。
  string workspace_id = 2;
  // 数据集 ID。
  string dataset_id = 3;
  // 字段 ID。
  string field_id = 4;
  // 因子实例 ID，表示带参数的因子结果。
  string factor_instance_id = 5;
  // 存储设备 ID。
  string device_id = 6;
  // 业务维度取值，例如复权类型、报告期或榜单类型。
  repeated common.DimensionValue dimension_values = 7;
  // 路由用途，例如 online、analytics、text、cold 或 backup。
  string mode = 8;
  // 路由优先级；约定数值越小优先级越高。
  uint32 priority = 9;
  // 状态，例如启用、停用、构建中或归档。
  string status = 10;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 11;
}

// 采集任务类型到目标数据集的绑定关系。
message CollectorDataSetBinding {
  // 绑定关系 ID。
  string binding_id = 1;
  // 工作空间 ID，用于隔离用户、策略和元数据。
  string workspace_id = 2;
  // 数据集 ID。
  string dataset_id = 3;
  // 外部数据源标识。
  string data_source = 4;
  // 交易场所或数据场所 ID。
  string exchange_id = 5;
  // 采集任务类型，例如 spot_kline_1m。
  string collector_task_type = 6;
  // 参数键值对，例如 window=20。
  map<string, string> params = 7;
  // 状态，例如启用、停用、构建中或归档。
  string status = 8;
}

