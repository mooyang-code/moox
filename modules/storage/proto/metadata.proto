syntax = "proto3";

package trpc.storage.metadata;

option go_package = "github.com/mooyang-code/moox/modules/storage/proto/gen;storagepb";

import "common.proto";

// Space 是业务命名空间，也是用户可见 View 的集合。
message Space {
  // space_id 是使用空间 ID；本文所有“全局”概念均限定在该空间内。
  string space_id = 1;
  // name 是空间名称，通常用于管理台展示。
  string name = 2;
  // description 是说明文本。
  string description = 3;
  // owner 是空间拥有者，可以是用户、团队或系统任务。
  string owner = 4;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 5;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 6;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 7;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 8;
}

// View 是 Space 内的用户查询入口，也是可异步构建的物化结果定义。
message View {
  // space_id 是 View 所属 Space。
  string space_id = 1;
  // view_id 是 Space 内唯一的查询视图 ID；必须为 lower_snake_case，最长 30 字符。
  string view_id = 2;
  // name 是视图中文展示名，创建和更新时必须包含中文且不超过 10 个字符。
  string name = 3;
  // description 是说明文本。
  string description = 4;
  // primary_dataset_id 是视图的主数据集，用于默认读路径和主时间轴。
  string primary_dataset_id = 5;
  // dataset_ids 是该视图组合的事实数据集 ID 列表。
  repeated string dataset_ids = 6;
  // grain_keys 表示视图行粒度键，例如 subject_id、data_time 或 freq。
  repeated string grain_keys = 7;
  // filter_json 是构建视图物化结果时使用的固定过滤条件。
  string filter_json = 8;
  // engine 是视图查询执行引擎标识，由控制面配置。
  string engine = 9;
  // query_window 是视图物化结果保留和回扫的查询窗口，例如 30d。
  string query_window = 10;
  // active_result 是当前生效的物化结果标识，由后台构建任务维护。
  string active_result = 11;
  // build_status 表示物化结果构建状态，例如 pending、building、active 或 failed。
  string build_status = 12;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 13;
  // columns 是视图对用户暴露的查询列。
  repeated ViewColumn columns = 14;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 15;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 16;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 17;
  // view_version 是 View 定义版本；新增字段或构建形态变化时递增。
  uint64 view_version = 18;
  // active_view_version 是当前线上读取的 View 版本。
  uint64 active_view_version = 19;
  // building_view_version 是正在后台构建的目标 View 版本。
  uint64 building_view_version = 20;
  // building_result 是正在后台构建的新结果标识。
  string building_result = 21;
  // build_error 是最近一次构建失败原因。
  string build_error = 22;
  // build_started_at 是最近一次构建开始时间，使用项目统一时间字符串格式。
  string build_started_at = 23;
  // build_finished_at 是最近一次构建结束时间，使用项目统一时间字符串格式。
  string build_finished_at = 24;
}

// ViewColumn 定义 View 对用户暴露的一列。
message ViewColumn {
  // space_id 是 ViewColumn 所属 Space。
  string space_id = 1;
  // view_id 是查询视图 ID。
  string view_id = 2;
  // column_name 是视图内稳定技术列名；DatasetColumn 来源必须使用 dataset_id.column_name。
  string column_name = 3;
  // origin_type 表示列来源，可为 DatasetColumn、表达式或系统列。
  common.ColumnOriginType origin_type = 4;
  // origin_id 是来源 ID；DatasetColumn 必须使用 dataset_id.column_name，并与 column_name 保持一致。
  string origin_id = 5;
  // value_type 是列值的逻辑类型。
  common.FieldValueType value_type = 6;
  // online_time 是该列进入视图的上线时间，用于解释列可见性。
  string online_time = 7;
  // sort_order 是视图列展示和物化构建时的稳定排序。
  uint32 sort_order = 8;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 9;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 10;
  // attributes 是扩展属性；display_name 是用户可见中文列名，创建和更新时必须包含中文且不超过 10 个字符。
  map<string, string> attributes = 11;
}

// DataSource 表示 Space 内的数据来源，交易所、行情接口、文件导入和内部计算都可作为来源。
message DataSource {
  // space_id 是 DataSource 所属 Space。
  string space_id = 1;
  // data_source_id 是 Space 内唯一的数据来源 ID。
  string data_source_id = 2;
  // name 是数据来源名称，通常用于管理台展示。
  string name = 3;
  // kind 表示来源类型，例如 exchange、vendor_api、file_import、manual 或 internal。
  string kind = 4;
  // market 是可选市场标识，例如 US、HK、CN 或 crypto。
  string market = 5;
  // timezone 是该来源默认时区。
  string timezone = 6;
  // config_json 是来源连接和采集配置，服务端应按敏感配置处理。
  string config_json = 7;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 8;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 9;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 10;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 11;
}

// Subject 表示 Space 内的数据对象，交易标的只是其中一种。
message Subject {
  // space_id 是 Subject 所属 Space。
  string space_id = 1;
  // subject_id 是 Space 内唯一的数据对象 ID。
  string subject_id = 2;
  // subject_type 是对象类型，例如 stock、crypto_pair、ranking_board、news_source 或 custom。
  string subject_type = 3;
  // name 是对象名称，通常用于管理台展示。
  string name = 4;
  // market 是可选市场标识。
  string market = 5;
  // currency 是交易、报价或结算币种。
  string currency = 6;
  // timezone 是该对象默认时区。
  string timezone = 7;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 8;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 9;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 10;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 11;
}

// SubjectSymbol 表示 Subject 在某个 DataSource 下的外部代码映射。
message SubjectSymbol {
  // space_id 是 SubjectSymbol 所属 Space。
  string space_id = 1;
  // subject_id 是 Space 内的数据对象 ID。
  string subject_id = 2;
  // data_source_id 是外部代码所属的数据来源 ID。
  string data_source_id = 3;
  // external_symbol 是数据来源使用的原始对象代码。
  string external_symbol = 4;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 5;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 6;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 7;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 8;
}

// Dataset 是 Space 内可写的事实数据集，定义一类数据及其列契约。
message Dataset {
  // space_id 是 Dataset 所属 Space。
  string space_id = 1;
  // dataset_id 是 Space 内唯一的数据集 ID；必须为 lower_snake_case，最长 20 字符。
  string dataset_id = 2;
  // data_source_id 是该 Dataset 绑定的数据来源 ID；一个 Dataset 只绑定一个 DataSource。
  string data_source_id = 3;
  // name 是数据集中文展示名，创建和更新时必须包含中文且不超过 10 个字符。
  string name = 4;
  // description 是说明文本。
  string description = 5;
  // data_kind 是数据集的结构形态。
  common.DataKind data_kind = 6;
  // freqs 是该数据集支持的数据频率列表。
  repeated string freqs = 7;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 8;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 9;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 10;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 11;
}

// DatasetSubject 表示 Dataset 覆盖的 Subject 集合。
message DatasetSubject {
  // space_id 是绑定关系所属 Space。
  string space_id = 1;
  // dataset_id 是数据集 ID。
  string dataset_id = 2;
  // subject_id 是业务对象 ID。
  string subject_id = 3;
  // subject_role 是 Subject 在数据集中的角色，例如 normal、benchmark、index、universe_member 或 record。
  string subject_role = 4;
  // effective_start_time 是 Subject 在数据集中的生效开始时间。
  string effective_start_time = 5;
  // effective_end_time 是 Subject 在数据集中的生效结束时间；为空表示仍然生效。
  string effective_end_time = 6;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 7;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 8;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 9;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 10;
}

// Field 是 Space 内普通字段字典，不直接归属某个 Dataset。
message Field {
  // space_id 是 Field 所属 Space。
  string space_id = 1;
  // field_id 是 Space 内唯一字段英文名，例如 open、close 或 volume。
  string field_id = 2;
  // name 是字段中文名或展示名。
  string name = 3;
  // description 是说明文本。
  string description = 4;
  // value_type 是字段值的逻辑类型。
  common.FieldValueType value_type = 5;
  // unit 是默认计量单位，例如 CNY、USD、share 或 percent。
  string unit = 6;
  // validation_rule_json 是字段写入校验规则。
  string validation_rule_json = 7;
  // write_example 是示例写入值，便于管理台展示和文档生成。
  string write_example = 8;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 9;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 10;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 11;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 12;
}

// Factor 是 Space 内、已参数化的因子结果定义。
message Factor {
  // space_id 是 Factor 所属 Space。
  string space_id = 1;
  // factor_id 是 Space 内唯一因子英文名，例如 ma20_close。
  string factor_id = 2;
  // name 是因子中文名或展示名。
  string name = 3;
  // description 是说明文本。
  string description = 4;
  // algorithm 是因子算法或计算族标识，例如 MA 或 RSI。
  string algorithm = 5;
  // params_json 是已参数化后的因子参数，例如 {"window":20,"price":"close"}。
  string params_json = 6;
  // value_type 是因子值的逻辑类型。
  common.FieldValueType value_type = 7;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 8;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 9;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 10;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 11;
}

// DatasetColumn 表示 Dataset 下允许写入和读取的一列。
message DatasetColumn {
  // space_id 是 DatasetColumn 所属 Space。
  string space_id = 1;
  // dataset_id 是数据集 ID。
  string dataset_id = 2;
  // column_name 是数据集内稳定技术列名。
  string column_name = 3;
  // origin_type 表示列来源，可为字段、因子或系统列。
  common.DatasetColumnOriginType origin_type = 4;
  // origin_id 是字段 ID、因子 ID 或系统列名。
  string origin_id = 5;
  // value_type 是列值的逻辑类型。
  common.FieldValueType value_type = 6;
  // required 表示采集契约或全量导入时是否必填；字段级更新不要求每次携带。
  bool required = 7;
  // is_unique 表示该列是否参与数据集内唯一性约束。
  bool is_unique = 8;
  // aliases 是外部来源字段名别名。
  repeated string aliases = 9;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 10;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 11;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 12;
  // attributes 是扩展属性；display_name 是用户可见中文列名，创建和更新时必须包含中文且不超过 10 个字符。
  map<string, string> attributes = 13;
}

// PrimaryStoreNode 表示在线主存节点，即一个 PrimaryStore 服务实例或服务组入口。
message PrimaryStoreNode {
  // node_id 是存储节点 ID。
  string node_id = 1;
  // name 是节点名称，通常用于管理台展示。
  string name = 2;
  // endpoint 是 PrimaryStore 服务地址。
  string endpoint = 3;
  // weight 是路由权重。
  uint32 weight = 4;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 5;
  // config_json 是节点专用配置。
  string config_json = 6;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 7;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 8;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 9;
}

// Device 是底层具体存储组件，例如 Pebble、DuckDB、Bleve 或 Parquet 归档。
message Device {
  // device_id 是设备 ID。
  string device_id = 1;
  // node_id 是所属存储节点 ID。
  string node_id = 2;
  // name 是设备名称，通常用于管理台展示。
  string name = 3;
  // engine 是存储引擎，例如 pebble、duckdb、bleve 或 parquet_archive。
  string engine = 4;
  // endpoint 是连接地址、文件路径或 URI。
  string endpoint = 5;
  // config_json 是设备专用配置。
  string config_json = 6;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 7;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 8;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 9;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 10;
}

// PrimaryStoreRoute 表示在线事实主存的水平切分路由。
message PrimaryStoreRoute {
  // space_id 是路由所属 Space。
  string space_id = 1;
  // route_id 是路由规则 ID。
  string route_id = 2;
  // dataset_id 是数据集 ID。
  string dataset_id = 3;
  // subject_id 是精确匹配的数据对象 ID；为空表示不按对象精确匹配。
  string subject_id = 4;
  // subject_pattern 是对象匹配模式；为空表示不使用模式匹配。
  string subject_pattern = 5;
  // hash_rule 是水平切分哈希规则；为空表示不使用哈希切分。
  string hash_rule = 6;
  // node_id 是目标 PrimaryStore 节点 ID。
  string node_id = 7;
  // priority 是路由优先级，数值越小优先级越高。
  uint32 priority = 8;
  // status 表示启用、停用、构建中、归档或删除等状态。
  string status = 9;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 10;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 11;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 12;
}

// ArchiveFile 表示从 Pebble 主存归档出来的 Parquet 事实文件。
message ArchiveFile {
  // space_id 是归档所属 Space。
  string space_id = 1;
  // archive_file_id 是归档文件记录 ID。
  string archive_file_id = 2;
  // dataset_id 是归档所属数据集 ID。
  string dataset_id = 3;
  // device_id 是归档文件所在设备 ID。
  string device_id = 4;
  // partition_key 是归档分区键，例如 date=2026-06-15/source=binance。
  string partition_key = 5;
  // file_uri 是归档文件 URI。
  string file_uri = 6;
  // file_format 是文件格式，当前固定为 parquet。
  string file_format = 7;
  // min_time 是文件内最小数据时间。
  string min_time = 8;
  // max_time 是文件内最大数据时间。
  string max_time = 9;
  // row_count 是文件内事实行数。
  uint64 row_count = 10;
  // content_hash 是归档文件内容校验值。
  string content_hash = 11;
  // columns 是该文件包含的事实列名列表。
  repeated string columns = 12;
  // status 表示启用、停用、归档、删除或失败等状态。
  string status = 13;
  // created_at 是创建时间，使用项目统一时间字符串格式。
  string created_at = 14;
  // updated_at 是最后更新时间，使用项目统一时间字符串格式。
  string updated_at = 15;
  // attributes 是扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 16;
}

// CreateSpaceReq 表示创建使用空间的请求。
message CreateSpaceReq {
  // auth_info 是调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // space 是待创建的使用空间元数据。
  Space space = 2;
}

// CreateSpaceRsp 表示创建使用空间的响应。
message CreateSpaceRsp {
  // ret_info 是接口返回状态。
  common.RetInfo ret_info = 1;
  // space 是创建后的使用空间元数据。
  Space space = 2;
}

// UpdateSpaceReq 表示更新使用空间的请求。
message UpdateSpaceReq {
  // auth_info 是调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // space 是更新后的使用空间元数据。
  Space space = 2;
}

// UpdateSpaceRsp 表示更新使用空间的响应。
message UpdateSpaceRsp {
  // ret_info 是接口返回状态。
  common.RetInfo ret_info = 1;
  // space 是更新后的使用空间元数据。
  Space space = 2;
}

// GetSpaceReq 表示获取使用空间的请求。
message GetSpaceReq {
  // auth_info 是调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // space_id 是使用空间 ID。
  string space_id = 2;
}

// GetSpaceRsp 表示获取使用空间的响应。
message GetSpaceRsp {
  // ret_info 是接口返回状态。
  common.RetInfo ret_info = 1;
  // space 是使用空间元数据。
  Space space = 2;
}

// ListSpacesReq 表示列出使用空间的请求。
message ListSpacesReq {
  // auth_info 是调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // owner 是可选拥有者过滤条件。
  string owner = 2;
  // page 是分页参数。
  common.Page page = 3;
}

// ListSpacesRsp 表示列出使用空间的响应。
message ListSpacesRsp {
  // ret_info 是接口返回状态。
  common.RetInfo ret_info = 1;
  // spaces 是使用空间列表。
  repeated Space spaces = 2;
  // page_result 是分页结果。
  common.PageResult page_result = 3;
