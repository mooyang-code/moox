// 元数据管理服务，供存储、采集、因子计算和查询规划使用。
service MetadataService {
  // 创建工作空间。
  rpc CreateWorkspace(CreateWorkspaceReq) returns (CreateWorkspaceRsp);
  // 更新工作空间元数据和状态。
  rpc UpdateWorkspace(UpdateWorkspaceReq) returns (UpdateWorkspaceRsp);
  // 按 ID 获取工作空间。
  rpc GetWorkspace(GetWorkspaceReq) returns (GetWorkspaceRsp);
  // 列出调用方可见的工作空间。
  rpc ListWorkspaces(ListWorkspacesReq) returns (ListWorkspacesRsp);

  // 创建交易场所或数据场所。
  rpc CreateExchange(CreateExchangeReq) returns (CreateExchangeRsp);
  // 更新交易场所元数据。
  rpc UpdateExchange(UpdateExchangeReq) returns (UpdateExchangeRsp);
  // 按 ID 获取交易场所。
  rpc GetExchange(GetExchangeReq) returns (GetExchangeRsp);
  // 列出交易场所，可按市场过滤。
  rpc ListExchanges(ListExchangesReq) returns (ListExchangesRsp);

  // 创建或更新内部标准化标的。
  rpc UpsertInstrument(UpsertInstrumentReq) returns (UpsertInstrumentRsp);
  // 按 ID 获取标的。
  rpc GetInstrument(GetInstrumentReq) returns (GetInstrumentRsp);
  // 按交易场所、市场或指定 ID 列出标的。
  rpc ListInstruments(ListInstrumentsReq) returns (ListInstrumentsRsp);
  // 创建或更新外部代码映射。
  rpc UpsertInstrumentAlias(UpsertInstrumentAliasReq) returns (UpsertInstrumentAliasRsp);
  // 列出外部代码映射。
  rpc ListInstrumentAliases(ListInstrumentAliasesReq) returns (ListInstrumentAliasesRsp);

  // 创建逻辑数据集。
  rpc CreateDataSet(CreateDataSetReq) returns (CreateDataSetRsp);
  // 更新数据集元数据、维度或结构版本。
  rpc UpdateDataSet(UpdateDataSetReq) returns (UpdateDataSetRsp);
  // 获取一个数据集。
  rpc GetDataSet(GetDataSetReq) returns (GetDataSetRsp);
  // 按工作空间和分类条件列出数据集。
  rpc ListDataSets(ListDataSetsReq) returns (ListDataSetsRsp);

  // 创建数据集字段定义。
  rpc CreateField(CreateFieldReq) returns (CreateFieldRsp);
  // 更新数据集字段定义。
  rpc UpdateField(UpdateFieldReq) returns (UpdateFieldRsp);
  // 按字段 ID 或接口名获取字段定义。
  rpc GetField(GetFieldReq) returns (GetFieldRsp);
  // 列出一个数据集下的字段定义。
  rpc ListFields(ListFieldsReq) returns (ListFieldsRsp);

  // 创建因子算法定义。
  rpc CreateFactorDef(CreateFactorDefReq) returns (CreateFactorDefRsp);
  // 更新因子算法定义。
  rpc UpdateFactorDef(UpdateFactorDefReq) returns (UpdateFactorDefRsp);
  // 获取一个因子算法定义。
  rpc GetFactorDef(GetFactorDefReq) returns (GetFactorDefRsp);
  // 列出一个工作空间中的因子算法定义。
  rpc ListFactorDefs(ListFactorDefsReq) returns (ListFactorDefsRsp);

  // 创建一个带参数的因子实例。
  rpc CreateFactorInstance(CreateFactorInstanceReq) returns (CreateFactorInstanceRsp);
  // 更新一个带参数的因子实例。
  rpc UpdateFactorInstance(UpdateFactorInstanceReq) returns (UpdateFactorInstanceRsp);
  // 获取一个因子实例。
  rpc GetFactorInstance(GetFactorInstanceReq) returns (GetFactorInstanceRsp);
  // 按工作空间和可选条件列出因子实例。
  rpc ListFactorInstances(ListFactorInstancesReq) returns (ListFactorInstancesRsp);

  // 创建面向查询的数据视图。
  rpc CreateDataView(CreateDataViewReq) returns (CreateDataViewRsp);
  // 更新数据视图，或创建新的视图版本。
  rpc UpdateDataView(UpdateDataViewReq) returns (UpdateDataViewRsp);
  // 获取一个数据视图。
  rpc GetDataView(GetDataViewReq) returns (GetDataViewRsp);
  // 列出一个工作空间中的数据视图。
  rpc ListDataViews(ListDataViewsReq) returns (ListDataViewsRsp);

  // 创建物理存储设备定义。
  rpc CreateStorageDevice(CreateStorageDeviceReq) returns (CreateStorageDeviceRsp);
  // 更新物理存储设备定义。
  rpc UpdateStorageDevice(UpdateStorageDeviceReq) returns (UpdateStorageDeviceRsp);
  // 获取一个存储设备定义。
  rpc GetStorageDevice(GetStorageDeviceReq) returns (GetStorageDeviceRsp);
  // 列出物理存储设备。
  rpc ListStorageDevices(ListStorageDevicesReq) returns (ListStorageDevicesRsp);

  // 创建逻辑到物理存储的路由规则。
  rpc CreateStorageRoute(CreateStorageRouteReq) returns (CreateStorageRouteRsp);
  // 更新存储路由规则。
  rpc UpdateStorageRoute(UpdateStorageRouteReq) returns (UpdateStorageRouteRsp);
  // 获取一个存储路由规则。
  rpc GetStorageRoute(GetStorageRouteReq) returns (GetStorageRouteRsp);
  // 按工作空间、数据集或设备列出存储路由。
  rpc ListStorageRoutes(ListStorageRoutesReq) returns (ListStorageRoutesRsp);

  // 创建或更新采集任务到目标数据集的绑定。
  rpc ConfigureCollectorDataSetBinding(ConfigureCollectorDataSetBindingReq) returns (ConfigureCollectorDataSetBindingRsp);
  // 列出采集任务到数据集的绑定关系。
  rpc ListCollectorDataSetBindings(ListCollectorDataSetBindingsReq) returns (ListCollectorDataSetBindingsRsp);
}
