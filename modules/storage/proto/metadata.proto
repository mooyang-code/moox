// Metadata 管理量化存储系统的核心元数据。
service Metadata {
  // 创建使用空间。
  rpc CreateSpace(CreateSpaceReq) returns (CreateSpaceRsp);
  // 更新使用空间。
  rpc UpdateSpace(UpdateSpaceReq) returns (UpdateSpaceRsp);
  // 按 ID 获取使用空间。
  rpc GetSpace(GetSpaceReq) returns (GetSpaceRsp);
  // 列出使用空间。
  rpc ListSpaces(ListSpacesReq) returns (ListSpacesRsp);

  // 创建查询视图。
  rpc CreateView(CreateViewReq) returns (CreateViewRsp);
  // 更新查询视图。
  rpc UpdateView(UpdateViewReq) returns (UpdateViewRsp);
  // 按 ID 获取查询视图。
  rpc GetView(GetViewReq) returns (GetViewRsp);
  // 列出查询视图。
  rpc ListViews(ListViewsReq) returns (ListViewsRsp);
  // 创建或更新视图列。
  rpc UpsertViewColumn(UpsertViewColumnReq) returns (UpsertViewColumnRsp);
  // 列出视图列。
  rpc ListViewColumns(ListViewColumnsReq) returns (ListViewColumnsRsp);

  // 创建数据来源。
  rpc CreateDataSource(CreateDataSourceReq) returns (CreateDataSourceRsp);
  // 更新数据来源。
  rpc UpdateDataSource(UpdateDataSourceReq) returns (UpdateDataSourceRsp);
  // 按 ID 获取数据来源。
  rpc GetDataSource(GetDataSourceReq) returns (GetDataSourceRsp);
  // 列出数据来源。
  rpc ListDataSources(ListDataSourcesReq) returns (ListDataSourcesRsp);

  // 创建或更新数据对象。
  rpc UpsertSubject(UpsertSubjectReq) returns (UpsertSubjectRsp);
  // 注册数据对象、来源侧代码映射和数据集绑定。
  rpc RegisterDataSubject(RegisterDataSubjectReq) returns (RegisterDataSubjectRsp);
  // 按 ID 获取数据对象。
  rpc GetSubject(GetSubjectReq) returns (GetSubjectRsp);
  // 列出数据对象。
  rpc ListSubjects(ListSubjectsReq) returns (ListSubjectsRsp);
  // 列出数据对象的来源侧代码映射。
  rpc ListSubjectSymbols(ListSubjectSymbolsReq) returns (ListSubjectSymbolsRsp);

  // 创建数据集。
  rpc CreateDataset(CreateDatasetReq) returns (CreateDatasetRsp);
  // 更新数据集。
  rpc UpdateDataset(UpdateDatasetReq) returns (UpdateDatasetRsp);
  // 按 ID 获取数据集。
  rpc GetDataset(GetDatasetReq) returns (GetDatasetRsp);
  // 列出数据集。
  rpc ListDatasets(ListDatasetsReq) returns (ListDatasetsRsp);
  // 为 Dataset 绑定 Subject。
  rpc BindDatasetSubject(BindDatasetSubjectReq) returns (BindDatasetSubjectRsp);
  // 列出 Dataset 覆盖的 Subject。
  rpc ListDatasetSubjects(ListDatasetSubjectsReq) returns (ListDatasetSubjectsRsp);

  // 创建普通字段。
  rpc CreateField(CreateFieldReq) returns (CreateFieldRsp);
  // 更新普通字段。
  rpc UpdateField(UpdateFieldReq) returns (UpdateFieldRsp);
  // 按字段 ID 获取字段。
  rpc GetField(GetFieldReq) returns (GetFieldRsp);
  // 列出普通字段。
  rpc ListFields(ListFieldsReq) returns (ListFieldsRsp);

  // 创建因子。
  rpc CreateFactor(CreateFactorReq) returns (CreateFactorRsp);
  // 更新因子。
  rpc UpdateFactor(UpdateFactorReq) returns (UpdateFactorRsp);
  // 按 ID 获取因子。
  rpc GetFactor(GetFactorReq) returns (GetFactorRsp);
  // 列出因子。
  rpc ListFactors(ListFactorsReq) returns (ListFactorsRsp);

  // 创建或更新数据集列。
  rpc UpsertDatasetColumn(UpsertDatasetColumnReq) returns (UpsertDatasetColumnRsp);
  // 列出数据集列。
  rpc ListDatasetColumns(ListDatasetColumnsReq) returns (ListDatasetColumnsRsp);

  // 创建存储节点。
  rpc CreatePrimaryStoreNode(CreatePrimaryStoreNodeReq) returns (CreatePrimaryStoreNodeRsp);
  // 更新存储节点。
  rpc UpdatePrimaryStoreNode(UpdatePrimaryStoreNodeReq) returns (UpdatePrimaryStoreNodeRsp);
  // 按 ID 获取存储节点。
  rpc GetPrimaryStoreNode(GetPrimaryStoreNodeReq) returns (GetPrimaryStoreNodeRsp);
  // 列出存储节点。
  rpc ListPrimaryStoreNodes(ListPrimaryStoreNodesReq) returns (ListPrimaryStoreNodesRsp);

  // 创建设备。
  rpc CreateDevice(CreateDeviceReq) returns (CreateDeviceRsp);
  // 更新设备。
  rpc UpdateDevice(UpdateDeviceReq) returns (UpdateDeviceRsp);
  // 按 ID 获取设备。
  rpc GetDevice(GetDeviceReq) returns (GetDeviceRsp);
  // 列出设备。
  rpc ListDevices(ListDevicesReq) returns (ListDevicesRsp);

  // 创建在线主存路由。
  rpc CreatePrimaryStoreRoute(CreatePrimaryStoreRouteReq) returns (CreatePrimaryStoreRouteRsp);
  // 更新在线主存路由。
  rpc UpdatePrimaryStoreRoute(UpdatePrimaryStoreRouteReq) returns (UpdatePrimaryStoreRouteRsp);
  // 按 ID 获取在线主存路由。
  rpc GetPrimaryStoreRoute(GetPrimaryStoreRouteReq) returns (GetPrimaryStoreRouteRsp);
  // 列出在线主存路由。
  rpc ListPrimaryStoreRoutes(ListPrimaryStoreRoutesReq) returns (ListPrimaryStoreRoutesRsp);

  // 登记 Parquet 归档文件。
  rpc RegisterArchiveFile(RegisterArchiveFileReq) returns (RegisterArchiveFileRsp);
  // 列出 Parquet 归档文件。
  rpc ListArchiveFiles(ListArchiveFilesReq) returns (ListArchiveFilesRsp);
}
