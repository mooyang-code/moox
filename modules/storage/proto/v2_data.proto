syntax = "proto3";

package trpc.storage.v2.data;

option go_package = "github.com/mooyang-code/moox/modules/storage/proto/genv2;storagepb";

import "v2_common.proto";

// 一次读写中的逻辑数据定位，不暴露物理表、文件路径或存储分区。
message DataRef {
  // 工作空间 ID，用于隔离数据和元数据。
  string workspace_id = 1;
  // 数据集 ID。
  string dataset_id = 2;
  // 内部标的 ID；非标的数据可为空。
  string instrument_id = 3;
  // 交易场所或数据场所 ID。
  string exchange_id = 4;
  // 数据频率，例如 1m、1d 或 tick。
  string freq = 5;
  // 业务维度取值，替代底层分区键概念。
  repeated common.DimensionValue dimension_values = 6;
}

// 普通结构化记录，用于资料、榜单、文档、事件或快照数据。
message Record {
  // 数据切片内的逻辑记录 ID。
  string record_id = 1;
  // 记录所属的逻辑数据位置。
  DataRef data_ref = 2;
  // 业务事件时间。
  string event_time = 3;
  // 记录代表的截面时间。
  string snapshot_time = 4;
  // 字段值列表。
  repeated common.FieldValue fields = 5;
  // 扩展属性，默认不作为索引字段使用。
  map<string, string> attributes = 6;
}

// 一条结构化记录写入操作。
message RecordMutation {
  // 本次写入如何影响已有数据。
  common.WriteMode write_mode = 1;
  // 记录内容。
  Record record = 2;
}

// 一个带时间戳的时序点，例如 K 线或 tick。
message TimeSeriesPoint {
  // 记录所属的逻辑数据位置。
  DataRef data_ref = 1;
  // 时序点时间戳。
  string time = 2;
  // 字段值列表。
  repeated common.FieldValue fields = 3;
}

// 某个因子实例在某个时间点的计算结果。
message FactorValuePoint {
  // 记录所属的逻辑数据位置。
  DataRef data_ref = 1;
  // 因子值时间戳。
  string time = 2;
  // 因子实例 ID，表示带参数的因子结果。
  string factor_instance_id = 3;
  // 计算后的因子值。
  common.TypedValue value = 4;
}

// 某个逻辑数据切片在指定截面前后的最新状态。
message LatestSnapshotRow {
  // 记录所属的逻辑数据位置。
  DataRef data_ref = 1;
  // 服务端实际选中的最新快照时间。
  string snapshot_time = 2;
  // 字段值列表。
  repeated common.FieldValue fields = 3;
}

// 写入普通结构化记录的请求。
message UpsertRecordsReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 记录级写入操作列表。
  repeated RecordMutation mutations = 2;
}

// 普通结构化记录写入结果。
message UpsertRecordsRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // 服务端接受或影响的记录数。
  uint64 affected = 2;
  // 部分写入失败的记录 ID 列表。
  repeated string failed_record_ids = 3;
}

// 按逻辑位置和过滤条件查询普通结构化记录的请求。
message QueryRecordsReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 记录所属的逻辑数据位置。
  DataRef data_ref = 2;
  // 过滤条件列表。
  repeated common.FilterExpr filters = 3;
  // 排序条件列表。
  repeated common.SortSpec sorts = 4;
  // 分页参数。
  common.Page page = 5;
}

// 普通结构化记录查询结果。
message QueryRecordsRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // records 参数。
  repeated Record records = 2;
  // 分页结果。
  common.PageResult page_result = 3;
}

// 写入时序数据点的请求。
message SetTimeSeriesReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 本次写入如何影响已有数据。
  common.WriteMode write_mode = 2;
  // 时序点或因子点列表。
  repeated TimeSeriesPoint points = 3;
}

// 时序数据写入结果。
message SetTimeSeriesRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // 服务端接受或影响的记录数。
  uint64 affected = 2;
}

// 按逻辑位置和时间区间扫描时序数据的请求。
message ScanTimeSeriesReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 记录所属的逻辑数据位置。
  DataRef data_ref = 2;
  // time_range 参数。
  common.TimeRange time_range = 3;
  // 要返回的字段名列表；为空时由服务端使用默认字段或全部可读字段。
  repeated string field_names = 4;
  // 排序条件列表。
  repeated common.SortSpec sorts = 5;
  // 分页参数。
  common.Page page = 6;
}

// 时序数据扫描结果。
message ScanTimeSeriesRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // 时序点或因子点列表。
  repeated TimeSeriesPoint points = 2;
  // 分页结果。
  common.PageResult page_result = 3;
}

// 写入因子值的请求，不为每组参数自动创建全局字段。
message SetFactorValuesReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 本次写入如何影响已有数据。
  common.WriteMode write_mode = 2;
  // 时序点或因子点列表。
  repeated FactorValuePoint points = 3;
}

// 因子值写入结果。
message SetFactorValuesRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // 服务端接受或影响的记录数。
  uint64 affected = 2;
}

// 按逻辑位置、因子实例和时间区间扫描因子值的请求。
message ScanFactorValuesReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 记录所属的逻辑数据位置。
  DataRef data_ref = 2;
  // factor_instance_ids 参数。
  repeated string factor_instance_ids = 3;
  // time_range 参数。
  common.TimeRange time_range = 4;
  // 分页参数。
  common.Page page = 5;
}

// 因子值扫描结果。
message ScanFactorValuesRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // 时序点或因子点列表。
  repeated FactorValuePoint points = 2;
  // 分页结果。
  common.PageResult page_result = 3;
}

// 获取每个逻辑数据切片最新状态的请求。
message GetLatestSnapshotReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 要查询的逻辑数据位置列表。
  repeated DataRef data_refs = 2;
  // 要返回的字段名列表；为空时由服务端使用默认字段或全部可读字段。
  repeated string field_names = 3;
  // 截面时间，用于表示某一时点的状态。
  string snapshot_time = 4;
}

// 最新状态查询结果。
message GetLatestSnapshotRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // 返回行列表。
  repeated LatestSnapshotRow rows = 2;
}

// 在线数据读写服务，负责普通记录、时序数据、因子值和最新快照。
service DataService {
  // 写入普通结构化数据，例如公司资料、榜单行或公告摘要。
  rpc UpsertRecords(UpsertRecordsReq) returns (UpsertRecordsRsp);
  // 按逻辑位置、过滤条件、排序和分页查询普通结构化数据。
  rpc QueryRecords(QueryRecordsReq) returns (QueryRecordsRsp);
  // 写入有序时序事实数据，例如 K 线或 tick。
  rpc SetTimeSeries(SetTimeSeriesReq) returns (SetTimeSeriesRsp);
  // 按时间区间扫描有序时序事实数据。
  rpc ScanTimeSeries(ScanTimeSeriesReq) returns (ScanTimeSeriesRsp);
  // 按因子实例写入计算后的因子结果。
  rpc SetFactorValues(SetFactorValuesReq) returns (SetFactorValuesRsp);
  // 按逻辑位置、因子实例和时间区间扫描因子结果。
  rpc ScanFactorValues(ScanFactorValuesReq) returns (ScanFactorValuesRsp);
  // 获取每个逻辑数据位置的最新可用状态。
  rpc GetLatestSnapshot(GetLatestSnapshotReq) returns (GetLatestSnapshotRsp);
}
