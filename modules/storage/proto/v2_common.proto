syntax = "proto3";

package trpc.storage.v2.common;

option go_package = "github.com/mooyang-code/moox/modules/storage/proto/genv2;storagepb";

message AuthInfo {
  string app_id = 1;
  string app_key = 2;
  string operator = 3;
  string request_id = 4;
}

message RetInfo {
  ErrorCode code = 1;
  string msg = 2;
}

message Page {
  uint32 page = 1;
  uint32 size = 2;
}

message PageResult {
  uint32 page = 1;
  uint32 size = 2;
  uint64 total = 3;
  bool has_more = 4;
  string next_cursor = 5;
}

message TimeRange {
  string start_time = 1;
  string end_time = 2;
  bool start_inclusive = 3;
  bool end_inclusive = 4;
}

message ValueList {
  repeated TypedValue values = 1;
}

message TypedValue {
  oneof value {
    string string_value = 1;
    int64 int_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    string time_value = 5;
    string json_value = 6;
    bytes bytes_value = 7;
    ValueList list_value = 8;
  }
}

message DimensionValue {
  string name = 1;
  string value = 2;
}

message DimensionValues {
  repeated DimensionValue values = 1;
}

message FieldValue {
  string field_id = 1;
  string field_name = 2;
  FieldValueType value_type = 3;
  TypedValue value = 4;
}

message SortSpec {
  string field_name = 1;
  bool desc = 2;
}

message FilterExpr {
  string expr = 1;
  map<string, TypedValue> args = 2;
}

enum WriteMode {
  WRITE_MODE_UNSPECIFIED = 0;
  WRITE_MODE_UPSERT = 1;
  WRITE_MODE_APPEND = 2;
  WRITE_MODE_OVERWRITE = 3;
  WRITE_MODE_DELETE = 4;
}

enum DataKind {
  DATA_KIND_UNSPECIFIED = 0;
  DATA_KIND_OBJECT = 1;
  DATA_KIND_TIME_SERIES = 2;
  DATA_KIND_SNAPSHOT = 3;
  DATA_KIND_EVENT = 4;
  DATA_KIND_DOCUMENT = 5;
  DATA_KIND_TABLE = 6;
}

enum DataDomain {
  DATA_DOMAIN_UNSPECIFIED = 0;
  DATA_DOMAIN_MARKET_BAR = 1;
  DATA_DOMAIN_MARKET_TICK = 2;
  DATA_DOMAIN_ORDER_BOOK = 3;
  DATA_DOMAIN_TRADE = 4;
  DATA_DOMAIN_SYMBOL_PROFILE = 5;
  DATA_DOMAIN_COMPANY_PROFILE = 6;
  DATA_DOMAIN_NEWS = 7;
  DATA_DOMAIN_ANNOUNCEMENT = 8;
  DATA_DOMAIN_FACTOR_VALUE = 9;
  DATA_DOMAIN_RANKING_LIST = 10;
  DATA_DOMAIN_FINANCIAL_REPORT = 11;
}

enum FieldValueType {
  FIELD_VALUE_TYPE_UNSPECIFIED = 0;
  FIELD_VALUE_TYPE_STRING = 1;
  FIELD_VALUE_TYPE_INT = 2;
  FIELD_VALUE_TYPE_DOUBLE = 3;
  FIELD_VALUE_TYPE_BOOL = 4;
  FIELD_VALUE_TYPE_TIME = 5;
  FIELD_VALUE_TYPE_JSON = 6;
  FIELD_VALUE_TYPE_BYTES = 7;
}

enum ColumnOrigin {
  COLUMN_ORIGIN_UNSPECIFIED = 0;
  COLUMN_ORIGIN_FIELD = 1;
  COLUMN_ORIGIN_FACTOR_INSTANCE = 2;
  COLUMN_ORIGIN_EXPRESSION = 3;
  COLUMN_ORIGIN_SYSTEM_COLUMN = 4;
}

enum ErrorCode {
  SUCCESS = 0;
  INVALID_PARAM = 1;
  NO_AUTH = 2;
  NO_PERMISSION = 3;
  INNER_ERR = 4;
  WORKSPACE_NOT_FOUND = 5;
  DATASET_NOT_FOUND = 6;
  INSTRUMENT_NOT_FOUND = 7;
  FIELD_NOT_FOUND = 8;
  FACTOR_INSTANCE_NOT_FOUND = 9;
  DATA_VIEW_NOT_READY = 10;
  DATA_VIEW_COLUMN_NOT_FOUND = 11;
  QUERY_SHAPE_UNSUPPORTED = 12;
  ROUTE_NOT_FOUND = 13;
  ROUTE_CROSS_DEVICE_UNSUPPORTED = 14;
  ENGINE_CAPABILITY_UNSUPPORTED = 15;
  DIMENSION_VALUE_INVALID = 16;
}
