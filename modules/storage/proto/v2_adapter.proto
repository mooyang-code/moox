syntax = "proto3";

package trpc.storage.v2.adapter;

option go_package = "github.com/mooyang-code/moox/modules/storage/proto/genv2;storagepb";

import "v2_common.proto";
import "v2_data.proto";

// 一个存储设备内的物理表或物理索引引用，仅供存储内部使用。
message PhysicalTableRef {
  // 存储设备 ID。
  string device_id = 1;
  // 存储引擎内部的物理表名或索引名。
  string table_name = 2;
  // 数据集的结构形态。
  common.DataKind data_kind = 3;
  // 数据集 ID。
  string dataset_id = 4;
}

// 创建物理表或物理索引的请求。
message CreatePhysicalTableReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 物理表或物理索引引用。
  PhysicalTableRef table = 2;
  // 返回列或请求列列表。
  repeated string columns = 3;
  // 为 true 时允许按引擎能力执行强制创建或幂等创建。
  bool force_create = 4;
}

// 物理表或物理索引创建结果。
message CreatePhysicalTableRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
}

// 删除物理表或物理索引的请求。
message DropPhysicalTableReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 物理表或物理索引引用。
  PhysicalTableRef table = 2;
  // 为 true 时允许在非关键元数据不一致时继续删除。
  bool force_drop = 3;
}

// 物理表或物理索引删除结果。
message DropPhysicalTableRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
}

// 逻辑路由完成后写入物理行的请求。
message WriteRowsReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 物理表或物理索引引用。
  PhysicalTableRef table = 2;
  // 本次写入如何影响已有数据。
  common.WriteMode write_mode = 3;
  // 返回行列表。
  repeated data.Record rows = 4;
}

// 物理行写入结果。
message WriteRowsRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // 服务端接受或影响的记录数。
  uint64 affected = 2;
}

// 扫描物理表行的请求。
message ScanRowsReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 物理表或物理索引引用。
  PhysicalTableRef table = 2;
  // 过滤条件列表。
  repeated common.FilterExpr filters = 3;
  // 排序条件列表。
  repeated common.SortSpec sorts = 4;
  // 分页参数。
  common.Page page = 5;
}

// 物理表行扫描结果。
message ScanRowsRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // 返回行列表。
  repeated data.Record rows = 2;
  // 分页结果。
  common.PageResult page_result = 3;
}

// 解释逻辑数据会命中哪些物理表的请求。
message ExplainRouteReq {
  // 调用方身份和链路追踪信息。
  common.AuthInfo auth_info = 1;
  // 记录所属的逻辑数据位置。
  data.DataRef data_ref = 2;
  // 要返回的字段名列表；为空时由服务端使用默认字段或全部可读字段。
  repeated string field_names = 3;
}

// 逻辑到物理路由解释结果。
message ExplainRouteRsp {
  // 接口返回状态。
  common.RetInfo ret_info = 1;
  // tables 参数。
  repeated PhysicalTableRef tables = 2;
}

// 存储引擎内部执行服务，在元数据和路由解析后调用。
service Adapter {
  // 为解析后的存储路由创建物理表或物理索引。
  rpc CreatePhysicalTable(CreatePhysicalTableReq) returns (CreatePhysicalTableRsp);
  // 删除物理表或物理索引。
  rpc DropPhysicalTable(DropPhysicalTableReq) returns (DropPhysicalTableRsp);
  // 将已完成路由的记录写入物理引擎。
  rpc WriteRows(WriteRowsReq) returns (WriteRowsRsp);
  // 从物理引擎扫描已完成路由的记录。
  rpc ScanRows(ScanRowsReq) returns (ScanRowsRsp);
  // 解释逻辑数据到物理表的路由结果。
  rpc ExplainRoute(ExplainRouteReq) returns (ExplainRouteRsp);
}
