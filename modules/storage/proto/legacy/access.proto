syntax = "proto3";

package trpc.storage.access;
option go_package = "github.com/mooyang-code/moox/modules/storage/proto/gen";
import "trpc/proto/trpc_options.proto";
import "common.proto";


// 访问数据的键值组合
message DataKey {
  // 项目ID 
  int32 project_id = 1;
  // 数据集ID
  int32 dataset_id = 2;
  // 数据对象ID
  string object_id = 3;
  // 时序频率:规则如下
  // 秒-小写s
  // 分钟-小写m
  // 小时-大写H
  // 天-大写D
  // 周-大写W
  // 月-大写M（区别于分钟）
  // 年-大写Y
  string freq = 4;
}

// 字段值表示
message FieldValue {
  // 字段英文名（在project中唯一）
  string field_key = 1;
  // 字段类型（这里只精细到一级类型，二级类型用于写入数据校验和展示样式）
  common.EnumFieldType field_type = 2;
  // 简单类型字段值
  common.SimpleValue simple_value = 3;
  // Map类型值
  common.MapContainer map_value = 4;

  // 选项映射（值ID到文本的映射，用于选型值展示翻译）
  map<int64, string> option_mapping = 5;
}

// 更新字段表示
message UpdateField {
  // 字段英文名
  string field_key = 1;
  // 字段类型
  common.EnumFieldType field_type = 2;
  // 更新方式
  common.EnumUpdateType update_type = 3;
  // 简单类型字段值
  common.SimpleValue simple_value = 4;
  // Map类型值
  common.MapContainer map_value = 5;
}

// 数据行结构
message DataRow {
  // 时序数据的时刻值
  string times = 1;
  // 数据行ID
  string row_id = 2;
  // 字段值列表：Key是字段英文名。value是字段值
  map<string, FieldValue> fields = 3;
}

// 数据行列表（描述一张表中的N行数据）
message DataList { 
  // 数据键（相当于表ID）
  DataKey data_key = 1;
  // 数据行列表
  repeated DataRow data_rows = 2;
}

// 更新失败的数据行（描述单行数据）
message FailedDataRow {
  // 数据类型隐藏在dataset配置中，不显式暴露在接口参数中
  // 时序数据的时刻值, (时间格式YYYY-MM-DD HH:MM:SS）
  string times = 1;
  // 数据行ID（标记唯一行；新数据可不填，系统会自动分配）
  string row_id = 2;
  // 该行读写失败字段列表；Key是字段英文名。value是失败信息
  map<string, common.FailedInfo> failed_list = 3;
}

// 更新失败的数据行列表（描述一张表中的N行数据）
message FailedDataList { 
  // 数据键（相当于表ID）
  DataKey data_key = 1;
  // 数据行列表
  repeated FailedDataRow data_rows = 2;
}

// 数据对象行（描述单行数据）
message ObjectRow {
  // 数据对象ID
  string object_id = 1;
  // 字段值列表：Key是字段英文名。value是字段值
  map<string, FieldValue> fields = 2;
}

// 更新数据行（描述单行数据）
message UpdateDataRow {
  // 时序数据的时刻值
  string times = 1;
  // 数据行ID
  string row_id = 2;
  // 更新字段列表
  map<string, UpdateField> fields = 3;
}

// 更新数据行列表（描述一张表中的N行数据）
message UpdateDataList { 
  // 数据键（相当于表ID）
  DataKey data_key = 1;
  // 数据行列表
  repeated UpdateDataRow data_rows = 2;
}

// 更新数据对象行
message UpdateObjectRow {
  // 数据对象ID
  string object_id = 1;
  // 更新的字段值列表(key为字段接口名)
  map<string, UpdateField> fields = 2;
}

// 返回操作失败的数据对象行信息
message FailedObjectRow {
  // 数据对象ID
  string object_id = 1;
  // 失败字段列表(key为字段接口名)
  map<string, common.FailedInfo> failed_list = 2;
}

// 排序信息
message SortInfo {
  // 字段名
  string field_key = 1;
  // 排序类型
  common.Sort sort = 2;
  // map字段的key（与字段名一起，唯一确定一个map字段的子项）
  string map_key = 3;
}

// 搜索条件
message Cond {
  // 字段名
  string field_key = 1;
  // 判断方式
  common.Operator op = 2;
  // 值
  common.SimpleValue value = 3;
  // map字段的key（与字段名一起，唯一确定一个map字段的子项）
  string map_key = 4;
}

// 搜索条件与选项
message Options {
  // 请求条件组
  repeated CondGroup cond_groups = 1;
  // 条件组关系
  common.Logical logical = 2;
  // 表达式请求条件, 例如：state=4||(MA.5>98&&symbol=600001)；若有值，则cond_groups失效
  string expr_cond = 3;
  // 排序信息
  repeated SortInfo sort = 4;
  // 返回字段
  repeated string includes = 5;
  // 搜索结果的最大数量（默认10000）
  uint32 max_num = 6;
}

// 搜索条件组
message CondGroup {
  // 条件
  repeated Cond conds = 1;
  // 条件间关系
  common.Logical logical = 2;
}

// 时间范围
message TimeRange {
  string start = 1; // YYYY-MM-DD HH:MM:SS
  
  oneof range_type {
    string end = 2;   // YYYY-MM-DD HH:MM:SS
    int32 periods = 3; // 周期数
  }
}

// 数据获取参数
message GetDataParams {
  // 数据键
  DataKey data_key = 1;
  // 时序数据区间（选填）
  TimeRange time_range = 2;
  // 数据行ID（选填，明确指定获取某行的数据）
  string row_id = 3;
  // 字段名列表（不填，默认拉取所有字段值）
  repeated string field_keys = 4;
  // 指定map字段的部分key读取，如果不指定则默认拉取map字段的全量key-value
  map<string, common.KeyList> map_keys = 5;
  // 该表一次返回结果的最大数量（max_limit最大值为1000；预估的超长数据请用search接口翻页）
  uint32 max_limit = 6;
}

// 获取数据请求（支持批量请求，例如可以同时拉取BTC、ETH 1H、1D等多种K线数据）
message GetDataReq {
  common.AuthInfo auth_info = 1;
  // 要获取的数据参数列表
  repeated GetDataParams data_params = 2;
}

message GetDataRsp {
  common.RetInfo ret_info = 1;
  // 获取成功的数据列表（key为：projectID_datasetID_objectID_freq）把同一个表的数据聚集在一起，方便上层取用，故用map
  map<string, DataList> data_list = 2;
  // 查询失败的列表（key为：projectID_datasetID_objectID_freq）
  map<string, FailedDataList> failed_list = 3;
}

// 数据创建和更新接口请求
message SetDataReq {
  common.AuthInfo auth_info = 1;
  // 要操作的数据行
  repeated UpdateDataList data_list = 2; 
}

message SetDataRsp {
  common.RetInfo ret_info = 1;
  // 更新失败的列表（key为：projectID_datasetID_objectID_freq）
  map<string, FailedDataList> failed_list = 2;
}

// 搜索列表请求（用于单表的复杂条件查询）
message SearchDataReq {
  // 鉴权信息
  common.AuthInfo auth_info = 1;
  // 数据键
  DataKey data_key = 2;
  // 时序数据区间（非时序数据可不填）
  TimeRange time_range = 3;
  // 返回时序排序类型
  common.Sort time_sort = 4;
  // 数据行ID（指定行ID搜索）
  string row_id = 5;
  // 搜索条件与选项
  Options options = 6;
  // 请求分页信息
  common.PageInfo page_info = 7;
}

// 搜索应答
message SearchDataRsp {
  // 返回错误码
  common.RetInfo ret_info = 1;
  // 结果总数
  uint64 total = 2;
  // 返回数据信息
  repeated DataRow data_rows = 3;
  // 失败字段列表(key为字段名)
  map<string, common.FailedInfo> failed_fields = 4;
}

// 删除数据请求
message DeleteDataReq {
  common.AuthInfo auth_info = 1;
  // 数据键
  DataKey data_key = 2;
  // 时序数据区间（选填，用于批量删除时序数据）
  TimeRange time_range = 3;
  // 要删除的数据行标识列表（选填，精确删除指定行）
  repeated string row_ids = 4;
}

// 删除数据应答
message DeleteDataRsp {
  common.RetInfo ret_info = 1;
}

// 创建数据对象请求（key冲突则更新）
message UpsertObjectReq {
  common.AuthInfo auth_info = 1;
  // 项目ID 
  int32 project_id = 2;
  // 数据集ID
  int32 dataset_id = 3;
  // 要更新的 数据对象属性值列表
  repeated UpdateObjectRow object_rows = 4;
}

// 创建数据对象应答
message UpsertObjectRsp {
  common.RetInfo ret_info = 1;
  // 更新失败的行
  repeated FailedObjectRow failed_rows = 2;
}

// 拉取数据对象请求
message FetchObjectReq {
  common.AuthInfo auth_info = 1;
  // 项目ID 
  int32 project_id = 2;
  // 数据集ID
  int32 dataset_id = 3;
  // 字段名列表（不填，默认拉取所有字段值）
  repeated string field_keys = 4;
  // 指定map字段的部分key读取，如果不指定则默认拉取map字段的全量key-value
  map<string, common.KeyList> map_keys = 5;
}

// 拉取数据对象应答
message FetchObjectRsp {
  common.RetInfo ret_info = 1;
  // 返回数据对象行信息
  repeated ObjectRow object_rows = 2;
  // 失败字段列表(key为字段名)
  map<string, common.FailedInfo> failed_fields = 3;
}

// 查询数据对象请求
message QueryObjectReq {
  // 鉴权信息
  common.AuthInfo auth_info = 1;
  // 项目ID 
  int32 project_id = 2;
  // 数据集ID
  int32 dataset_id = 3;
  // 搜索条件与选项
  Options options = 4;
  // 请求分页信息
  common.PageInfo page_info = 5;
}

// 查询数据对象应答
message QueryObjectRsp {
  // 返回错误码
  common.RetInfo ret_info = 1;
  // 结果总数
  uint64 total = 2;
  // 返回数据对象信息
  repeated ObjectRow object_rows = 3;
  // 失败字段列表(key为字段名)
  map<string, common.FailedInfo> failed_fields = 4;
}

// 删除数据对象请求
message DeleteObjectReq {
  common.AuthInfo auth_info = 1;
  // 项目ID
  int32 project_id = 2;
  // 数据集ID
  int32 dataset_id = 3;
  // 要删除的数据对象ID列表（选填，精确删除指定对象）
  repeated string object_ids = 4;
}

// 删除数据对象应答
message DeleteObjectRsp {
  common.RetInfo ret_info = 1;
}

// xData 数据接入层服务
service Access {
  // 创建数据对象接口（key冲突则更新）
  rpc UpsertObject(UpsertObjectReq) returns (UpsertObjectRsp);
  // 拉取数据对象接口（拉取某dataset下的所有数据对象， 名字改为 FetchALlObjects？）
  rpc FetchObject(FetchObjectReq) returns (FetchObjectRsp);
  // 查询数据对象接口（条件查询数据对象）
  rpc QueryObject(QueryObjectReq) returns (QueryObjectRsp);
  // 删除数据对象接口（软删除，设置_deleted字段）
  rpc DeleteObject(DeleteObjectReq) returns (DeleteObjectRsp);

  // 创建/更新数据详情接口，支持批量（key冲突则更新）
  rpc SetData(SetDataReq) returns (SetDataRsp);
  // 获取数据详情接口，支持批量（仅支持简单时间区间筛选，不支持复杂组合条件； 一些KV存储组件，仅支持GetData接口)
  // GetData主要用于一次性拉取多张表少量数据的场景，若要翻页拉取大量数据，请使用SearchData接口
  rpc GetData(GetDataReq) returns (GetDataRsp);
  // 搜索数据列表接口（用于单表的复杂条件查询）
  rpc SearchData(SearchDataReq) returns (SearchDataRsp);
  // 删除数据详情接口（软删除，设置_deleted字段）
  rpc DeleteData(DeleteDataReq) returns (DeleteDataRsp);
}
