syntax = "proto3";

package trpc.storage.adapter;
option go_package = "github.com/mooyang-code/moox/modules/storage/proto/gen";
import "trpc/proto/trpc_options.proto";
import "common.proto";

message FieldKey { repeated string keys = 1; }

// 字段信息
message FieldInfo {
  // 字段id
  uint32 field_id = 1;
  // 字段类型
  common.EnumFieldType field_type = 2;
  // 简单类型字段值
  common.SimpleValue simple_value = 3;
  // Map类型值
  common.MapContainer map_value = 4;
}

// 字段更新信息
message UpdateFieldInfo {
  // 更新方式
  common.EnumUpdateType update_type = 1;
  // 更新字段值信息
  FieldInfo field_info = 2;
}

// 文档信息
message DocRow {
  // 时序数据的时刻值, (时间格式YYYY-MM-DD HH:MM:SS）
  string times = 1;
  // 数据行ID（用于非时序数据，标记唯一行）
  string row_id = 2;
  // 文档字段值(key为字段ID)
  map<uint32, FieldInfo> fields = 3;
}

// 返回操作失败的文档行信息
message FailedDocRow {
  // 时序数据的时刻值, (时间格式YYYY-MM-DD HH:MM:SS）
  string times = 1;
  // 数据行ID（用于非时序数据，标记唯一行）
  string row_id = 2;
  // 失败字段列表(key为字段ID)
  map<uint32, common.FailedInfo> failed_list = 3;
}

// 更新文档信息
message UpdateDocRow {
  // 时序数据的时刻值, (时间格式YYYY-MM-DD HH:MM:SS）
  string times = 1;
  // 数据行ID（用于非时序数据，标记唯一行）
  string row_id = 2;
  // 更新的文档字段值（key为字段ID,注意适配层只理解字段ID，不理解字段英文名。
  // 因为字段名可能在不同项目间重复，字段ID是全局唯一的。使用字段ID，可以快速定位到字段相关的配置）
  // 底层存储使用int型存储也比存储字符串更节省空间
  // 用户定义的字段英文名可能和底层存储组件的关键字冲突（例如from字段）
  map<uint32, UpdateFieldInfo> fields = 3;
}

// 变更字段信息（同一行，变更字段的前后值）
message ModifyFieldInfo {
  // 旧文档信息（变更字段的旧值）
  DocRow old_doc_row = 1;
  // 新文档信息
  DocRow new_doc_row = 2;
}

// 搜索条件
message SearchCond {
  // 字段ID
  uint32 field_id = 1;
  // 判断方式
  common.Operator op = 2;
  // 值
  common.SimpleValue value = 3;
  // map字段的key（与字段ID一起，唯一确定一个map字段的子项）
  string map_key = 4;
}

// 搜索条件组
message SearchCondGroup {
  // 条件
  repeated SearchCond conds = 1;
  // 条件间关系
  common.Logical logical = 2;
}

// 排序信息
message SearchSort {
  // 字段ID
  uint32 field_id = 1;
  // 排序类型
  common.Sort sort = 2;
  // map字段的key（与字段ID一起，唯一确定一个map字段的子项）
  string map_key = 3;
}

// 搜索条件与选项【TODO：限定检索条件的字段必须在同一设备上，因为在目前的条件下我们做不到跨设备检索】
message SearchOptions {
  // 请求条件组（必须非空）
  repeated SearchCondGroup cond_groups = 1;
  // 条件组关系
  common.Logical logical = 2;
  // 排序信息
  repeated SearchSort sort = 3;
  // 返回字段ID列表（为空，返回所有字段;由于每个实体包含的设备都是一样的，故取全局的设备表，对每个设备getAllField，即可获取属性项，属性项中带有字段ID）
  repeated uint32 return_field_ids = 4;
  // 搜索结果的最大数量（默认10000）
  uint32 max_num = 5;
}

// EnumDeviceType 存储设备类型
enum EnumDeviceType {
  // 占位使用
  DEVICE_INVALID = 0;
  // SQLite 存储设备
  SQLITE_DEVICE = 1;
  // DuckDB 存储设备
  DUCKDB_DEVICE = 2;
  // bleve 存储设备
  BLEVE_DEVICE = 3;
  // CSV 存储设备
  CSV_DEVICE = 4;
  // Pebble 存储设备
  PEBBLE_DEVICE = 5;
}

// 时间范围
message TimeInterval {
  string start = 1; // YYYY-MM-DD HH:MM:SS
  string end = 2;   // YYYY-MM-DD HH:MM:SS
}

// 读接口请求（读某一张表的数据，适配层只对单存储表操作，其不理解项目的概念；)
message GetFieldInfosReq {
  // 表ID
  string table_id = 1;
  // 数据类型
  common.EnumDataTypeCategory data_type  = 2;
  // 查询时序数据区间（非时序数据可不填,时序数据必填，不支持一次拉取全量时序数据）
  TimeInterval time_interval = 3;
  // 数据行ID（选填。注意：静态数据若不填，拉该表的全量静态数据）
  string row_id = 4;
  // 返回的字段列表
  repeated uint32 field_ids = 5;
  // 指定map字段的部分key读取（key为字段ID），如果不指定则默认拉取map字段的全量key-value
  map<uint32, common.KeyList> map_keys = 6;
  // 该表一次返回结果的最大数量（max_limit最大值为1000；避免一次请求返回的包过大；翻页需求请用search接口）
  uint32 max_limit = 7;
}

// 读接口应答
message GetFieldInfosRsp {
  common.RetInfo ret_info = 1;
  // 返回的数据行列表
  repeated DocRow doc_rows = 2;
  // 失败字段列表(key为字段ID)
  map<uint32, common.FailedInfo> failed_fields = 3;
}

// 底层数据更新请求
message SetFieldInfosReq {
  // 表ID
  string table_id = 1;
  // 数据类型
  common.EnumDataTypeCategory data_type  = 2;
  // 要操作字段列表
  repeated UpdateDocRow update_doc_rows = 3;
  // 需要同时获取的历史数据行数（距当前时间最近的N条）
  uint32 historical_rows_limit = 4;
}

// 底层数据更新响应
message SetFieldInfosRsp {
  // 返回信息
  common.RetInfo ret_info = 1;
  // 变更事件信息列表（更新行的前后值）
  repeated ModifyFieldInfo modify_infos = 2;
  // 插入前的N行信息（一般用于时序数据插入时，获取当前表最后几行数据）
  repeated DocRow last_rows = 3;
  // 更新失败的行
  repeated FailedDocRow failed_rows = 4;
}

// 搜索接口请求
message SearchFieldInfosReq {
  // 表ID
  string table_id = 1;
  // 数据类型
  common.EnumDataTypeCategory data_type  = 2;
  // 时序数据区间（非时序数据可不填）
  TimeInterval time_interval = 3;
  // 返回时序排序类型
  common.Sort time_sort = 4;
  // 数据行ID（时序数据可不填）
  string row_id = 5;
  // 搜索条件与选项
  SearchOptions search_options = 6;
  // 请求分页信息
  common.PageInfo page_info = 7;
}

// 搜索接口应答
message SearchFieldInfosRsp {
  // 返回错误码
  common.RetInfo ret_info = 1;
  // 结果总数
  uint64 total = 2;
  // 返回的数据行列表
  repeated DocRow doc_rows = 3;
  // 失败字段列表(key为字段ID)
  map<uint32, common.FailedInfo> failed_fields = 4;
}

// 删除行接口请求
message DeleteRowsReq {
  // 表ID
  string table_id = 1;
  // 数据类型
  common.EnumDataTypeCategory data_type = 2;
  // 时序数据区间（选填，用于批量删除时序数据）
  TimeInterval time_interval = 3;
  // 数据行ID（时序数据可不填）
  repeated string row_ids = 4;
}

// 删除行接口应答
message DeleteRowsRsp {
  // 返回错误码
  common.RetInfo ret_info = 1;
  // 删除的行数
  uint64 deleted_count = 2;
}

// 创建表接口请求（必须要指定设备ID；否则对系统中全部设备都建表，可能会生产大量无效表）
message CreateTableReq {
  // 设备ID
  uint64 device_id = 1;
  // 表类型（数据对象表或数据表）
  common.EnumTableType table_type = 2;
  // 表ID
  string table_id = 3;
  // 表描述信息
  optional string description = 4;
  // 是否强制创建（如果表已存在是否覆盖）
  optional bool force_create = 5;
  // 数据类型（时序/静态；不允许为空）
  common.EnumDataTypeCategory data_type = 6;
}

// 创建表接口应答
message CreateTableRsp {
  // 返回错误码
  common.RetInfo ret_info = 1;
}

// 删除表接口请求
message DropTableReq {
  // 设备ID
  uint64 device_id = 1;
  // 表类型（数据对象表或数据表）
  common.EnumTableType table_type = 2;
  // 表ID
  string table_id = 3;
  // 是否强制删除（即使表中有数据）
  optional bool force_drop = 4;
}

// 删除表接口应答
message DropTableRsp {
  // 返回错误码
  common.RetInfo ret_info = 1;
}

// 检查表状态接口请求
message CheckTableReq {
  // 设备ID
  uint64 device_id = 1;
  // 表类型（数据对象表或数据表）
  common.EnumTableType table_type = 2;
  // 表ID
  string table_id = 3;
}

// 检查表状态接口应答
message CheckTableRsp {
  // 返回错误码
  common.RetInfo ret_info = 1;
  // 表是否存在
  bool table_exists = 2;
}

// xData 数据适配层服务(对物理存储的简单抽象，抽象成对单表的读写)
service Adapter {
  // 数据操作接口
  rpc GetFieldInfos(GetFieldInfosReq) returns (GetFieldInfosRsp) {}
  rpc SetFieldInfos(SetFieldInfosReq) returns (SetFieldInfosRsp) {}
  rpc SearchFieldInfos(SearchFieldInfosReq) returns (SearchFieldInfosRsp) {}
  rpc DeleteRows(DeleteRowsReq) returns (DeleteRowsRsp) {}

  // 表操作接口
  rpc CreateTable(CreateTableReq) returns (CreateTableRsp) {}
  rpc DropTable(DropTableReq) returns (DropTableRsp) {}
  rpc CheckTable(CheckTableReq) returns (CheckTableRsp) {}
}
