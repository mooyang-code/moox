syntax = "proto3";

package trpc.storage.metadata;
option go_package = "github.com/mooyang-code/moox/modules/storage/proto/gen";
import "trpc/proto/trpc_options.proto";
import "common.proto";

// 字段一级格式（与adapter.proto中的EnumFieldType枚举一一对应）用于存储表定义
enum EnumFieldPrimaryFormat {
  // 占位使用
  UNDEFINED1 = 0;
  // 字符串
  STRING = 1;
  // 整型
  INTEGER = 2;
  // 双精度浮点数
  DOUBLE = 3;
  // 时间类型
  TIME = 4;

  // 选项型（整型向量）
  OPTION = 5;
  // Set类型(字符串向量)
  SET = 6;
  // Map类型k-v
  MAP_KV = 7;
  // Map类型k-list
  MAP_KLIST = 8;
}

// 字段二级格式（用于约束字段值格式）
enum EnumFieldSecondaryFormat {
  UNDEFINED2 = 0;
  // 普通文本类型
  TEXT = 1;
  // 布尔类型 格式: true/false
  BOOLEAN = 2;
  // 日期 格式: 2021-02-03
  DATE = 3;
  // 日期范围 格式: 2021-02-03 ~ 2022-03-02
  DATE_RANGE = 4;
  // 日期时间 格式：2021-02-03 08:00:00
  DATE_TIME = 5;
  // 日期时间范围 格式: 2021-02-03 08:00:00 ~ 2022-03-02 09:00:01
  DATE_TIME_RANGE = 6;
  // 秒级时间戳 格式：1661411887
  TIMESTAMP = 7;
  // ISO8601格式的日期（例如：2025-04-12T20:36:00+08:00）
  DATE_ISO8601 = 8;
  // 链接 格式：http://puui.qpic.cn/emuczz1543346158
  URI = 9;
  // JSON
  JSON = 10;
  // 选项值ID
  OPTION_VALUE = 11;
  // 选项值中文文案
  OPTION_NAME = 12;
}

message FieldFormatType {
  // 字段一级格式类型
  EnumFieldPrimaryFormat field_primary_format = 1;
  // 字段二级格式类型
  EnumFieldSecondaryFormat field_secondary_format = 2;
}

// EnumFieldLevel 字段等级枚举
enum EnumFieldLevel {
  // 默认值，未设置字段等级
  DEFAULT = 0;
  // 核心字段
  CORE = 1;
}

// FieldLevelInfo 字段等级信息
message FieldLevelInfo {
  // 数据集ID
  int32 dataset_id = 1;
  // 字段等级
  EnumFieldLevel level = 2;
}

// 字段信息结构体
message FieldDetailInfo {
  // 项目ID
  int32 proj_id = 1;
  // 字段关联数据集ID
  repeated int32 dataset_ids = 2;
  // 字段ID
  int32 field_id = 3;
  // 字段中文名
  string field_name = 4;

  // 字段英文名
  string interface_name = 6;
  // 字段简要描述
  string desc = 7;
  // 是否必填（"true"=是，"false"=否）
  string required = 8;
  // 是否唯一（"true"=是，"false"=否）
  string unique = 9;
  // 字段所属表类型（1=数据对象表，2=数据表）
  common.EnumTableType table_type = 10;
  // 父字段ID
  int32 parent_field_id = 11;
  // 字段等级
  repeated FieldLevelInfo level_info = 12;
  // 字段格式类型
  FieldFormatType field_format_type = 13;
  // 属性值库ID
  int32 value_lib_id = 14;
  // 写入校验规则
  ValidationRule validation_rule = 15;
  // 写入示例
  string write_example = 16;
  // 字段备注
  string remark = 17;
  // 创建时间
  string ctime = 18;
  // 修改时间
  string mtime = 19;
  // 是否启用（"true"=启用，"false"=禁用）
  string enabled = 20;
}

message MetadataFieldValue {
  // 属性值ID
  int32 id = 1;
  // 属性值名称
  string name = 2;
  // 属性值顺序
  int32 order = 3;
}

message GetFieldReq {
  common.AuthInfo auth_info = 1;
  int32 proj_id = 2;
  int32 dataset_id = 3;
  int32 field_id = 4;
}

message GetFieldRsp {
  common.RetInfo ret_info = 1;
  FieldDetailInfo field_detail_info = 2;
  repeated MetadataFieldValue field_values = 3;
}

message SearchFieldReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID(必填)
  int32 proj_id = 2;
  // 数据集ID
  int32 dataset_id = 3;
  // 字段中文名、模糊查找
  string field_name = 4;
  // 字段接口名、模糊查找
  string interface_name = 5;
  // 字段所属表类型（1=数据对象表，2=数据表）
  common.EnumTableType table_type = 6;
  // 字段ID
  repeated int32 field_ids = 7;
  // 请求分页信息
  common.PageInfo page_info = 8;
}

message SearchFieldRsp {
  common.RetInfo ret_info = 1;
  repeated FieldDetailInfo field_detail_infos = 2;
  // 当前页号
  int32 cur_page = 3;
  // 总页数
  int32 total_page = 4;
  // 总数量
  int32 total_num = 5;
}

message CreateFieldReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  string operator = 2;
  FieldDetailInfo field_detail_info = 3;
}

message CreateFieldRsp {
  common.RetInfo ret_info = 1;
  // 字段id
  int32 field_id = 2;
}

message UpdateFieldReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  int32 proj_id = 2;
  // 字段ID
  int32 field_id = 3;
  // 操作人
  string operator = 4;
  // 字段更新信息
  FieldDetailInfo field_update_info = 5;
}

message UpdateFieldRsp {
  common.RetInfo ret_info = 1;
}

message UpsertFieldReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  int32 proj_id = 2;
  // 字段英文名（项目维度下唯一）
  string interface_name = 3;
  // 操作人
  string operator = 4;
  // 字段详情信息
  FieldDetailInfo field_detail_info = 5;
}

message UpsertFieldRsp {
  common.RetInfo ret_info = 1;
  // 字段id
  int32 field_id = 2;
}

// 删除字段请求
message DeleteFieldReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  int32 proj_id = 2;
  // 字段ID（删除时进行禁用）
  int32 field_id = 3;
}

// DeleteField 响应格式
message DeleteFieldRsp {
  common.RetInfo ret_info = 1;
}

service MetaField {
  // CreateField 创建字段
  rpc CreateField(CreateFieldReq) returns (CreateFieldRsp);
  // UpdateField 更新字段
  rpc UpdateField(UpdateFieldReq) returns (UpdateFieldRsp);
  // DeleteField 删除字段
  rpc DeleteField(DeleteFieldReq) returns (DeleteFieldRsp);
  // UpsertField 更新/创建字段
  rpc UpsertField(UpsertFieldReq) returns (UpsertFieldRsp);
  // 拉取字段详情信息接口
  rpc GetField(GetFieldReq) returns (GetFieldRsp);
  // 字段搜索接口
  rpc SearchField(SearchFieldReq) returns (SearchFieldRsp);
}

// =====================================================================================
// 数据集类型枚举
enum DataSetType {
  // 未定义类型
  UNDEFINED = 0;
  // 静态数据
  STATIC = 1;
  // 时序数据
  TIME_SERIES = 2;
}

// ================================================================================
// 项目管理相关消息定义

// 数据集元信息
message DataSetMetaInfo {
  // 数据集ID(创建时不填)
  uint32 dataset_id = 1;
  // 数据集名称
  string dataset_name = 2;
  // 数据类型
  DataSetType data_type = 3;
  // 时序周期（时序数据必填）
  string time_series_period = 4;
  // 数据校验规则
  string validation_rule = 5;
  // 备注
  string remark = 6;
}

// 项目信息
message Project {
  // 项目ID
  uint32 id = 1;
  // 项目中文名
  string name = 2;
  // 项目备注信息
  string remark = 3;
  // 项目创建时间
  string create_time = 4;
  // 项目下的数据集维度信息
  repeated DataSetMetaInfo datasets = 5;
}

// 字段元信息
message FieldMetaInfo {
  // 字段ID(创建时不填)
  uint32 field_id = 1;
  // 字段中文名
  string field_name = 2;
  // 字段英文名
  string interface_name = 3;
  // 挂载的数据集ID列表(创建时不填)
  repeated string dataset_ids = 4;
  // 字段描述
  string desc = 5;
  // 是否必填（"true"=是，"false"=否）
  string required = 6;
  // 是否唯一（"true"=是，"false"=否）
  string unique = 7;
  // 字段所属表类型（1=数据对象表，2=数据表）
  common.EnumTableType table_type = 8;
  // 数据校验规则
  string validation_rule = 9;
  // 写入示例
  string write_example = 10;
  // 备注
  string remark = 12;
  // 字段主要类型
  EnumFieldPrimaryFormat field_primary_format = 13;
  // 字段次要类型
  EnumFieldSecondaryFormat field_secondary_format = 14;
}

// 创建项目请求
message CreateProjectReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目中文名称
  string proj_name = 2;
  // 项目备注
  string remark = 3;
  // 数据集信息（创建时仅支持同时创建一个数据集）
  DataSetMetaInfo dataset = 4;
  // 主键字段信息列表
  repeated FieldMetaInfo fields = 5;
}

// CreateProject 响应格式
message CreateProjectRsp {
  common.RetInfo ret_info = 1;
  uint32 proj_id = 2;
}

// 更新项目请求
message UpdateProjectReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  int32 proj_id = 2;
  // 备注信息
  string remark = 3;
}

// UpdateProject 响应格式
message UpdateProjectRsp {
  common.RetInfo ret_info = 1;
}

// 列出项目请求
message ListProjectsReq {
  common.AuthInfo auth_info = 1;
}

// ListProjects 响应格式
message ListProjectsRsp {
  common.RetInfo ret_info = 1;
  repeated Project projects = 2;
}

// ================================================================================
// 数据集管理相关消息定义

// 新增数据集请求（单独新增数据集到现有项目中）
message CreateDataSetReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  uint32 proj_id = 2;
  // 数据集中文名
  string dataset_name = 3;
  // 数据类型（取值见:common.proto-EnumDataTypeCategory）
  common.EnumDataTypeCategory data_type = 4;
  // 时序周期（多值用+分割，例如：1m+5m+1H+1D）
  string freqs = 5;
  // 数据完整性校验规则（内置的校验规则名）
  string check_rules = 6;
  // 备注
  string comment = 7;
}

// CreateDataSet 响应格式
message CreateDataSetRsp {
  common.RetInfo ret_info = 1;
  // 新创建的数据集ID
  uint32 dataset_id = 2;
}

// 更新数据集请求
message UpdateDataSetReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  uint32 proj_id = 2;
  // 数据集ID
  uint32 dataset_id = 3;
  // 时序周期（多值用+分割，例如：1m+5m+1H+1D）
  optional string freqs = 4;
  // 数据集中文名（可选）
  optional string dataset_name = 5;
  // 数据完整性校验规则（可选，内置的校验规则名）
  optional string check_rules = 6;
  // 备注（可选）
  optional string comment = 7;
}

// UpdateDataSet 响应格式
message UpdateDataSetRsp {
  common.RetInfo ret_info = 1;
}

// 删除数据集请求
message DeleteDataSetReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  uint32 proj_id = 2;
  // 数据集ID（删除时会自动清理字段表中DatasetIDs字段里的关联关系）
  uint32 dataset_id = 3;
}

// DeleteDataSet 响应格式
message DeleteDataSetRsp {
  common.RetInfo ret_info = 1;
}

// ================================================================================
// 存储实体管理相关消息定义

// 存储实体信息
message StorageEntityInfo {
  // 存储实体ID
  uint32 entity_id = 1;
  // 存储实体别名
  string entity_alias = 2;
  // 存储实体的连接信息（存储层服务的访问地址）
  string entity_srv_conn = 3;
  // 创建时间
  string ctime = 4;
  // 修改时间
  string mtime = 5;
  // 是否启用（"true"=启用，"false"=禁用）
  string enabled = 6;
}

// 创建存储实体请求
message CreateStorageEntityReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 存储实体别名
  string entity_alias = 2;
  // 存储实体的连接信息
  string entity_srv_conn = 3;
}

// 创建存储实体响应
message CreateStorageEntityRsp {
  common.RetInfo ret_info = 1;
  // 新创建的存储实体ID
  uint32 entity_id = 2;
}

// 更新存储实体请求
message UpdateStorageEntityReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 存储实体ID
  uint32 entity_id = 2;
  // 存储实体别名（只能修改别名）
  string entity_alias = 3;
}

// 更新存储实体响应
message UpdateStorageEntityRsp {
  common.RetInfo ret_info = 1;
}

// 删除存储实体请求
message DeleteStorageEntityReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 存储实体ID
  uint32 entity_id = 2;
}

// 删除存储实体响应
message DeleteStorageEntityRsp {
  common.RetInfo ret_info = 1;
}

// 列出存储实体请求
message ListStorageEntitiesReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
}

// 列出存储实体响应
message ListStorageEntitiesRsp {
  common.RetInfo ret_info = 1;
  // 存储实体信息列表
  repeated StorageEntityInfo entities = 2;
}

// ================================================================================
// 存储设备管理相关消息定义

// 存储设备信息
message StorageDeviceInfo {
  // 存储设备ID
  uint32 device_id = 1;
  // 存储设备名
  string device_name = 2;
  // 存储设备类型（DuckDB、MySQL等）
  uint32 device_type = 3;
  // 存储连接信息
  string conn_info = 4;
  // 创建时间
  string ctime = 5;
  // 修改时间
  string mtime = 6;
  // 是否启用（"true"=启用，"false"=禁用）
  string enabled = 7;
}

// 创建存储设备请求
message CreateStorageDeviceReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 存储设备名
  string device_name = 2;
  // 存储设备类型
  uint32 device_type = 3;
  // 存储连接信息
  string conn_info = 4;
}

// 创建存储设备响应
message CreateStorageDeviceRsp {
  common.RetInfo ret_info = 1;
  // 新创建的存储设备ID
  uint32 device_id = 2;
}

// 更新存储设备请求
message UpdateStorageDeviceReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 存储设备ID
  uint32 device_id = 2;
  // 存储设备名（只能修改设备名）
  string device_name = 3;
}

// 更新存储设备响应
message UpdateStorageDeviceRsp {
  common.RetInfo ret_info = 1;
}

// 删除存储设备请求
message DeleteStorageDeviceReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 存储设备ID
  uint32 device_id = 2;
}

// 删除存储设备响应
message DeleteStorageDeviceRsp {
  common.RetInfo ret_info = 1;
}

// 列出存储设备请求
message ListStorageDevicesReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
}

// 列出存储设备响应
message ListStorageDevicesRsp {
  common.RetInfo ret_info = 1;
  // 存储设备信息列表
  repeated StorageDeviceInfo devices = 2;
}

// ================================================================================
// 数据对象路由管理相关消息定义

// 数据对象路由信息
message ObjectRouteInfo {
  // 路由ID
  uint32 route_id = 1;
  // 数据集ID
  uint32 dataset_id = 2;
  // 数据对象ID（*表示默认值）
  string object_id = 3;
  // 存储实体ID
  uint32 entity_id = 4;
  // 创建时间
  string ctime = 5;
  // 修改时间
  string mtime = 6;
  // 是否启用（"true"=启用，"false"=禁用）
  string enabled = 7;
}

// 创建数据对象路由请求
message CreateObjectRouteReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  uint32 project_id = 2;
  // 数据集ID
  uint32 dataset_id = 3;
  // 数据对象ID（*表示默认值）
  string object_id = 4;
  // 存储实体ID
  uint32 entity_id = 5;
}

// 创建数据对象路由响应
message CreateObjectRouteRsp {
  common.RetInfo ret_info = 1;
  // 新创建的路由ID
  uint32 route_id = 2;
}

// 更新数据对象路由请求
message UpdateObjectRouteReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 路由ID
  uint32 route_id = 2;
  // 数据集ID（可选）
  optional uint32 dataset_id = 3;
  // 数据对象ID（可选）
  optional string object_id = 4;
  // 存储实体ID（可选）
  optional uint32 entity_id = 5;
}

// 更新数据对象路由响应
message UpdateObjectRouteRsp {
  common.RetInfo ret_info = 1;
}

// 删除数据对象路由请求
message DeleteObjectRouteReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 路由ID
  uint32 route_id = 2;
}

// 删除数据对象路由响应
message DeleteObjectRouteRsp {
  common.RetInfo ret_info = 1;
}

// 列出数据对象路由请求
message ListObjectRoutesReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  uint32 project_id = 2;
  // 数据集ID（可选过滤条件）
  optional uint32 dataset_id = 3;
  // 存储实体ID（可选过滤条件）
  optional uint32 entity_id = 4;
  // 请求分页信息
  common.PageInfo page_info = 5;
}

// 列出数据对象路由响应
message ListObjectRoutesRsp {
  common.RetInfo ret_info = 1;
  // 路由信息列表
  repeated ObjectRouteInfo routes = 2;
  // 当前页号
  int32 cur_page = 3;
  // 总页数
  int32 total_page = 4;
  // 总数量
  int32 total_num = 5;
}

// ================================================================================
// 数据字段路由管理相关消息定义

// 数据字段路由信息
message FieldRouteInfo {
  // 路由ID
  uint32 route_id = 1;
  // 字段ID（999999999表示所有字段）
  uint32 field_id = 2;
  // 数据集ID（为0表示该项目下所有的数据集）
  uint32 dataset_id = 3;
  // 字段的存储设备ID
  uint32 device_id = 4;
  // 创建时间
  string ctime = 5;
  // 修改时间
  string mtime = 6;
  // 是否启用（"true"=启用，"false"=禁用）
  string enabled = 7;
}

// 创建数据字段路由请求
message CreateFieldRouteReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  uint32 project_id = 2;
  // 字段ID（使用999999999表示所有字段）
  uint32 field_id = 3;
  // 数据集ID（为0表示该项目下所有的数据集）
  uint32 dataset_id = 4;
  // 字段的存储设备ID
  uint32 device_id = 5;
}

// 创建数据字段路由响应
message CreateFieldRouteRsp {
  common.RetInfo ret_info = 1;
  // 新创建的路由ID
  uint32 route_id = 2;
}

// 更新数据字段路由请求
message UpdateFieldRouteReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 路由ID
  uint32 route_id = 2;
  // 字段ID（可选，使用999999999表示所有字段）
  optional uint32 field_id = 3;
  // 数据集ID（可选，为0表示该项目下所有的数据集）
  optional uint32 dataset_id = 4;
  // 字段的存储设备ID（可选）
  optional uint32 device_id = 5;
}

// 更新数据字段路由响应
message UpdateFieldRouteRsp {
  common.RetInfo ret_info = 1;
}

// 删除数据字段路由请求
message DeleteFieldRouteReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 路由ID
  uint32 route_id = 2;
}

// 删除数据字段路由响应
message DeleteFieldRouteRsp {
  common.RetInfo ret_info = 1;
}

// 列出数据字段路由请求
message ListFieldRoutesReq {
  // 认证信息
  common.AuthInfo auth_info = 1;
  // 项目ID
  uint32 project_id = 2;
  // 字段ID（可选过滤条件，使用999999999表示所有字段）
  optional uint32 field_id = 3;
  // 数据集ID（可选过滤条件，为0表示该项目下所有的数据集）
  optional uint32 dataset_id = 4;
  // 存储设备ID（可选过滤条件）
  optional uint32 device_id = 5;
  // 请求分页信息
  common.PageInfo page_info = 6;
}

// 列出数据字段路由响应
message ListFieldRoutesRsp {
  common.RetInfo ret_info = 1;
  // 路由信息列表
  repeated FieldRouteInfo routes = 2;
  // 当前页号
  int32 cur_page = 3;
  // 总页数
  int32 total_page = 4;
  // 总数量
  int32 total_num = 5;
}

// 管理台相关接口
service MetaAdmin {
  // ================================================================================
  // 项目管理接口

  // CreateProject 创建项目 成功返回项目ID
  rpc CreateProject(CreateProjectReq) returns (CreateProjectRsp);
  // UpdateProject 更新项目信息
  rpc UpdateProject(UpdateProjectReq) returns (UpdateProjectRsp);
  // ListProjects 拉取项目信息列表
  rpc ListProjects(ListProjectsReq) returns (ListProjectsRsp);

  // ================================================================================
  // 数据集管理接口

  // CreateDataSet 创建数据集
  rpc CreateDataSet(CreateDataSetReq) returns (CreateDataSetRsp);
  // UpdateDataSet 更新数据集
  rpc UpdateDataSet(UpdateDataSetReq) returns (UpdateDataSetRsp);
  // DeleteDataSet 删除数据集
  rpc DeleteDataSet(DeleteDataSetReq) returns (DeleteDataSetRsp);

  // ================================================================================
  // 存储实体管理接口

  // CreateStorageEntity 创建存储实体
  rpc CreateStorageEntity(CreateStorageEntityReq) returns (CreateStorageEntityRsp);
  // UpdateStorageEntity 修改存储实体（只能修改别名）
  rpc UpdateStorageEntity(UpdateStorageEntityReq) returns (UpdateStorageEntityRsp);
  // DeleteStorageEntity 删除存储实体（已经有路由配置的，禁止删除）
  rpc DeleteStorageEntity(DeleteStorageEntityReq) returns (DeleteStorageEntityRsp);
  // ListStorageEntities 列出存储实体
  rpc ListStorageEntities(ListStorageEntitiesReq) returns (ListStorageEntitiesRsp);

  // ================================================================================
  // 存储设备管理接口

  // CreateStorageDevice 创建存储设备
  rpc CreateStorageDevice(CreateStorageDeviceReq) returns (CreateStorageDeviceRsp);
  // UpdateStorageDevice 修改存储设备（只能修改设备名）
  rpc UpdateStorageDevice(UpdateStorageDeviceReq) returns (UpdateStorageDeviceRsp);
  // DeleteStorageDevice 删除存储设备（已经有路由配置的，禁止删除）
  rpc DeleteStorageDevice(DeleteStorageDeviceReq) returns (DeleteStorageDeviceRsp);
  // ListStorageDevices 列出存储设备
  rpc ListStorageDevices(ListStorageDevicesReq) returns (ListStorageDevicesRsp);

  // ================================================================================
  // 数据对象路由管理接口

  // CreateObjectRoute 创建数据对象路由
  rpc CreateObjectRoute(CreateObjectRouteReq) returns (CreateObjectRouteRsp);
  // UpdateObjectRoute 修改数据对象路由
  rpc UpdateObjectRoute(UpdateObjectRouteReq) returns (UpdateObjectRouteRsp);
  // DeleteObjectRoute 删除数据对象路由
  rpc DeleteObjectRoute(DeleteObjectRouteReq) returns (DeleteObjectRouteRsp);
  // ListObjectRoutes 列出数据对象路由
  rpc ListObjectRoutes(ListObjectRoutesReq) returns (ListObjectRoutesRsp);

  // ================================================================================
  // 数据字段路由管理接口

  // CreateFieldRoute 创建数据字段路由
  rpc CreateFieldRoute(CreateFieldRouteReq) returns (CreateFieldRouteRsp);
  // UpdateFieldRoute 修改数据字段路由
  rpc UpdateFieldRoute(UpdateFieldRouteReq) returns (UpdateFieldRouteRsp);
  // DeleteFieldRoute 删除数据字段路由
  rpc DeleteFieldRoute(DeleteFieldRouteReq) returns (DeleteFieldRouteRsp);
  // ListFieldRoutes 列出数据字段路由
  rpc ListFieldRoutes(ListFieldRoutesReq) returns (ListFieldRoutesRsp);
}

// ***********************************************************************************
// 字符串校验规则
message StringRule {
  // 字符串最小长度
  optional int64 min_length = 1;
  // 字符串最大长度
  optional int64 max_length = 2;
  // 字符串固定长度
  optional int64 length = 3;
  // 固定字符串值
  optional string const = 4;
  // 正则表达式匹配模式
  optional string pattern = 5;
  // 前缀匹配
  optional string prefix = 6;
  // 后缀匹配
  optional string suffix = 7;
  // 字符串包含子字符串
  optional string contains = 8;
  // 字符串不包含子字符串
  optional string not_contains = 9;
  // 字符串被包含于
  repeated string in = 10;
  // 字符串不被包含于
  repeated string not_in = 11;
  // 正则表达式不匹配（取反，成功匹配正则表达式会被拦截）
  optional string not_pattern = 12;
  // 格式描述（一般用于时间类型的字段）
  optional string format = 13;
}

// 整型校验规则
message IntegerRule {
  // 最小值
  optional int64 min = 1;
  // 最大值
  optional int64 max = 2;
  // 固定值
  optional int64 const = 3;
  // 小于
  optional int64 lt = 4;
  // 小于等于
  optional int64 lte = 5;
  // 大于
  optional int64 gt = 6;
  // 大于等于
  optional int64 gte = 7;
  // 包含某些值
  repeated int64 in = 8;
  // 不包含某些值
  repeated int64 not_in = 9;
}

// 浮点数校验规则
message DoubleRule {
  // 最小值
  optional double min = 1;
  // 最大值
  optional double max = 2;
  // 固定值
  optional double const = 3;
  // 小于
  optional double lt = 4;
  // 小于等于
  optional double lte = 5;
  // 大于
  optional double gt = 6;
  // 大于等于
  optional double gte = 7;
  // 包含某些值
  repeated double in = 8;
  // 不包含某些值
  repeated double not_in = 9;
}

// 选项值校验规则
message OptionRule {
  // 值库ID
  int32 lib_id = 1;
}

// 校验规则
message ValidationRule {
  oneof rule {
    StringRule string_rule = 1;
    IntegerRule integer_rule = 2;
    DoubleRule double_rule = 3;
    OptionRule option_rule = 4;
  }
}
