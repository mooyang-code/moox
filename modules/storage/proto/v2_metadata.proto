syntax = "proto3";

package trpc.storage.v2.metadata;

option go_package = "github.com/mooyang-code/moox/modules/storage/proto/genv2;storagepb";

import "v2_common.proto";

message Workspace {
  string workspace_id = 1;
  string name = 2;
  string display_name = 3;
  string description = 4;
  string owner = 5;
  string status = 6;
  string created_at = 7;
  string updated_at = 8;
  map<string, string> attributes = 9;
}

message MarketInfo {
  string market = 1;
  string display_name = 2;
  string timezone = 3;
  string currency = 4;
  map<string, string> attributes = 5;
}

message Exchange {
  string exchange_id = 1;
  string code = 2;
  string name = 3;
  string market = 4;
  string timezone = 5;
  string currency = 6;
  string trading_calendar = 7;
  string status = 8;
  map<string, string> attributes = 9;
}

message Instrument {
  string instrument_id = 1;
  string internal_symbol = 2;
  string display_symbol = 3;
  string exchange_id = 4;
  string market = 5;
  string instrument_type = 6;
  string base_asset = 7;
  string quote_asset = 8;
  string currency = 9;
  string timezone = 10;
  string status = 11;
  map<string, string> attributes = 12;
}

message InstrumentAlias {
  string instrument_id = 1;
  string data_source = 2;
  string exchange_id = 3;
  string external_symbol = 4;
  string status = 5;
  map<string, string> attributes = 6;
}

message DimensionDef {
  string name = 1;
  string display_name = 2;
  string description = 3;
  bool required = 4;
  repeated string allowed_values = 5;
}

message DataSet {
  string dataset_id = 1;
  string workspace_id = 2;
  string name = 3;
  string display_name = 4;
  common.DataKind data_kind = 5;
  common.DataDomain data_domain = 6;
  repeated string market_scope = 7;
  repeated string exchange_scope = 8;
  repeated string instrument_scope = 9;
  repeated string default_freqs = 10;
  uint32 schema_version = 11;
  repeated DimensionDef dimensions = 12;
  string retention_policy = 13;
  string status = 14;
  string created_at = 15;
  string updated_at = 16;
  map<string, string> attributes = 17;
}

message Field {
  string field_id = 1;
  string workspace_id = 2;
  string dataset_id = 3;
  string interface_name = 4;
  string display_name = 5;
  string description = 6;
  common.FieldValueType value_type = 7;
  bool required = 8;
  bool unique = 9;
  string unit = 10;
  string status = 11;
  map<string, string> attributes = 12;
}

message FactorDef {
  string factor_def_id = 1;
  string workspace_id = 2;
  string name = 3;
  string display_name = 4;
  string description = 5;
  string algorithm = 6;
  string version = 7;
  string status = 8;
  map<string, string> attributes = 9;
}

message FactorInstance {
  string factor_instance_id = 1;
  string workspace_id = 2;
  string factor_def_id = 3;
  string dataset_id = 4;
  string name = 5;
  string display_name = 6;
  string freq = 7;
  map<string, string> params = 8;
  common.FieldValueType value_type = 9;
  string status = 10;
  map<string, string> attributes = 11;
}

message DataViewQueryConfig {
  string primary_dataset_id = 1;
  repeated string join_dataset_ids = 2;
  repeated string instrument_ids = 3;
  repeated common.FilterExpr filters = 4;
  repeated common.SortSpec sorts = 5;
  string materialize_policy = 6;
}

message DataViewColumn {
  string column_id = 1;
  string output_name = 2;
  common.ColumnOrigin column_origin = 3;
  string dataset_id = 4;
  string field_id = 5;
  string factor_instance_id = 6;
  string expression = 7;
  common.FieldValueType value_type = 8;
  map<string, string> attributes = 9;
}

message DataViewVersion {
  string version_id = 1;
  uint32 version = 2;
  repeated DataViewColumn columns = 3;
  string created_at = 4;
  string status = 5;
}

message DataView {
  string data_view_id = 1;
  string workspace_id = 2;
  string name = 3;
  string display_name = 4;
  string description = 5;
  DataViewQueryConfig query_config = 6;
  repeated DataViewVersion versions = 7;
  string active_version_id = 8;
  string status = 9;
  string created_at = 10;
  string updated_at = 11;
  map<string, string> attributes = 12;
}

message StorageDevice {
  string device_id = 1;
  string name = 2;
  string engine = 3;
  string endpoint = 4;
  string config_json = 5;
  string status = 6;
  map<string, string> attributes = 7;
}

message StorageRoute {
  string route_id = 1;
  string workspace_id = 2;
  string dataset_id = 3;
  string field_id = 4;
  string factor_instance_id = 5;
  string device_id = 6;
  repeated common.DimensionValue dimension_values = 7;
  string mode = 8;
  uint32 priority = 9;
  string status = 10;
  map<string, string> attributes = 11;
}

message CollectorDataSetBinding {
  string binding_id = 1;
  string workspace_id = 2;
  string dataset_id = 3;
  string data_source = 4;
  string exchange_id = 5;
  string collector_task_type = 6;
  map<string, string> params = 7;
  string status = 8;
}

message CreateWorkspaceReq { common.AuthInfo auth_info = 1; Workspace workspace = 2; }
message CreateWorkspaceRsp { common.RetInfo ret_info = 1; Workspace workspace = 2; }
message UpdateWorkspaceReq { common.AuthInfo auth_info = 1; Workspace workspace = 2; }
message UpdateWorkspaceRsp { common.RetInfo ret_info = 1; Workspace workspace = 2; }
message GetWorkspaceReq { common.AuthInfo auth_info = 1; string workspace_id = 2; }
message GetWorkspaceRsp { common.RetInfo ret_info = 1; Workspace workspace = 2; }
message ListWorkspacesReq { common.AuthInfo auth_info = 1; common.Page page = 2; }
message ListWorkspacesRsp { common.RetInfo ret_info = 1; repeated Workspace workspaces = 2; common.PageResult page_result = 3; }

message CreateExchangeReq { common.AuthInfo auth_info = 1; Exchange exchange = 2; }
message CreateExchangeRsp { common.RetInfo ret_info = 1; Exchange exchange = 2; }
message UpdateExchangeReq { common.AuthInfo auth_info = 1; Exchange exchange = 2; }
message UpdateExchangeRsp { common.RetInfo ret_info = 1; Exchange exchange = 2; }
message GetExchangeReq { common.AuthInfo auth_info = 1; string exchange_id = 2; }
message GetExchangeRsp { common.RetInfo ret_info = 1; Exchange exchange = 2; }
message ListExchangesReq { common.AuthInfo auth_info = 1; string market = 2; common.Page page = 3; }
message ListExchangesRsp { common.RetInfo ret_info = 1; repeated Exchange exchanges = 2; common.PageResult page_result = 3; }

message UpsertInstrumentReq { common.AuthInfo auth_info = 1; Instrument instrument = 2; }
message UpsertInstrumentRsp { common.RetInfo ret_info = 1; Instrument instrument = 2; }
message GetInstrumentReq { common.AuthInfo auth_info = 1; string instrument_id = 2; }
message GetInstrumentRsp { common.RetInfo ret_info = 1; Instrument instrument = 2; }
message ListInstrumentsReq { common.AuthInfo auth_info = 1; string exchange_id = 2; string market = 3; repeated string instrument_ids = 4; common.Page page = 5; }
message ListInstrumentsRsp { common.RetInfo ret_info = 1; repeated Instrument instruments = 2; common.PageResult page_result = 3; }
message UpsertInstrumentAliasReq { common.AuthInfo auth_info = 1; InstrumentAlias alias = 2; }
message UpsertInstrumentAliasRsp { common.RetInfo ret_info = 1; InstrumentAlias alias = 2; }
message ListInstrumentAliasesReq { common.AuthInfo auth_info = 1; string instrument_id = 2; string data_source = 3; common.Page page = 4; }
message ListInstrumentAliasesRsp { common.RetInfo ret_info = 1; repeated InstrumentAlias aliases = 2; common.PageResult page_result = 3; }

message CreateDataSetReq { common.AuthInfo auth_info = 1; DataSet dataset = 2; }
message CreateDataSetRsp { common.RetInfo ret_info = 1; DataSet dataset = 2; }
message UpdateDataSetReq { common.AuthInfo auth_info = 1; DataSet dataset = 2; }
message UpdateDataSetRsp { common.RetInfo ret_info = 1; DataSet dataset = 2; }
message GetDataSetReq { common.AuthInfo auth_info = 1; string workspace_id = 2; string dataset_id = 3; }
message GetDataSetRsp { common.RetInfo ret_info = 1; DataSet dataset = 2; }
message ListDataSetsReq { common.AuthInfo auth_info = 1; string workspace_id = 2; common.DataKind data_kind = 3; common.DataDomain data_domain = 4; common.Page page = 5; }
message ListDataSetsRsp { common.RetInfo ret_info = 1; repeated DataSet datasets = 2; common.PageResult page_result = 3; }

message CreateFieldReq { common.AuthInfo auth_info = 1; Field field = 2; }
message CreateFieldRsp { common.RetInfo ret_info = 1; Field field = 2; }
message UpdateFieldReq { common.AuthInfo auth_info = 1; Field field = 2; }
message UpdateFieldRsp { common.RetInfo ret_info = 1; Field field = 2; }
message GetFieldReq { common.AuthInfo auth_info = 1; string workspace_id = 2; string dataset_id = 3; string field_id = 4; string interface_name = 5; }
message GetFieldRsp { common.RetInfo ret_info = 1; Field field = 2; }
message ListFieldsReq { common.AuthInfo auth_info = 1; string workspace_id = 2; string dataset_id = 3; common.Page page = 4; }
message ListFieldsRsp { common.RetInfo ret_info = 1; repeated Field fields = 2; common.PageResult page_result = 3; }

message CreateFactorDefReq { common.AuthInfo auth_info = 1; FactorDef factor_def = 2; }
message CreateFactorDefRsp { common.RetInfo ret_info = 1; FactorDef factor_def = 2; }
message UpdateFactorDefReq { common.AuthInfo auth_info = 1; FactorDef factor_def = 2; }
message UpdateFactorDefRsp { common.RetInfo ret_info = 1; FactorDef factor_def = 2; }
message GetFactorDefReq { common.AuthInfo auth_info = 1; string workspace_id = 2; string factor_def_id = 3; }
message GetFactorDefRsp { common.RetInfo ret_info = 1; FactorDef factor_def = 2; }
message ListFactorDefsReq { common.AuthInfo auth_info = 1; string workspace_id = 2; common.Page page = 3; }
message ListFactorDefsRsp { common.RetInfo ret_info = 1; repeated FactorDef factor_defs = 2; common.PageResult page_result = 3; }

message CreateFactorInstanceReq { common.AuthInfo auth_info = 1; FactorInstance factor_instance = 2; }
message CreateFactorInstanceRsp { common.RetInfo ret_info = 1; FactorInstance factor_instance = 2; }
message UpdateFactorInstanceReq { common.AuthInfo auth_info = 1; FactorInstance factor_instance = 2; }
message UpdateFactorInstanceRsp { common.RetInfo ret_info = 1; FactorInstance factor_instance = 2; }
message GetFactorInstanceReq { common.AuthInfo auth_info = 1; string workspace_id = 2; string factor_instance_id = 3; }
message GetFactorInstanceRsp { common.RetInfo ret_info = 1; FactorInstance factor_instance = 2; }
message ListFactorInstancesReq { common.AuthInfo auth_info = 1; string workspace_id = 2; string factor_def_id = 3; string dataset_id = 4; common.Page page = 5; }
message ListFactorInstancesRsp { common.RetInfo ret_info = 1; repeated FactorInstance factor_instances = 2; common.PageResult page_result = 3; }

message CreateDataViewReq { common.AuthInfo auth_info = 1; DataView data_view = 2; }
message CreateDataViewRsp { common.RetInfo ret_info = 1; DataView data_view = 2; }
message UpdateDataViewReq { common.AuthInfo auth_info = 1; DataView data_view = 2; }
message UpdateDataViewRsp { common.RetInfo ret_info = 1; DataView data_view = 2; }
message GetDataViewReq { common.AuthInfo auth_info = 1; string workspace_id = 2; string data_view_id = 3; }
message GetDataViewRsp { common.RetInfo ret_info = 1; DataView data_view = 2; }
message ListDataViewsReq { common.AuthInfo auth_info = 1; string workspace_id = 2; common.Page page = 3; }
message ListDataViewsRsp { common.RetInfo ret_info = 1; repeated DataView data_views = 2; common.PageResult page_result = 3; }

message CreateStorageDeviceReq { common.AuthInfo auth_info = 1; StorageDevice storage_device = 2; }
message CreateStorageDeviceRsp { common.RetInfo ret_info = 1; StorageDevice storage_device = 2; }
message UpdateStorageDeviceReq { common.AuthInfo auth_info = 1; StorageDevice storage_device = 2; }
message UpdateStorageDeviceRsp { common.RetInfo ret_info = 1; StorageDevice storage_device = 2; }
message GetStorageDeviceReq { common.AuthInfo auth_info = 1; string device_id = 2; }
message GetStorageDeviceRsp { common.RetInfo ret_info = 1; StorageDevice storage_device = 2; }
message ListStorageDevicesReq { common.AuthInfo auth_info = 1; common.Page page = 2; }
message ListStorageDevicesRsp { common.RetInfo ret_info = 1; repeated StorageDevice storage_devices = 2; common.PageResult page_result = 3; }

message CreateStorageRouteReq { common.AuthInfo auth_info = 1; StorageRoute storage_route = 2; }
message CreateStorageRouteRsp { common.RetInfo ret_info = 1; StorageRoute storage_route = 2; }
message UpdateStorageRouteReq { common.AuthInfo auth_info = 1; StorageRoute storage_route = 2; }
message UpdateStorageRouteRsp { common.RetInfo ret_info = 1; StorageRoute storage_route = 2; }
message GetStorageRouteReq { common.AuthInfo auth_info = 1; string route_id = 2; }
message GetStorageRouteRsp { common.RetInfo ret_info = 1; StorageRoute storage_route = 2; }
message ListStorageRoutesReq { common.AuthInfo auth_info = 1; string workspace_id = 2; string dataset_id = 3; string device_id = 4; common.Page page = 5; }
message ListStorageRoutesRsp { common.RetInfo ret_info = 1; repeated StorageRoute storage_routes = 2; common.PageResult page_result = 3; }

message ConfigureCollectorDataSetBindingReq { common.AuthInfo auth_info = 1; CollectorDataSetBinding binding = 2; }
message ConfigureCollectorDataSetBindingRsp { common.RetInfo ret_info = 1; CollectorDataSetBinding binding = 2; }
message ListCollectorDataSetBindingsReq { common.AuthInfo auth_info = 1; string workspace_id = 2; string dataset_id = 3; string data_source = 4; common.Page page = 5; }
message ListCollectorDataSetBindingsRsp { common.RetInfo ret_info = 1; repeated CollectorDataSetBinding bindings = 2; common.PageResult page_result = 3; }

service MetadataService {
  rpc CreateWorkspace(CreateWorkspaceReq) returns (CreateWorkspaceRsp);
  rpc UpdateWorkspace(UpdateWorkspaceReq) returns (UpdateWorkspaceRsp);
  rpc GetWorkspace(GetWorkspaceReq) returns (GetWorkspaceRsp);
  rpc ListWorkspaces(ListWorkspacesReq) returns (ListWorkspacesRsp);
  rpc CreateExchange(CreateExchangeReq) returns (CreateExchangeRsp);
  rpc UpdateExchange(UpdateExchangeReq) returns (UpdateExchangeRsp);
  rpc GetExchange(GetExchangeReq) returns (GetExchangeRsp);
  rpc ListExchanges(ListExchangesReq) returns (ListExchangesRsp);
  rpc UpsertInstrument(UpsertInstrumentReq) returns (UpsertInstrumentRsp);
  rpc GetInstrument(GetInstrumentReq) returns (GetInstrumentRsp);
  rpc ListInstruments(ListInstrumentsReq) returns (ListInstrumentsRsp);
  rpc UpsertInstrumentAlias(UpsertInstrumentAliasReq) returns (UpsertInstrumentAliasRsp);
  rpc ListInstrumentAliases(ListInstrumentAliasesReq) returns (ListInstrumentAliasesRsp);
  rpc CreateDataSet(CreateDataSetReq) returns (CreateDataSetRsp);
  rpc UpdateDataSet(UpdateDataSetReq) returns (UpdateDataSetRsp);
  rpc GetDataSet(GetDataSetReq) returns (GetDataSetRsp);
  rpc ListDataSets(ListDataSetsReq) returns (ListDataSetsRsp);
  rpc CreateField(CreateFieldReq) returns (CreateFieldRsp);
  rpc UpdateField(UpdateFieldReq) returns (UpdateFieldRsp);
  rpc GetField(GetFieldReq) returns (GetFieldRsp);
  rpc ListFields(ListFieldsReq) returns (ListFieldsRsp);
  rpc CreateFactorDef(CreateFactorDefReq) returns (CreateFactorDefRsp);
  rpc UpdateFactorDef(UpdateFactorDefReq) returns (UpdateFactorDefRsp);
  rpc GetFactorDef(GetFactorDefReq) returns (GetFactorDefRsp);
  rpc ListFactorDefs(ListFactorDefsReq) returns (ListFactorDefsRsp);
  rpc CreateFactorInstance(CreateFactorInstanceReq) returns (CreateFactorInstanceRsp);
  rpc UpdateFactorInstance(UpdateFactorInstanceReq) returns (UpdateFactorInstanceRsp);
  rpc GetFactorInstance(GetFactorInstanceReq) returns (GetFactorInstanceRsp);
  rpc ListFactorInstances(ListFactorInstancesReq) returns (ListFactorInstancesRsp);
  rpc CreateDataView(CreateDataViewReq) returns (CreateDataViewRsp);
  rpc UpdateDataView(UpdateDataViewReq) returns (UpdateDataViewRsp);
  rpc GetDataView(GetDataViewReq) returns (GetDataViewRsp);
  rpc ListDataViews(ListDataViewsReq) returns (ListDataViewsRsp);
  rpc CreateStorageDevice(CreateStorageDeviceReq) returns (CreateStorageDeviceRsp);
  rpc UpdateStorageDevice(UpdateStorageDeviceReq) returns (UpdateStorageDeviceRsp);
  rpc GetStorageDevice(GetStorageDeviceReq) returns (GetStorageDeviceRsp);
  rpc ListStorageDevices(ListStorageDevicesReq) returns (ListStorageDevicesRsp);
  rpc CreateStorageRoute(CreateStorageRouteReq) returns (CreateStorageRouteRsp);
  rpc UpdateStorageRoute(UpdateStorageRouteReq) returns (UpdateStorageRouteRsp);
  rpc GetStorageRoute(GetStorageRouteReq) returns (GetStorageRouteRsp);
  rpc ListStorageRoutes(ListStorageRoutesReq) returns (ListStorageRoutesRsp);
  rpc ConfigureCollectorDataSetBinding(ConfigureCollectorDataSetBindingReq) returns (ConfigureCollectorDataSetBindingRsp);
  rpc ListCollectorDataSetBindings(ListCollectorDataSetBindingsReq) returns (ListCollectorDataSetBindingsRsp);
}
