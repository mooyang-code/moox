schemacaches:
  t_field: http://127.0.0.1:19101/metaapi/t_field
  t_dataset: http://127.0.0.1:19101/metaapi/t_dataset
  t_object_route: http://127.0.0.1:19101/metaapi/t_object_route
  t_field_route: http://127.0.0.1:19101/metaapi/t_field_route
  t_storage_entity: http://127.0.0.1:19101/metaapi/t_storage_entity
  t_storage_device: http://127.0.0.1:19101/metaapi/t_storage_device
  t_field_column_map: http://127.0.0.1:19101/metaapi/t_field_column_map

# 缓存轮询间隔（秒），0 表示使用默认值
schema_cache_polling_interval_seconds: 60

# 消息服务器设置
message_server:
  enable: true # 是否启用消息通知功能
  name: "nats" # 消息组件名
  host: "0.0.0.0" # 消息服务器IP（本机固定设置，不要更改）
  port: 8811 # 消息服务器端口
  data_path: "./data"
  object_modify_subject: "storage.object.change"
  data_detail_modify_subject: "storage.datadetail.change"

# 变更通知设置
notification_settings:
  # 允许发送变更通知的项目ID列表（默认关闭发送）
  enabled_project_ids: []

# 数据库表定时任务配置
table_scheduler:
  enable: true # 是否启用定时任务
  cron_expression: "*/20 * * * * *" # Cron表达式，每20秒执行一次
  cache_ttl_minutes: 60 # 表创建状态缓存过期时间（分钟）
  max_concurrency: 10 # 最大并发处理数
  meta_service_name: "trpc.storage.metadata.MetaAdmin" # 元数据服务名
  adapter_service_name: "trpc.storage.adapter.Adapter" # 适配器服务名
  access_service_name: "trpc.storage.access.Access" # 访问服务名
