# MooX storage metadata seed sample.
# This file is domain-oriented and should be imported through MetadataService,
# not by writing metadata tables directly.

spaces:
  - space_id: crypto
    name: 加密交易空间
    description: Binance/OKX style crypto market data workspace
    owner: default
    status: active

data_sources:
  - space_id: crypto
    data_source_id: binance
    name: 币安
    kind: exchange
    market: crypto
    timezone: UTC
    status: active

subjects:
  - space_id: crypto
    subject_id: APT-USDT
    subject_type: crypto_pair
    name: APT币
    market: crypto
    currency: USDT
    timezone: UTC
    status: active
  - space_id: crypto
    subject_id: AR-USDT
    subject_type: crypto_pair
    name: AR币
    market: crypto
    currency: USDT
    timezone: UTC
    status: active

subject_symbols:
  - space_id: crypto
    subject_id: APT-USDT
    data_source_id: binance
    external_symbol: APTUSDT
    status: active
  - space_id: crypto
    subject_id: AR-USDT
    data_source_id: binance
    external_symbol: ARUSDT
    status: active

datasets:
  - space_id: crypto
    dataset_id: binance_spot_kline
    data_source_id: binance
    name: 币安现货K线
    description: Binance spot OHLCV kline facts
    data_kind: time_series
    freqs: ["1m", "1h", "1d"]
    status: active
  - space_id: crypto
    dataset_id: binance_spot_symbols
    data_source_id: binance
    name: 币安现货标的
    description: Binance spot symbol profile facts
    data_kind: record
    freqs: []
    status: active
  - space_id: crypto
    dataset_id: binance_swap_symbols
    data_source_id: binance
    name: 币安合约标的
    description: Binance USDT-M swap symbol metadata records
    data_kind: record
    freqs: []
    status: active

dataset_subjects:
  - space_id: crypto
    dataset_id: binance_spot_kline
    subject_id: APT-USDT
    subject_role: normal
    status: active
  - space_id: crypto
    dataset_id: binance_spot_kline
    subject_id: AR-USDT
    subject_role: normal
    status: active
  - space_id: crypto
    dataset_id: binance_spot_symbols
    subject_id: APT-USDT
    subject_role: normal
    status: active
  - space_id: crypto
    dataset_id: binance_spot_symbols
    subject_id: AR-USDT
    subject_role: normal
    status: active
  - space_id: crypto
    dataset_id: binance_swap_symbols
    subject_id: APT-USDT
    subject_role: record
    status: active
  - space_id: crypto
    dataset_id: binance_swap_symbols
    subject_id: AR-USDT
    subject_role: record
    status: active

fields:
  - space_id: crypto
    field_id: open
    name: 开盘价
    value_type: double
    unit: USDT
    write_example: "7.1200"
    status: active
  - space_id: crypto
    field_id: high
    name: 最高价
    value_type: double
    unit: USDT
    write_example: "7.1800"
    status: active
  - space_id: crypto
    field_id: low
    name: 最低价
    value_type: double
    unit: USDT
    write_example: "7.0900"
    status: active
  - space_id: crypto
    field_id: close
    name: 收盘价
    value_type: double
    unit: USDT
    write_example: "7.1500"
    status: active
  - space_id: crypto
    field_id: volume
    name: 成交量
    value_type: double
    unit: base_asset
    write_example: "1250.5"
    status: active
  - space_id: crypto
    field_id: quote_volume
    name: 成交额
    value_type: double
    unit: USDT
    write_example: "8941.075"
    status: active
  - space_id: crypto
    field_id: trade_num
    name: 成交笔数
    value_type: int
    write_example: "123"
    status: active
  - space_id: crypto
    field_id: symbol
    name: 交易标的
    value_type: string
    write_example: APTUSDT
    status: active
  - space_id: crypto
    field_id: external_symbol
    name: 外部代码
    value_type: string
    write_example: APTUSDT
    status: active
  - space_id: crypto
    field_id: base_asset
    name: 基础资产
    value_type: string
    write_example: APT
    status: active
  - space_id: crypto
    field_id: quote_asset
    name: 计价资产
    value_type: string
    write_example: USDT
    status: active
  - space_id: crypto
    field_id: status
    name: 交易状态
    value_type: string
    write_example: TRADING
    status: active
  - space_id: crypto
    field_id: min_qty
    name: 最小数量
    value_type: double
    write_example: "0.001"
    status: active
  - space_id: crypto
    field_id: max_qty
    name: 最大数量
    value_type: double
    write_example: "100000"
    status: active
  - space_id: crypto
    field_id: tick_size
    name: 价格步长
    value_type: double
    write_example: "0.01"
    status: active
  - space_id: crypto
    field_id: lot_size
    name: 数量步长
    value_type: double
    write_example: "0.001"
    status: active
  - space_id: crypto
    field_id: filters_json
    name: 过滤规则
    value_type: json
    write_example: '{"PRICE_FILTER":{"tickSize":"0.01"}}'
    status: active
  - space_id: crypto
    field_id: note
    name: 备注
    value_type: string
    write_example: actively traded pair
    status: active

