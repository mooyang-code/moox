syntax = "proto3";

package trpc.moox.ops;

import "moox_common.proto";

option go_package = "github.com/mooyang-code/moox/modules/admin/proto/admingen;mooxpb";

// SecretMgr 秘钥管理服务。
// 统一管理系统中各类秘钥（云厂商、SSH、交易所、数据库等），
// 敏感字段 c_secret_value 在 DAO 层 AES 加解密，RPC 层返回时脱敏。
// 由统一 HTTP 转发层（/api/admin/secret/{method}）调度。

// ========== 秘钥管理 ==========

// Secret 秘钥信息（列表/详情返回时，secret_value 始终脱敏）。
message Secret {
  int32 id = 1;
  string secret_id = 2;        // 唯一标识
  string name = 3;              // 名称
  string description = 4;       // 描述
  string category = 5;          // 分类: cloud/ssh/exchange/database/jwt/other
  string provider = 6;          // 提供方
  string secret_type = 7;       // 类型: api_key/password/token/certificate/ssh_key/other
  string key_id = 8;            // 公开标识，不脱敏
  string secret_value = 9;      // 脱敏值（如 AKID****8j9k），创建/更新时传明文
  string extra_config = 10;     // 额外配置 (JSON)
  string status = 11;           // active / inactive
  string last_used_at = 12;     // 最后使用时间
  string last_used_by = 13;     // 最后使用方
  string creator = 14;          // 创建人
  string create_time = 15;      // 创建时间
  string modify_time = 16;      // 修改时间
}

message ListSecretsReq {
  string keyword = 1;           // 按名称/描述搜索
  string category = 2;          // 按分类筛选
  string provider = 3;          // 按提供方筛选
  string status = 4;            // 按状态筛选
  int32 offset = 5;
  int32 limit = 6;
}

message ListSecretsRsp {
  common.RetInfo ret_info = 1;
  repeated Secret secrets = 2;
  int64 total = 3;
}

message GetSecretReq {
  string secret_id = 1;
}

message GetSecretRsp {
  common.RetInfo ret_info = 1;
  Secret secret = 2;
}

message CreateSecretReq {
  Secret secret = 1;
}

message CreateSecretRsp {
  common.RetInfo ret_info = 1;
  string secret_id = 2;
}

message UpdateSecretReq {
  string secret_id = 1;
  string name = 2;
  string description = 3;
  string key_id = 4;
  string secret_value = 5;      // 为空表示不修改秘钥值
  string extra_config = 6;
  string category = 7;
  string provider = 8;
  string secret_type = 9;
}

message UpdateSecretRsp {
  common.RetInfo ret_info = 1;
}

message DeleteSecretReq {
  string secret_id = 1;
}

message DeleteSecretRsp {
  common.RetInfo ret_info = 1;
}

message ToggleSecretStatusReq {
  string secret_id = 1;
  string status = 2;            // active / inactive
}

message ToggleSecretStatusRsp {
  common.RetInfo ret_info = 1;
}

// ========== Services ==========

service SecretMgr {
  rpc ListSecrets(ListSecretsReq) returns (ListSecretsRsp);
  rpc GetSecret(GetSecretReq) returns (GetSecretRsp);
  rpc CreateSecret(CreateSecretReq) returns (CreateSecretRsp);
  rpc UpdateSecret(UpdateSecretReq) returns (UpdateSecretRsp);
  rpc DeleteSecret(DeleteSecretReq) returns (DeleteSecretRsp);
  rpc ToggleSecretStatus(ToggleSecretStatusReq) returns (ToggleSecretStatusRsp);
}
