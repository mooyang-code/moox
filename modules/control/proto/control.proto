syntax = "proto3";

package trpc.moox.control;

option go_package = "github.com/mooyang-code/moox/modules/control/proto/genv2;mooxpb";

import "common.proto";

message WorkspaceDefaults {
  bool create_default_devices = 1;
  bool create_default_routes = 2;
  repeated string default_exchanges = 3;
}

message WorkspaceSummary {
  string workspace_id = 1;
  string name = 2;
  string display_name = 3;
  string owner = 4;
}

message DataSetConfig {
  string workspace_id = 1;
  string dataset_id = 2;
  string name = 3;
  string display_name = 4;
  string data_kind = 5;
  string data_domain = 6;
  repeated string default_freqs = 7;
  map<string, string> attributes = 8;
}

message FieldConfig {
  string field_id = 1;
  string dataset_id = 2;
  string interface_name = 3;
  string display_name = 4;
  string value_type = 5;
}

message StorageRouteConfig {
  string route_id = 1;
  string workspace_id = 2;
  string dataset_id = 3;
  string field_id = 4;
  string factor_instance_id = 5;
  string device_id = 6;
  string engine = 7;
  uint32 priority = 8;
}

message CollectorBindingConfig {
  string binding_id = 1;
  string workspace_id = 2;
  string dataset_id = 3;
  string collector_id = 4;
  string data_source = 5;
  string exchange_id = 6;
  map<string, string> params = 7;
}

message MetadataChange {
  string change_id = 1;
  string workspace_id = 2;
  string resource_type = 3;
  string resource_id = 4;
  string action = 5;
  string payload_json = 6;
}

message CreateWorkspaceWithDefaultsReq {
  common.AuthInfo auth_info = 1;
  WorkspaceSummary workspace = 2;
  WorkspaceDefaults defaults = 3;
}

message CreateWorkspaceWithDefaultsRsp {
  common.RetInfo ret_info = 1;
  WorkspaceSummary workspace = 2;
}

message ConfigureDataSetReq {
  common.AuthInfo auth_info = 1;
  DataSetConfig dataset = 2;
}

message ConfigureDataSetRsp {
  common.RetInfo ret_info = 1;
  DataSetConfig dataset = 2;
}

message ConfigureFieldsReq {
  common.AuthInfo auth_info = 1;
  string workspace_id = 2;
  string dataset_id = 3;
  repeated FieldConfig fields = 4;
}

message ConfigureFieldsRsp {
  common.RetInfo ret_info = 1;
  repeated FieldConfig fields = 2;
}

message ConfigureStorageRoutesReq {
  common.AuthInfo auth_info = 1;
  repeated StorageRouteConfig routes = 2;
}

message ConfigureStorageRoutesRsp {
  common.RetInfo ret_info = 1;
  repeated StorageRouteConfig routes = 2;
}

message ConfigureCollectorBindingReq {
  common.AuthInfo auth_info = 1;
  CollectorBindingConfig binding = 2;
}

message ConfigureCollectorBindingRsp {
  common.RetInfo ret_info = 1;
  CollectorBindingConfig binding = 2;
}

message PublishMetadataChangeReq {
  common.AuthInfo auth_info = 1;
  MetadataChange change = 2;
}

message PublishMetadataChangeRsp {
  common.RetInfo ret_info = 1;
  MetadataChange change = 2;
}

service ControlService {
  rpc CreateWorkspaceWithDefaults(CreateWorkspaceWithDefaultsReq) returns (CreateWorkspaceWithDefaultsRsp);
  rpc ConfigureDataSet(ConfigureDataSetReq) returns (ConfigureDataSetRsp);
  rpc ConfigureFields(ConfigureFieldsReq) returns (ConfigureFieldsRsp);
  rpc ConfigureStorageRoutes(ConfigureStorageRoutesReq) returns (ConfigureStorageRoutesRsp);
  rpc ConfigureCollectorBinding(ConfigureCollectorBindingReq) returns (ConfigureCollectorBindingRsp);
  rpc PublishMetadataChange(PublishMetadataChangeReq) returns (PublishMetadataChangeRsp);
}
