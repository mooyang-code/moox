# CloudNode 模块统一配置文件
# 包含心跳、云函数等所有云节点相关配置

# 心跳配置（心跳超时判定相关）
heartbeat:
  default_timeout_threshold: 70   # 默认超时阈值（秒），超过此时间未收到心跳则判定为超时
  default_heartbeat_interval: 10  # 默认心跳间隔（秒），节点上报心跳的期望间隔

# 云函数配置
cloudfunction:
  # 云函数代码包路径配置
  zip_file_path: "/tmp/collector-scf.zip"
  
  # 其他云函数相关配置
  default_timeout: 30 # 调用云函数超时
  default_memory_size: 128
  
  # 默认环境变量
  default_env_vars:
    NODE_ENV: "production"

# 云厂商地区配置
cloud_regions:
  tencent:
    # 海外地区
    - code: "ap-hongkong"
      name: "港澳台地区（中国香港）"
      tag: "海外"
      max_nodes: 200 # 官方支持最大250
      max_namespaces_per_region: 5 # 官方支持最大5
      max_functions_per_namespace: 40 # 官方支持最大50
    - code: "ap-bangkok"
      name: "亚太东南（曼谷）"
