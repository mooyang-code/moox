# moox storage field seed sample
# 字段是 Space 内可复用的业务列定义；Dataset 通过 dataset_columns 选择字段并确定列名、必填、索引等写入约束。

fields:
  - space_id: "crypto"
    field_id: "symbol"
    name: "交易标的代码"
    value_type: "string"
    write_example: "APTUSDT"
    description: "外部数据源中的交易标的代码"
  - space_id: "crypto"
    field_id: "open"
    name: "开盘价"
    value_type: "double"
    unit: "USDT"
    validation_rule_json: '{"min":0}'
    write_example: "42789.50000000"
    description: "K线周期开盘价格"
  - space_id: "crypto"
    field_id: "high"
    name: "最高价"
    value_type: "double"
    unit: "USDT"
    validation_rule_json: '{"min":0}'
    write_example: "42890.25000000"
    description: "K线周期最高价格"
  - space_id: "crypto"
    field_id: "low"
    name: "最低价"
    value_type: "double"
    unit: "USDT"
    validation_rule_json: '{"min":0}'
    write_example: "42680.75000000"
    description: "K线周期最低价格"
  - space_id: "crypto"
    field_id: "close"
    name: "收盘价"
    value_type: "double"
    unit: "USDT"
    validation_rule_json: '{"min":0}'
    write_example: "42750.50000000"
    description: "K线周期收盘价格"
  - space_id: "crypto"
    field_id: "volume"
    name: "成交量"
    value_type: "double"
    unit: "base_asset"
    validation_rule_json: '{"min":0}'
    write_example: "156.78912345"
    description: "K线周期内的基础资产成交量"
  - space_id: "crypto"
    field_id: "quote_volume"
    name: "成交额"
    value_type: "double"
    unit: "quote_asset"
    validation_rule_json: '{"min":0}'
    write_example: "6700123.45000000"
    description: "K线周期内的计价资产成交量"
  - space_id: "crypto"
    field_id: "trade_num"
    name: "成交笔数"
    value_type: "int64"
    validation_rule_json: '{"min":0}'
    write_example: "3456"
    description: "K线周期内的成交总笔数"
  - space_id: "crypto"
    field_id: "taker_buy_base_asset_volume"
    name: "主动买入成交量"
    value_type: "double"
    unit: "base_asset"
    validation_rule_json: '{"min":0}'
    write_example: "89.12345678"
    description: "K线周期内主动买入的基础资产成交量"
  - space_id: "crypto"
    field_id: "taker_buy_quote_asset_volume"
    name: "主动买入成交额"
    value_type: "double"
    unit: "quote_asset"
    validation_rule_json: '{"min":0}'
    write_example: "3800123.45000000"
    description: "K线周期内主动买入的计价资产成交量"
  - space_id: "crypto"
    field_id: "candle_begin_time"
    name: "K线开始时间"
    value_type: "time"
    write_example: "2024-03-21T10:00:00Z"
    description: "K线周期的起始时间点"
  - space_id: "crypto"
    field_id: "candle_end_time"
    name: "K线结束时间"
    value_type: "time"
    write_example: "2024-03-21T10:59:59Z"
    description: "K线周期的结束时间点"
  - space_id: "crypto"
    field_id: "status"
    name: "交易状态"
    value_type: "string"
    write_example: "TRADING"
    description: "交易标的在数据源侧的交易状态"
  - space_id: "crypto"
    field_id: "unshelve_time"
    name: "下架时间"
    value_type: "time"
    write_example: "2099-01-01T00:00:00Z"
    description: "交易标的下架时间；未下架时使用远期时间"
  - space_id: "crypto"
    field_id: "funding_rate"
    name: "资金费率"
    value_type: "double"
    validation_rule_json: '{"min":-1,"max":1}'
    write_example: "0.0001"
    description: "合约或永续产品的资金费率"
  - space_id: "crypto"
    field_id: "spread"
    name: "价差"
    value_type: "double"
    write_example: "-0.00114122681883011"
    description: "买卖价差，可以为负数"
  - space_id: "crypto"
    field_id: "avg_price_1m"
    name: "1分钟平均价"
    value_type: "double"
    validation_rule_json: '{"min":0}'
    write_example: "0.3546200378684982"
    description: "1分钟窗口平均价格"
  - space_id: "crypto"
    field_id: "avg_price_5m"
    name: "5分钟平均价"
    value_type: "double"
    validation_rule_json: '{"min":0}'
    write_example: "0.35418907542539957"
    description: "5分钟窗口平均价格"

