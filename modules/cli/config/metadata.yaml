# moox storage metadata seed sample
# 该文件只保留当前 Space/DataSource/Subject/Dataset/View 模型，不再保留旧 Project/RecordRoute/FieldRoute 概念。

t_spaces:
  - c_space_id: "crypto"
    c_name: "加密货币量化数据"
    c_description: "币安、OKX 等加密货币交易所的数据"
    c_owner: "default"

t_data_sources:
  - c_space_id: "crypto"
    c_data_source_id: "binance"
    c_name: "Binance"
    c_kind: "exchange"
    c_market: "crypto"
    c_timezone: "UTC"

t_subjects:
  - c_space_id: "crypto"
    c_subject_id: "APT-USDT"
    c_subject_type: "crypto_pair"
    c_name: "APT-USDT"
    c_market: "crypto"
    c_currency: "USDT"
    c_timezone: "UTC"
  - c_space_id: "crypto"
    c_subject_id: "AR-USDT"
    c_subject_type: "crypto_pair"
    c_name: "AR-USDT"
    c_market: "crypto"
    c_currency: "USDT"
    c_timezone: "UTC"

t_subject_symbols:
  - c_space_id: "crypto"
    c_subject_id: "APT-USDT"
    c_data_source_id: "binance"
    c_external_symbol: "APTUSDT"
  - c_space_id: "crypto"
    c_subject_id: "AR-USDT"
    c_data_source_id: "binance"
    c_external_symbol: "ARUSDT"

t_datasets:
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_kline"
    c_data_source_id: "binance"
    c_name: "币安现货 K 线"
    c_description: "Binance spot kline facts"
    c_data_kind: "time_series"
    c_freqs_json: '["1m","1h","1d"]'
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_symbols"
    c_data_source_id: "binance"
    c_name: "币安现货标的信息"
    c_description: "Binance spot symbol profile facts"
    c_data_kind: "record"
    c_freqs_json: '[]'

t_dataset_subjects:
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_kline"
    c_subject_id: "APT-USDT"
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_kline"
    c_subject_id: "AR-USDT"
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_symbols"
    c_subject_id: "APT-USDT"
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_symbols"
    c_subject_id: "AR-USDT"

t_fields:
  - c_space_id: "crypto"
    c_field_id: "open"
    c_name: "开盘价"
    c_value_type: "double"
    c_unit: "USDT"
    c_write_example: "42789.50"
  - c_space_id: "crypto"
    c_field_id: "high"
    c_name: "最高价"
    c_value_type: "double"
    c_unit: "USDT"
    c_write_example: "42890.25"
  - c_space_id: "crypto"
    c_field_id: "low"
    c_name: "最低价"
    c_value_type: "double"
    c_unit: "USDT"
    c_write_example: "42680.75"
  - c_space_id: "crypto"
    c_field_id: "close"
    c_name: "收盘价"
    c_value_type: "double"
    c_unit: "USDT"
    c_write_example: "42750.50"
  - c_space_id: "crypto"
    c_field_id: "volume"
    c_name: "成交量"
    c_value_type: "double"
    c_unit: "base_asset"
    c_write_example: "156.78912345"
  - c_space_id: "crypto"
    c_field_id: "symbol"
    c_name: "交易标的代码"
    c_value_type: "string"
    c_write_example: "APTUSDT"
  - c_space_id: "crypto"
    c_field_id: "status"
    c_name: "交易状态"
    c_value_type: "string"
    c_write_example: "TRADING"

t_dataset_columns:
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_kline"
    c_column_name: "open"
    c_origin_type: "field"
    c_origin_id: "open"
    c_value_type: "double"
    c_required: 1
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_kline"
    c_column_name: "high"
    c_origin_type: "field"
    c_origin_id: "high"
    c_value_type: "double"
    c_required: 1
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_kline"
    c_column_name: "low"
    c_origin_type: "field"
    c_origin_id: "low"
    c_value_type: "double"
    c_required: 1
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_kline"
    c_column_name: "close"
    c_origin_type: "field"
    c_origin_id: "close"
    c_value_type: "double"
    c_required: 1
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_kline"
    c_column_name: "volume"
    c_origin_type: "field"
    c_origin_id: "volume"
    c_value_type: "double"
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_symbols"
    c_column_name: "symbol"
    c_origin_type: "field"
    c_origin_id: "symbol"
    c_value_type: "string"
  - c_space_id: "crypto"
    c_dataset_id: "binance_spot_symbols"
    c_column_name: "status"
    c_origin_type: "field"
    c_origin_id: "status"
    c_value_type: "string"

t_views:
  - c_space_id: "crypto"
    c_view_id: "spot_kline_close_view"
    c_name: "现货 K 线收盘价视图"
    c_primary_dataset_id: "binance_spot_kline"
    c_dataset_ids_json: '["binance_spot_kline"]'
    c_grain_keys_json: '["subject_id","freq","data_time"]'
    c_query_window: "30d"

t_view_columns:
  - c_space_id: "crypto"
    c_view_id: "spot_kline_close_view"
    c_column_name: "close"
    c_origin_type: "dataset_column"
    c_origin_id: "binance_spot_kline.close"
    c_value_type: "double"

primary_store_nodes:
  - node_id: "local"
    name: "local-primary"
    endpoint: "local"
    weight: 100

devices:
  - device_id: "pebble-1"
    node_id: "local"
    name: "pebble-main"
    engine: "pebble"
    endpoint: "~/moox/storage/pebble"
  - device_id: "duckdb-1"
    node_id: "local"
    name: "duckdb-view"
    engine: "duckdb"
    endpoint: "~/moox/storage/duckdb/moox.duckdb"
  - device_id: "bleve-1"
    node_id: "local"
    name: "bleve-text"
    engine: "bleve"
    endpoint: "~/moox/storage/bleve"
  - device_id: "parquet-archive-1"
    node_id: "local"
    name: "parquet-archive"
    engine: "parquet_archive"
    endpoint: "~/moox/storage/archive"

primary_store_routes:
  - space_id: "crypto"
    route_id: "route-binance-spot-kline"
    dataset_id: "binance_spot_kline"
    subject_pattern: "*"
    hash_rule: "subject_id"
    node_id: "local"
    priority: 100
