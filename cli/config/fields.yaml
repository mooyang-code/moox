fields:
  - interface_name: "unshelve_time"
    field_name: "下架时间"
    dataset_ids: [100, 101]
    desc: "币种的下架时间"
    required_flag: 1
    unique_flag: -1
    table_type: 1
    field_category: 1  # 基础字段（静态数据字段）
    field_primary_format: 1  # 字符串类型
    field_secondary_format: 5  # 日期时间格式
    validation_rule: '{"string_rule":{"format":"YYYY-MM-DD HH:mm:ss","pattern":"^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}$"}}'
    write_example: "2024-03-21 10:00:00"
    remark: "币种的下架时间，若没有下架则填2099-01-01 00:00:00"

  - interface_name: "symbol"
    field_name: "交易标的ID"
    dataset_ids: [100, 101]
    desc: "交易对名称，例如BTC-USDT，全大写字母"
    required_flag: 1
    unique_flag: -1
    table_type: 2
    field_category: 2  # 时序数据中的字段
    field_primary_format: 1  # 字符串类型
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"string_rule":{"min_length":6,"max_length":20,"pattern":"^[A-Z0-9]+-USDT$"}}'
    write_example: "BTC-USDT"
    remark: "交易对标识符，全大写字母和数字组合"

  - interface_name: "candle_begin_time"
    field_name: "K线开始时间"
    dataset_ids: [100, 101]
    desc: "K线周期开始时间"
    required_flag: 1
    unique_flag: -1
    table_type: 2
    field_category: 2  # 时序字段
    field_primary_format: 1  # 字符串类型
    field_secondary_format: 5  # 日期时间格式
    validation_rule: '{"string_rule":{"format":"YYYY-MM-DD HH:mm:ss","pattern":"^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}$"}}'
    write_example: "2024-03-21 10:00:00"
    remark: "K线周期的起始时间点"

  - interface_name: "open"
    field_name: "开盘价"
    dataset_ids: [100, 101]
    desc: "K线周期开盘价格"
    required_flag: 1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":0.0,"max":999999999.0}}'
    write_example: "42789.50000000"
    remark: "K线周期的开盘价格，支持8位小数"

  - interface_name: "high"
    field_name: "最高价"
    dataset_ids: [100, 101]
    desc: "K线周期最高价格"
    required_flag: 1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":0.0,"max":999999999.0}}'
    write_example: "42890.25000000"
    remark: "K线周期内的最高价格，支持8位小数"

  - interface_name: "low"
    field_name: "最低价"
    dataset_ids: [100, 101]
    desc: "K线周期最低价格"
    required_flag: 1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":0.0,"max":999999999.0}}'
    write_example: "42680.75000000"
    remark: "K线周期内的最低价格，支持8位小数"

  - interface_name: "close"
    field_name: "收盘价"
    dataset_ids: [100, 101]
    desc: "K线周期收盘价格"
    required_flag: 1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":0.0,"max":999999999.0}}'
    write_example: "42750.50000000"
    remark: "K线周期的收盘价格，支持8位小数"
    
  - interface_name: "volume"
    field_name: "成交量"
    dataset_ids: [100, 101]
    desc: "K线周期成交量"
    required_flag: 1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":0.0,"max":999999999999.0}}'
    write_example: "156.78912345"
    remark: "K线周期内的基础资产成交量，支持8位小数"

  - interface_name: "quote_volume"
    field_name: "成交额"
    dataset_ids: [100, 101]
    desc: "K线周期成交额"
    required_flag: 1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":0.0,"max":999999999999.0}}'
    write_example: "6700123.45000000"
    remark: "K线周期内的计价资产成交量，支持8位小数"

  - interface_name: "trade_num"
    field_name: "成交笔数"
    dataset_ids: [100, 101]
    desc: "K线周期成交笔数"
    required_flag: 1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 2  # 整型
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"integer_rule":{"min":0,"max":999999999}}'
    write_example: "3456"
    remark: "K线周期内的成交总笔数"

  - interface_name: "taker_buy_base_asset_volume"
    field_name: "主动买入成交量"
    dataset_ids: [100, 101]
    desc: "K线周期主动买入的基础资产成交量"
    required_flag: 1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":0.0,"max":999999999999.0}}'
    write_example: "89.12345678"
    remark: "K线周期内主动买入的基础资产成交量，支持8位小数"

  - interface_name: "taker_buy_quote_asset_volume"
    field_name: "主动买入成交额"
    dataset_ids: [100, 101]
    desc: "K线周期主动买入的计价资产成交量"
    required_flag: 1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":0.0,"max":999999999999.0}}'
    write_example: "3800123.45000000"
    remark: "K线周期内主动买入的计价资产成交量，支持8位小数"
    
  - interface_name: "candle_end_time"
    field_name: "K线结束时间"
    dataset_ids: [100, 101]
    desc: "K线周期结束时间"
    required_flag: 1
    unique_flag: -1
    table_type: 2
    field_category: 2  # 时序字段
    field_primary_format: 1  # 字符串类型
    field_secondary_format: 5  # 日期时间格式
    validation_rule: '{"string_rule":{"format":"YYYY-MM-DD HH:mm:ss","pattern":"^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}$"}}'
    write_example: "2024-03-21 10:59:59"
    remark: "K线周期的结束时间点"

  - interface_name: "Spread"
    field_name: "价差"
    dataset_ids: [100, 101]
    desc: "买卖价差"
    required_flag: -1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":-999999999.0,"max":999999999.0}}'
    write_example: "-0.00114122681883011"
    remark: "买卖价差，可以为负数"

  - interface_name: "avg_price_1m"
    field_name: "1分钟平均价"
    dataset_ids: [100, 101]
    desc: "1分钟平均价格"
    required_flag: -1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":0.0,"max":999999999.0}}'
    write_example: "0.3546200378684982"
    remark: "1分钟内的平均价格"

  - interface_name: "avg_price_5m"
    field_name: "5分钟平均价"
    dataset_ids: [100, 101]
    desc: "5分钟平均价格"
    required_flag: -1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":0.0,"max":999999999.0}}'
    write_example: "0.35418907542539957"
    remark: "5分钟内的平均价格"

  - interface_name: "fundingRate"
    field_name: "资金费率"
    dataset_ids: [100, 101]
    desc: "资金费率"
    required_flag: -1
    unique_flag: -1
    metadata_flag: -1
    field_category: 2  # 时序字段
    field_primary_format: 3  # 双精度浮点数
    field_secondary_format: 1  # 文本格式
    validation_rule: '{"double_rule":{"min":-1.0,"max":1.0}}'
    write_example: "0.0001"
    remark: "资金费率，可以为负数"
