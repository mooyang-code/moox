    c_interface_name: "open"
    c_proj_id: 1
    c_dataset_ids: "101"
    c_data_category: 2
    c_desc: "K线周期开盘价格"
    c_is_required: 1
    c_is_unique: 0
    c_is_meta: 0
    c_field_primary_format: 1
    c_field_secondary_format: 2
    c_validation_rule: '{"min": 0, "decimal_places": 8}'
