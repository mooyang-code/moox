
t_project:
  - c_proj_id: 1
    c_proj_name: "加密货币量化数据"
    c_remark: "币安、OKX等加密货币交易所的数据"

t_dataset:
  - c_dataset_id: 101
    c_dataset_name: "币安-K线数据"
    c_proj_id: 1
    c_data_type: 2
    c_freqs: "1H+1D"
    c_check_rules: ""
    c_comment: "该数据集仅存储币安各种周期的K线数据（c_data_type=2为时序类数据）"
  - c_dataset_id: 102
    c_dataset_name: "币安-币基本面数据"
    c_proj_id: 1
    c_data_type: 1
    c_freqs: ""
    c_check_rules: ""
    c_comment: "该数据集仅存储币安币基本面数据（c_data_type=1为静态基础数据）"

t_field:
  - c_field_id: 80101
    c_field_name: "交易标的ID"
    c_interface_name: "symbol"
    c_proj_id: 1
    c_dataset_ids: "101"
    c_data_category: 2 # 字段不与dataset绑定，只与项目绑定
    c_desc: "交易对名 例如BTCUSDT 全大写字母"
    c_is_required: 1
    c_is_unique: 1
    c_is_meta: 1
    c_field_primary_format: 1
    c_field_secondary_format: 3
    c_validation_rule: '{"min_length": 3, "max_length": 10, "pattern": "^[A-Z0-9]+$"}'
    c_write_example: "BTCUSDT"
    c_remark: "交易对名，全大写字母"

  - c_field_id: 80102
    c_field_name: "下架时间"
    c_interface_name: "unshelve_time"
    c_proj_id: 1
    c_dataset_ids: "101"
    c_data_category: 2
    c_desc: "币种的下架时间"
    c_is_required: 1
    c_is_unique: 0
    c_is_meta: 0
    c_field_primary_format: 1
    c_field_secondary_format: 7
    c_validation_rule: '{"format": "YYYY-MM-DD HH:mm:ss"}'
    c_write_example: "2024-03-21 10:00:00"
    c_remark: "币种的下架时间，若没有下架则填2099-01-01 00:00:00"

  - c_field_id: 80002
    c_field_name: "K线开始时间"
    c_interface_name: "candle_begin_time"
    c_proj_id: 1
    c_dataset_ids: "101"
    c_data_category: 2
    c_desc: "K线周期开始时间"
    c_is_required: 1
    c_is_unique: 0
    c_is_meta: 0
    c_field_primary_format: 1
    c_field_secondary_format: 7
    c_validation_rule: '{"format": "YYYY-MM-DD HH:mm:ss"}'
    c_write_example: "2024-03-21 10:00:00"
    c_remark: "K线周期的起始时间点"

  - c_field_id: 80003
