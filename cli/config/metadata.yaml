t_object_route:
  - c_dataset_id: 101
    c_object_id: "*"
    c_entity_id: 1
  - c_dataset_id: 102
    c_object_id: "*"
    c_entity_id: 1

t_field_route:
  - c_entity_id: 1
    c_data_category: 1
    c_device_id: 5
  - c_entity_id: 1
    c_data_category: 2
    c_device_id: 5 # 可以测试一下使用DuckDB存储时序数据

t_storage_entity:
  - c_entity_id: 1
    c_entity_srv_conn: "ip://0.0.0.0:18103"

t_storage_device:
  - c_device_id: 1
    c_device_name: "SQLite(一般用于存储静态数据)"
    c_device_type: 1
    c_conn_info: "localhost"
  - c_device_id: 2
    c_device_name: "DuckDB(可用于存储时序数据-有Schama)"
    c_device_type: 2
    c_conn_info: "localhost"
  - c_device_id: 3
    c_device_name: "bleve(可用于存储时序数据-无Schama)"
    c_device_type: 3
    c_conn_info: "../data/bleve" # bleve路径
  - c_device_id: 5
    c_device_name: "CSV"
    c_device_type: 5
    c_conn_info: "../data/csv" # csv路径
