# Moox CLI 工具配置文件示例
# ====================================
# 
# 使用说明:
# 1. 复制此文件并重命名为 cli.yaml 
# 2. 根据你的环境修改相应的配置参数
# 3. 配置文件会按以下优先级加载：
#    - 环境变量: MOOX_CONFIG
#    - 当前目录: ./config/cli.yaml
#    - 当前目录: ./cli.yaml  
#    - 上级目录: ./config/cli.yaml
#    - 用户目录: ~/.moox/cli.yaml
#    - 系统目录: /etc/moox/cli.yaml

# 元数据数据库配置
# ==================
metadata_database:
  # 数据库存储设备配置
  # 支持的格式:
  #   - SQLite: sqlite:/path/to/database.db
  storage_device: "sqlite:./data/metadata.db"

# 存储服务配置  
# ===============
storage:
  # 存储服务目标地址
  # 格式: IP:端口 或 域名:端口
  target: "127.0.0.1:18201"

# Moox认证服务配置
# ==================  
moox:
  # 认证服务目标地址
  # 格式: IP:端口 或 域名:端口
  # 示例: "127.0.0.1:18200", "auth.moox.com:18200"
  auth_target: "127.0.0.1:18200"

# 消息服务配置 (NATS)
# ====================
message:
  # NATS服务器连接地址
  # 格式: nats://host:port 或 nats:host:port
  # 示例: "nats:localhost:4222", "nats://nats.moox.com:4222"
  server: "nats:localhost:4222"
  
  # 流名称 (可选)
  # NATS JetStream 流名称，如果不使用JetStream可以省略
  stream: ""
  
  # 消费者名称
  # 用于标识消息消费者的唯一名称
  consumer: "MY_CONSUMER"
  
  # 订阅主题
  # NATS主题名称，支持通配符 (* 和 >)
  # 示例: "storage.datadetail.change", "storage.*", "storage.>"
  subject: "storage.datadetail.change"
  
  # 最大等待时间 (毫秒)
  # 消息拉取的最大等待时间，超时后返回
  # 建议范围: 1000-30000 (1秒-30秒)
  max_wait_time: 5000

# 配置提示:
# ========
#
# 1. 路径配置:
#    - 使用绝对路径确保在任何目录下都能正确找到文件
#    - 使用相对路径时注意工作目录的影响
#    - 建议数据库文件放在 ./data/ 目录下
#
# 2. 网络配置:
#    - 确保服务地址和端口正确且可访问
#    - 在生产环境中建议使用域名而非IP地址
#    - 注意防火墙和网络安全组配置
#
# 3. 消息服务:
#    - NATS服务器需要先启动并可访问
#    - 消费者名称在同一个NATS服务器上应该唯一
#    - 主题名称要与发布者保持一致
#