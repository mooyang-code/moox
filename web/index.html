<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo/snow.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP配置：开发环境允许unsafe-eval，生产环境更严格 -->
    <% if (mode === 'development') { %>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline'; object-src 'none';" />
    <% } else { %>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline'; object-src 'none';" />
    <% } %>
    <link rel="stylesheet" href="/css/loading.css" type="text/css" />
    <title><%= title %></title>
  </head>
  <body>
    <div id="app">
      <div class="init-page">
        <div class="moox-loader"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
