<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo/snow.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- DNS预解析 -->
    <link rel="dns-prefetch" href="//unpkg.com" />
    
    <!-- 资源预连接 -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    
    <!-- 关键CSS优先加载 -->
    <link rel="preload" href="/css/loading.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="/css/loading.css" /></noscript>
    
    <!-- CSP配置：开发环境允许unsafe-eval，生产环境更严格 -->
    <% if (mode === 'development') { %>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://unpkg.com; object-src 'none';" />
    <% } else { %>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://unpkg.com; object-src 'none';" />
    <% } %>
    
    <title><%= title %></title>
  </head>
  <body>
    <div id="app">
      <div class="init-page">
        <div class="moox-loader"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
