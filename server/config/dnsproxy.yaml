# DNS代理服务配置文件
# 使用说明:
# 1. 配置需要定时解析的域名列表
# 2. 设置缓存过期时间和清理间隔
# 3. 配置DNS服务器列表
# 4. 调整超时和延迟检测参数

# DNS代理配置
dnsproxy:
  # 需要定时解析的域名列表
  domains:
    - api.binance.com
    - fapi.binance.com

  # 缓存配置
  cache:
    ttl_seconds: 360000        # 缓存过期时间（秒）设置一个大时间，意图为用不过期

  # DNS服务器配置
  dns_servers:
    # 国际DNS服务器
    - name: "Google DNS Primary"
      address: "8.8.8.8"
      enabled: true
    - name: "Google DNS Secondary"
      address: "8.8.4.4"
      enabled: true
    - name: "Cloudflare DNS Primary"
      address: "1.1.1.1"
      enabled: true
    - name: "Cloudflare DNS Secondary"
      address: "1.0.0.1"
      enabled: true
    - name: "OpenDNS Primary"
      address: "208.67.222.222"
      enabled: true
    - name: "OpenDNS Secondary"
      address: "208.67.220.220"
      enabled: true

    # 国内DNS服务器
    - name: "阿里DNS Primary"
      address: "223.5.5.5"
      enabled: true
    - name: "腾讯DNS Primary"
      address: "119.29.29.29"
      enabled: true
    - name: "百度DNS Primary"
      address: "180.76.76.76"
      enabled: false

    - name: "本机DNS"
      address: "localhost"
      enabled: true

  # 超时配置
  timeouts:
    dns_query_seconds: 5      # DNS查询超时时间（秒）
    ping_test_seconds: 3      # Ping测试超时时间（秒）
    concurrent_limit: 5       # 并发连接限制

  # Ping检测配置
  ping:
    ping_port: "80"           # 主要Ping端口
    ping_ports:               # 多个Ping端口（优先使用）
      - "80"                  # HTTP
      - "443"                 # HTTPS
    ping_retries: 2           # 重试次数
    ping_delay: 800           # 重试延迟（毫秒）

# 配置说明:
#
# 域名列表 (domains):
# - 这些域名会被定时任务自动解析并缓存
# - 建议添加常用的、访问频率高的域名
# - 支持子域名和国际化域名
#
# 缓存配置 (cache):
# - ttl_seconds: 缓存过期时间，建议3600-86400秒（1-24小时）
#
# DNS服务器 (dns_servers):
# - 支持多个DNS服务器，提高解析成功率
# - enabled: false 可以临时禁用某个服务器
# - 建议启用3-5个不同的DNS服务器
# - 地址格式: IP地址（不含端口），系统自动添加:53
# - 支持localhost表示使用系统默认DNS
#
# 超时配置 (timeouts):
# - dns_query_seconds: DNS查询超时，建议3-10秒
# - ping_test_seconds: Ping测试超时，建议1-5秒
# - concurrent_limit: 并发连接数，建议3-10个
#
# Ping检测 (ping):
# - ping_port: 单个Ping端口（向后兼容）
# - ping_ports: 多个Ping端口，会依次尝试
# - ping_retries: 失败重试次数，建议1-3次
# - ping_delay: 重试间隔，建议50-500毫秒
#
# 性能建议:
# 1. 域名数量控制在10-50个
# 2. 缓存TTL根据业务需求调整
# 3. DNS服务器选择地理位置较近的
# 4. 并发限制避免过高导致网络拥塞
# 5. 延迟测试端口选择常用端口
#
# 安全建议:
# 1. 使用可信的DNS服务器
# 2. 定期检查DNS服务器的可用性
# 3. 监控异常的解析结果
# 4. 避免解析恶意域名
#
# 故障排除:
# 1. 检查DNS服务器地址是否正确
# 2. 确认网络连接正常
# 3. 查看日志中的错误信息
# 4. 尝试减少并发连接数
# 5. 增加超时时间
#
# 快速开始:
# 1. 复制此文件并重命名
# 2. 修改域名列表
# 3. 调整缓存TTL
# 4. 启动服务即可使用
