# 认证服务配置文件 - 生产环境模板
# 适用于生产环境部署

# 数据库配置（PostgreSQL推荐）
database:
  host: "${DB_HOST}"          # 从环境变量读取数据库主机
  port: 5432                  # 数据库端口
  user: "${DB_USER}"          # 从环境变量读取用户名
  password: "${DB_PASSWORD}"  # 从环境变量读取密码
  dbname: "${DB_NAME}"        # 从环境变量读取数据库名

# 缓存配置（BadgerDB）
cache:
  data_dir: "/var/lib/moox/badger"  # 生产环境数据目录
  db: 0                             # 数据库编号

# JWT配置
jwt:
  secret_key: "${JWT_SECRET_KEY}"   # 从环境变量读取JWT密钥
  access_expired: "30m"             # 生产环境建议较短的访问令牌过期时间
  refresh_expired: "72h"            # 刷新令牌过期时间（3天）

# 安全配置（生产环境加强版）
security:
  salt_expired: "3m"          # 更短的盐值过期时间
  max_login_attempt: 3        # 更严格的登录尝试限制
  lock_duration: "60m"        # 更长的账户锁定时间

# 生产环境部署说明:
# 1. 使用环境变量管理敏感配置
# 2. 数据目录需要适当的权限设置
# 3. JWT密钥必须是强随机字符串
# 4. 建议配置日志轮转和监控
# 5. 定期备份数据库和缓存数据
#
# 环境变量示例:
# export DB_HOST="your-db-host"
# export DB_USER="your-db-user"  
# export DB_PASSWORD="your-secure-password"
# export DB_NAME="moox_auth_prod"
# export JWT_SECRET_KEY="your-super-secure-jwt-key-at-least-32-chars" 