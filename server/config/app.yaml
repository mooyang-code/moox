# MooX Server 配置文件

server:
  host: 0.0.0.0
  port: 8080
  environment: development  # development 或 production
  moox_url: http://localhost:8080

database:
  type: sqlite
  path: ./data/moox.db
  
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 1h
  conn_max_idle_time: 10m

storage:
  cos_bucket: moox-packages
  cos_region: ap-guangzhou
  # local_path: ./data/packages
  cache_size: 100           # 缓存文件数量
  cache_expiry: 30          # 缓存过期时间（分钟）

auth:
  jwt_secret: ${JWT_SECRET}  # 从环境变量读取
  jwt_expiry: 24h
  max_login_attempts: 5
  lock_duration: 15m

worker:
  async_task_worker_count: 3
  node_creation_worker_count: 3
  node_deletion_worker_count: 3
  node_deployment_worker_count: 3

log:
  level: info               # debug, info, warn, error
  output_path: ./log/moox.log
  max_size: 100             # MB
  max_backups: 10
  max_age: 30               # 天

