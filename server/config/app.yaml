# MooX Server 配置文件

database:
  type: sqlite
  path: ./data/moox.db
  
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 1h
  conn_max_idle_time: 10m

storage:
  cos_bucket: moox-packages
  cos_region: ap-guangzhou
  # local_path: ./data/packages
  cache_size: 100           # 缓存文件数量
  cache_expiry: 30          # 缓存过期时间（分钟）
  xdata_url: "http://127.0.0.1:19104"

worker:
  async_task_worker_count: 3
  node_creation_worker_count: 3
  node_deletion_worker_count: 3
  node_deployment_worker_count: 3

task_management:
  # 统一容差（秒），用于Pending超时判断
  # - Pending超时：now > cycleBoundary + tolerance
  tolerance: 30
  # 默认interval（解析失败时使用）
  default_interval: "1m"

log:
  level: info               # debug, info, warn, error
  output_path: ./log/moox.log
  max_size: 100             # MB
  max_backups: 10
  max_age: 30               # 天

monitor:
  node_exporter_port: 9100  # Node Exporter 端口
  collect_timeout: 10       # 采集超时时间（秒）
  concurrent_limit: 20      # 并发采集限制
