# 认证服务配置文件 - 开发环境
# 专为开发环境优化的配置

# 数据库配置（SQLite）
database:
  host: ""                    # SQLite不需要host
  port: 0                     # SQLite不需要port  
  user: ""                    # SQLite不需要用户名
  password: ""                # SQLite不需要密码
  dbname: "./data/auth_dev.db"  # 开发环境数据库文件

# 缓存配置（BadgerDB）
cache:
  data_dir: "./data/badger_dev"  # 开发环境缓存目录
  db: 0                          # 数据库编号（预留字段）

# JWT配置（开发环境）
jwt:
  secret_key: "dev-jwt-secret-key-for-development-only"  # 开发环境JWT密钥
  access_expired: "8h"        # 开发环境长过期时间，减少重新登录
  refresh_expired: "168h"     # 刷新令牌过期时间（7天）

# 安全配置（开发环境宽松设置）
security:
  salt_expired: "10m"         # 开发环境更长的盐值过期时间
  max_login_attempt: 10       # 开发环境更多登录尝试次数
  lock_duration: "5m"         # 开发环境较短的锁定时间

# 开发环境特性:
# 1. 数据文件与生产环境分离（避免冲突）
# 2. 更长的令牌过期时间（开发便利）
# 3. 更宽松的安全限制（便于调试）
# 4. 快速解锁机制（提高开发效率）

# 开发环境说明:
# 1. 数据库文件和缓存目录会自动创建
# 2. 请确保 ./data 目录有写入权限
# 3. JWT密钥在生产环境中必须修改为强密钥
# 4. 可以根据需要调整令牌过期时间 