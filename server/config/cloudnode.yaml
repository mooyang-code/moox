# CloudNode 模块统一配置文件
# 包含心跳、云函数等所有云节点相关配置

# 探测器配置（主动健康探测）
prober:
  max_concurrent: 10      # 最大并发探测数

# 心跳配置（心跳超时判定相关）
heartbeat:
  default_timeout_threshold: 31   # 默认超时阈值（秒），超过此时间未收到心跳则判定为超时
  default_heartbeat_interval: 10  # 默认心跳间隔（秒），节点上报心跳的期望间隔

# 云函数配置
cloudfunction:
  # 云函数代码包路径配置
  zip_file_path: "/tmp/collector-scf.zip"
  
  # 其他云函数相关配置
  default_timeout: 30
  default_memory_size: 128
  
  # 默认环境变量
  default_env_vars:
    NODE_ENV: "production"

# 云厂商地区配置
cloud_regions:
  tencent:
    - code: "ap-bangkok"
      name: "亚太东南（曼谷）"
    - code: "ap-beijing"
      name: "华北地区（北京）"
    - code: "ap-chengdu"
      name: "西南地区（成都）"
    - code: "ap-chongqing"
      name: "西南地区（重庆）"
    - code: "ap-guangzhou"
      name: "华南地区（广州）"
    - code: "ap-hongkong"
      name: "港澳台地区（中国香港）"
    - code: "ap-jakarta"
      name: "亚太东南（雅加达）"
    - code: "ap-nanjing"
      name: "华东地区（南京）"
    - code: "ap-seoul"
      name: "亚太东北（首尔）"
    - code: "ap-shanghai"
      name: "华东地区（上海）"
    - code: "ap-shanghai-fsi"
      name: "华东地区（上海金融）"
    - code: "ap-shenzhen-fsi"
      name: "华南地区（深圳金融）"
    - code: "ap-singapore"
      name: "亚太东南（新加坡）"
    - code: "ap-tokyo"
      name: "亚太东北（东京）"
    - code: "eu-frankfurt"
