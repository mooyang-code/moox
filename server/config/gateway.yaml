# 网关服务配置 - 合并了认证服务配置
# 配置文件包含：网关服务、认证服务、限流配置

# 数据库配置（认证服务使用SQLite）
database:
  host: ""                    # SQLite不需要host
  port: 0                     # SQLite不需要port
  user: ""                    # SQLite不需要用户名
  password: ""                # SQLite不需要密码
  dbname: "./data/moox.db"    # SQLite数据库文件路径

# 缓存配置（认证服务使用BadgerDB）
cache:
  data_dir: "./data/badger"   # BadgerDB数据存储目录
  db: 0                       # 数据库编号（预留字段）

# JWT配置（认证服务使用）
jwt:
  secret_key: "kJ8#3Lz!b1A6xQwP2dR9vM4nS7eT0uYpG5hZcV8jF2mB6sXlD3rWqN0tH9uK1oE4" # JWT密钥，从环境变量读取，生产环境请务必设置
  access_expired: "24h"       # 访问令牌过期时间
  refresh_expired: "168h"     # 刷新令牌过期时间（7天）

# 安全配置（认证服务使用）
security:
  # 数据加密密钥（32字节，用于 AES-256）
  # 生产环境必须设置环境变量 MOOX_ENCRYPTION_KEY
  encryption_key: "moox-cloud-secret-key-32bytes"  # 开发环境默认值，生产环境请设置环境变量
  salt_expired: "5m"          # 登录盐值过期时间
  max_login_attempt: 5        # 最大登录尝试次数
  lock_duration: "15m"        # 账户锁定时间

# 网关服务配置
gateway:
  # 网关服务端口
  port: 18202

  # 超时配置（毫秒）
  timeout: 5000

  # 是否开启调试模式
  debug: true

  # 不需要鉴权的接口列表
  no_auth_methods:
    - "/gateway/auth/Register"
    - "/gateway/auth/GetLoginSalt"
    - "/gateway/auth/Login"
    - "/gateway/cloudnode/ReportHeartbeatInner"
    - "/gateway/collectmgr/GetTaskInstanceListInner"
    - "/gateway/dnsproxy/GetDNSRecordList"
    - "/gateway/dnsproxy/GetDNSRecordDetail"

  # 服务配置映射【仅trpc服务才配置】
  services:
    # 存储服务配置
    storage:
      path: "trpc.storage.access.Access"

    # 认证服务配置
    auth:
      path: "trpc.moox.server.AuthAPI"

    # 元数据服务配置
    metadata:
      path: "trpc.storage.metadata.MetaAdmin"
    field:
      path: "trpc.storage.metadata.MetaField"

    # 管理服务配置
    admin:
      path: "trpc.moox.server.AdminAPI"


# 限流配置
rate_limit:
  # 默认限流配置
  default_qps: 20      # 默认QPS限制
  default_burst: 1000    # 默认突发流量

  # 按接口配置限流
  method_limits:
    "/gateway/auth/Login":
      qps: 1
      burst: 2
    "/gateway/auth/Register":
      qps: 1
      burst: 1
    "/gateway/auth/GetLoginSalt":
      qps: 2
      burst: 5
    "/gateway/auth/GetUserInfo":
      qps: 2
      burst: 5

# 配置说明:
# 时间格式支持: ns, us, ms, s, m, h
# 例如: "30s" (30秒), "5m" (5分钟), "2h" (2小时), "24h" (24小时)
#
# 数据库支持:
# 默认使用SQLite（无需额外安装数据库服务）
# 如需PostgreSQL/MySQL，请参考相关配置
#
# 缓存目录:
# 确保应用有权限在指定目录创建和写入文件
# 数据库文件和缓存目录会自动创建
#
# 安全建议:
# 1. JWT密钥请使用强随机字符串，至少32字符
# 2. 生产环境建议缩短访问令牌过期时间
# 3. 根据业务需求调整登录尝试次数和锁定时间
#
# 快速开始:
# 1. 修改JWT密钥
# 2. 确保 ./data 目录有写入权限
# 3. 启动服务即可使用