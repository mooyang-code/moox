# 网关服务配置
gateway:
  # 网关服务端口
  port: 18202
  
  # 超时配置（毫秒）
  timeout: 5000
  
  # 是否开启调试模式
  debug: true
  
  # 不需要鉴权的接口列表
  no_auth_methods:
    - "/gateway/auth/Register"
    - "/gateway/auth/GetLoginSalt"
    - "/gateway/auth/Login"
  
  # 服务配置映射
  services:
    # 存储服务配置
    storage:
      address: "127.0.0.1:18106"
      path: "trpc.storage.access.Access"
    
    # 认证服务配置
    auth:
      address: "127.0.0.1:18201"
      path: "trpc.moox.server.AuthAPI"
    
    # 元数据服务配置
    metadata:
      address: "127.0.0.1:18105"
      path: "trpc.storage.metadata.MetaAdmin"
    
    # 管理服务配置
    admin:
      address: "127.0.0.1:18203"
      path: "trpc.moox.server.AdminAPI"

# 限流配置
rate_limit:
  # 默认限流配置
  default_qps: 20      # 默认QPS限制
  default_burst: 50    # 默认突发流量
  
  # 按接口配置限流
  method_limits:
    "/gateway/auth/Login":
      qps: 1
      burst: 2
    "/gateway/auth/Register":
      qps: 1
      burst: 1
    "/gateway/auth/GetLoginSalt":
      qps: 2
      burst: 5
    "/gateway/auth/GetUserInfo":
      qps: 2
      burst: 5